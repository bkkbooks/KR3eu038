body:
  text: 卷之一四診門望聞問切古人稱為聖神工巧蓋醫師之首務也經云能合色脈可以萬全又云聞其聲而知其人之疾苦問其苦欲安煩而知其病之所在是雖聖人不能捨此以為法也而況後學乎茲繪圖立説校列於下面圖望色望而知之謂之聖診小兒之病先從面部氣色觀之詳察五部之色則五藏之病自昭然可見矣五部者額屬心頦屬腎鼻屬脾左腮屬肝右腮屬肺也五色者赤為心色黑為腎色黃為脾色青為肝色白為肺色也如面白主虛寒面赤主火熱面青主驚風面黃主傷脾傷食面黑主痛多是惡候總之五色明顯為新病其證輕濁晦為久病其證重又部色相生者為順如脾病色黃此為正色若見紅色乃火能生土故為順若見青色乃木來剋土則為逆余藏仿此凡氣血充實又遇部色相生縱有外邪助病亦易調治如久病氣血已虛又遇部色相剋則正氣不交而難治分而言之天庭青暗主患驚風紅主內熱黑則不治太陽青主驚風青色入耳者死印堂青主驚瀉山根青多災疾風氣二池青主驚風紫主吐逆黃主脾傷眉青主吉紅主煩熱眉心黃主臍風鼻赤主脾熱鼻黑者凶準頭黃主臍風唇赤主脾熱白主脾寒人中承漿黃主臍風承漿青主驚黃主吐黑主抽搐左腮發赤肝經有熱右腮發赤肺熱痰盛也此皆察色之大要再以聞問切參之庶得其全矣審苗竅法舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也舌以正紅滋潤為貴若內外深紅則為有熱外紅內紫則為熱深舌苔滑白則為表寒白苔漸變黃色則為去表入里焦乾黑色芒刺裂紋則為裡熱極深也唇口乃脾胃之竅唇紫熱也淡白虛也唇黑如漆脾胃將絶也黃主脾濕欲發疸也青主驚燥主火口右扯屬肝風左扯屬脾痰鼻準與牙床皆脾之竅鼻準紅燥脾熱也慘黃脾敗也牙床紅腫脾熱也破爛腐臭胃火盛也鼻孔為肺之竅以滋潤為貴孔中乾燥肺鬱熱也孔流清涕肺感寒也目乃肝之竅勇視而轉睛者肝風也直視而不轉睛者肝氣將絶也以目分言之又屬五藏之竅黑珠屬肝純黃放赤凶症也白珠屬肺色青肝風侮肺也淡黃脾有積滯也老黃色肺受濕熱將發疸也瞳仁屬腎無光采又兼發黃腎氣虛也風池屬脾上眼胞腫脾傷也氣池屬胃下眼胞青胃有寒也胞黃主傷濕睡不合縫脾胃俱虛也大角屬大腸色青破爛肺有風也小角屬小腸色赤破爛心有熱也耳與齒皆腎之竅耳鳴耳聾腎氣不和也齒如黃豆腎氣敗也按耳為腎竅舌為心竅以舌無孔隙故心亦寄竅於耳十二經中除足太陽手厥陰其餘十經皆入絡於耳中腎治內之陰心治外之陽清淨精明之氣上走空竅而聽斯聰矣若二經不調陰陽不和或衛氣不下循經脈或煩勞陰虛或經藏積熱或氣逆熱聚或濕飲痞滿或風熱搏結致耳流膿血耳挺耳痔之類治詳彤園醫書外科辨臟腑表裡小腸心之表小便黃赤澀痛主心熱也清長晃白則主虛寒大腸肺之表大便燥結肺熱也無熱便燥主血枯冷利脫肛肺虛寒也胃乃脾之表熱則唇赤煩渴吐逆唇白吐利主虛寒淡黃吐瀉脾傷也膽乃肝之表熱則目赤口苦風則眉目連眨手足瘛瘲虛則聞聲驚惕膀胱腎之表居腎下大腸之前津液藏焉下陰腫痛腎水寒氣入膀胱也集成簡切法小兒熱症有七面頰紅赤大便燥結小便短赤煩渴舌乾眼目紅腫喘急吐惡足心滾熱此皆實症忌用溫補小兒寒症有七面唇㿠白眼珠帶青睡臥露睛足膝冰冷糞清尿白冷吐冷瀉虛脹虛喘此皆虛症忌用寒涼聞聲聞而知之謂之神診小兒病既望其色又當細聽其聲蓋笑呼歌悲呻五聲內應心肝脾肺腎五藏五聲不和則知五藏有病之情矣如心屬火病則聲急喜笑肝屬木病則聲狂叫多呼脾屬土病則聲顫輕如歌肺屬金病則音濁聲悲腎屬水病則聲長細如呻吟凡有聲有淚聲長者曰哭有聲無淚聲短者曰啼如啼而不哭則氣不伸暢內主腹痛哭而不啼則氣急心煩將成驚也吱煎不安者乃心經內熱故煩躁不寧嘎聲者音啞也聲重者音濁也皆因外感風寒肺竅不利也總之有餘之症其氣實故聲雄大而壯厲不足之症其氣虛故聲怯弱而輕短凡多言身常溫熱者屬六腑陽分熱也懶語兼身涼者屬五藏陰分虛寒也邪熱盛則狂言焦躁熱乘心則神昏譫語至若鴨聲聲在喉中啞氣將絶直聲聲無回轉急氣將散二症不治此皆聞聲之大略也問病問而知之謂之工凡診小兒病望聞之後須問起居安煩苦欲何如次問飲食能食不能食口渴與不渴又問二便或通或祕而後病源可識矣如發熱惡寒無汗傷寒表實也發熱惡風有汗傷風表虛也自汗便祕煩渴飲冷內熱裡實也肢冷下利腹痛吐蛔中寒裡虛也安煩者謂晝煩熱而夜安靜是陽旺於陽分其病在陽若夜煩熱而晝安靜是陽陷於陰分其病在陰也苦欲者喜冷惡熱屬陽分熱病喜熱惡冷屬陰分寒病也胃壯者能食胃弱者不能食胃乾燥者口渴胃濕盛者口不渴也若大便稠黏穢氣難聞者內有滯熱從熱化也小便㿠白而頻數為虛寒從寒化也凡耳梢冷尻骨冷四肢發冷者痘疹欲發之候如單指梢發冷者驚癇將作也平常患病手足厥冷者主中寒肚腹熱悶者主內熱兩耳常發熱者主外因風熱無故皺眉曲腰啼叫者主內因腹痛然腹痛又當按其或軟或硬硬者為實軟者為虛且喜按者為虛不喜按者為實此皆問病之大要也按乳哺嬰兒茫然無識不能自言其疾苦惟靠乳母預先推求討得消息醫者臨症聞其乳食多少或過多而吐哯或停滯而腹痛含乳之鬆緊口氣之涼熱大便之軟硬形色小便之赤白長短眼糞之燥濕鼻涕之清濁睡中有無驚惕腹中有無聲響兒若惡寒喜偎母懷兒若惡熱喜揭衣被或縛臍太緊氣滯腹疼或誤服寒涼聲嘶吐逆或異物驚嚇神色張皇或失手閃傷肢節腫痛或少避忌惹人痘疹毒瘡或失防間誤吞諸般硬物或看修造動土觸犯太歲或臨古井廢溝突中惡毒凡演戲行儺迎神設蘸雷鳴炮響獸走禽飛若失回避皆令著驚發為惡候惟在乳母審得病因醫師問之盡言毋隱切脈切而知之謂之巧小兒已滿周歲有病又當切脈但部位甚小不能以三指診之須用一指以定三關三關者寸關尺也所謂浮脈者輕取皮膚之上即得其病在表外感風寒也沉脈者重按筋骨之間則見其病在裡內傷飲食也小兒純陽以一息六至為和平之脈則曰無疾一息者醫人之一呼一吸也至者脈之至數也五至四至謂之遲脈病在五藏屬陰寒一息三至虛寒之極二至一至皆死脈也七至八至謂之數脈病在六腑屬陽熱九至十至火熱太盛十一二至皆死脈也滑脈者脈滑如珠往來流利主痰飲盛也澀脈者脈形滯澀往來艱難血滯血少也虛脈者浮中沉三部無力也主諸虛不足之症實脈者浮中沉三部有力也主諸實有餘之症所謂中者其脈在浮沉之間取之肌肉而得也芤脈者中取無力如搦蔥管主大血之病微脈者按之微細若有若無主怯弱之病洪脈者來時雖盛去時無力主火熱也代脈者止不即還如相代替無藏氣也結脈者緩而時止此為陰鬱主積聚也促脈者數而時止此為陽郁主驚癇也弦脈者端直如張弓弦按之剛徑寸弦主頭痛關弦主停飲尺弦主腹痛也緊脈者左右如轉索之象按之動彈浮緊主傷寒沉緊主腹痛洪緊主痘疹欲發也脈來大小不勻乍有乍無者中惡崇脈也浮散無根及浮沉取之不應指者不治此皆切脈之大法臨症時合望聞問三者細為參考可也陶節庵曰診小兒之脈無論浮沉遲數但於有力無力中分之有力者為陽為實為熱有餘之症也無力者為陰為虛為寒不足之症也診小兒脈以六至為平和無疾五至為遲七至為數者蓋以小兒純陽之體不似大人陰陽兩平以四至為平脈五至為閏脈六至為數三至為遲也要之診雖不同而脈理無不同也附法門虎口三關脈紋圖説凡嬰兒患病既已望聞問切須兼看虎口交手處脈紋形色以決病之生死輕重男先看左手女先看右手三關者兩手次指內側之三節也初節曰風關二節曰氣關三節曰命關紋在初節紅黃相兼隱隱不顯則主平安無病若紋色紅亮主傷寒白主疳疾紫主內熱亦兼食傷黃乃傷脾亦主雷驚黑主中惡或患陰癇青主驚風及人驚走獸驚赤主水火飛禽等驚凡脈紋只在風關主病輕在氣關者頗重若過命關病危難治又當視其紋形大小曲直以辨諸症如紋形一點紅色名曰流珠主內熱形圓而長名曰長珠主傷飲食上尖長下微大者名曰去蛇主傷食吐瀉上稍大下尖長者名曰來蛇主濕熱成疳弓反里者形彎向中指主感冒寒邪弓反外者形彎向大指主內熱痰盛紋斜向左者形歪向中指主傷風惡寒有汗紋斜向右者形歪向大指主傷寒發熱無汗針形直若懸針主痰熱也槍形直射如槍痰火盛也透關射甲者紋形衝過命關直射指甲指端主脾氣大敗不治之症也乙字紋形如乙字主驚風抽搐二曲如鉤形主傷生冷三曲如蟲形主傷硬物紋形似水字主咳嗽連絡如環形主疳疾曲蟲紋如蟲之彎曲亂動主積聚亂蟲紋如蟲之相聚而行主蛔蟲內擾腹痛也魚骨紋形如魚刺主驚風痰熱也凡脈紋粗露板硬推之不搶指者皆屬惡疾此指紋形色之大要也脈紋圖考火功推拿祕訣嬰兒十指冷如冰或是驚風或疹生十指梢頭熱似火傷寒夾食兩調停以吾三指按兒額感冒風寒三指熱三指按兮三指冷內傷飲食兼風結若是臍風肝受傷先從眼鼻變深黃十三燈火及時治黃到承漿定主亡啼哭聲從肺里來無聲肺絶實哀哉若因痰蔽聲難出艾灸肺俞聲自開百會由來在頂心此中一穴管通身面青肢冷成陰癇艾灸回陽以抑陰張口搖頭並反折速將艾灸鬼眼穴寒深更向臍心灸提散寒邪風自絶一年之氣二十四推上天門亦此義自古陰陽數有九分推兩角理無異天庭逐掐至承漿以掐代針行血氣此乃開手推法詳後圖説傷寒推法上三關臟熱專推六腑間六腑推三關應一三關推十腑推三推多應少為調變血氣之中始不偏如只推不應反能動火也足冷好眠食不進重揉艮位調脾病再將大指面旋推脾若初傷推即應頭疼肚痛食和風揉動外勞即見功疼痛醫人何處識皺眉踐腳哭聲雄心熱昏迷尿閉時天河引水上洪池掌中水底撈明月六腑生涼心熱遺嬰兒臟腑有寒風無汗脈浮表不通揉動外勞將指屈表開汗發自然松兒因驚嚇乍昏癡節骨搓揉五指施若是昏癡仍不醒精威二穴對拿之膽經有熱口作苦大指下推瀉脾土口苦醫人何處知合口頻頻左右扭大腸側推到虎口止瀉止痢斷根源揉臍兼要揉龜尾更要推揉到湧泉小指腎經與後溪推上為清下補之尿短色黃推上妙虛寒尿白下推宜鼻孔乾焦因肺熱若流清涕風寒客下推瀉肺上為溫卻與心脾同一訣眼睛翻上掐天心須向掌心掐即平若是雙眸低看地天心上掐對宗筋肩井穴是大關津掐此開通氣血行各處推完將此掐不愁氣血不周身效見推拿是病輕沉疴非藥不為靈療驚雖用元宵火現症齊兮枉費心若用推拿須下午推拿切莫在清晨陽濟陰生邪作解燒熱常多退五更鐵鏡推拿圖説推法煎薑蔥汁浸染醫人大指先從眉心向額上重推二十四下次從眉心分推至日月角各九下旋以指掐天庭人中承漿各一下以代針男則重揉日角穴發汗女揉此止汗女則重揉月角穴發汗男揉此止汗兩手抱兒頭搖之以順其氣再者寒熱照後圖推三關退六腑運八卦或揉胸腹然後掐兩肩井穴以完功手足推拿圖凡推三關退六腑運八卦及水底撈月無論男女俱在左手詳後圖式左手掌面八卦臟腑圖説手足穴道便考少澤穴屬小腸在小指外側去甲角寬韭葉許少衝穴屬心經在小指內側去甲角寬韭葉許關衝穴屬三焦在四指外側去甲角寬韭葉許中衝穴屬心包絡在中指尖正中挨甲處商陽穴屬大腸在食指內側去甲角寬韭葉許少商穴屬肺經在大指內側去甲角寬韭葉許足大趾前行大敦穴屬肝經大趾內側隱白穴屬脾經二趾無穴內兼肝外兼胃中趾外側厲兌穴屬胃經四趾外側竅陰穴屬膽經小趾外側至陰穴屬膀胱湧泉穴屬腎經男左轉揉之止吐右轉揉之止瀉女右揉止吐左揉止瀉大敦穴屬肝經在足大趾甲後聚毛之處凡患驚癇先拿此穴知痛者生崑崙穴屬膀胱在內外踝骨後僕參穴上驚風時對拿之脈若不動者死解溪穴屬胃經在足背彎正中凹內衝陽穴之上若按之其脈不動者死鬼眼穴屬胃並三陰經在膝蓋下之右骨陷中昏死身仰對拿四穴即平委中穴屬膀胱在足膝彎內凹中驚癇身往前僕者將穴向下掐住即直按推拿揉掐特幼科之捷徑耳金鑑幼科絶不言此而專主方藥尚矣然亦頗便俗用茲據靈樞經銅人圖天星奇穴等書考其分寸明其行列繪圖立説於前聊以便初學云爾至於燈火艾火宜忌須分不得不刪繁就簡今接經訂正分別於下燈火圖説凡用燈火要在臍風急驚初發之時用之輒效症若現齊用亦無益至若症候並未見出二三宗無故預用燈火防之此為誅伐無過反生雜病蓋小兒純陽之體或有胎熱鬱於皮里肌肉之間將發為丹毒瘡疹疫火諸症卒遇燈火升提毒爾火威內外交熾貽害不淺他如夏秋燥熱尤宜慎用也臍風燈火圖式先從囟門起次眉心人中承漿及兩手少商穴各一燋方頂臍心一燋又輪臍六燋共燈火十三燋驚風燈火圖式先從囟門眉心各一燋次當臍心一燋又輪臍六燋方將兩手合谷穴各一燋再於兩足內上四崑崙穴各灸一燋共燈火十五燋名曰元宵燈火會陰穴起上循胸腹中行至下唇止俱屬任脈長強穴起循背脊過腦頂至上唇止俱屬督脈集成回生艾火凡用燈火皆為臍風驚風實邪升散之用若四時感冒及瘧痢吐瀉慢驚慢脾痘疹瘡瘍均宜隨症調治縱有抽搐之症亦忌用燈火至於久病體虛氣怯忽然精神憒亂不省人事者則當用艾火挽回之灸法取肥實生薑切片大如拇指厚一分許貼定尾閭穴上在腰俞下脊骨盡頭正中動脈之處又貼定命門穴上在腰脊正對臍心之處二穴各用艾茸搓丸如黃豆大安放薑片上香火點燃各灸三壯又另切薑片貼定關元穴上在氣海穴下如前灸法每灸三壯蓋此火能收回散失之元陽歸諸氣海不特小兒可用凡男婦大小一切中風中痰厥陰虛寒竭脫之症咸宜用之附法凡小兒中惡客忤以及痰蔽火伏風搐氣結乍然昏死者即掐人中穴輕者一掐即啼倘不即醒旋拿兩手合谷穴如又不醒須重掐中指中衝穴倘仍不效則搓艾丸如椒目大安放中衝穴上灸之即活蓋中衝穴乃厥陰心包絡之脈出乎其經與少陰心藏相通此穴一灸艾氣通心自然醒活若心氣已絶灸至三丸不見效者不治按灸法顧忌繁多動關終身穴道分寸稍有不明不如勿用之為愈也初生門拭口法嬰兒初生須用軟棉裹指拭淨口中不潔繼以燕脂蘸茶清擦口舌永無口病古云子未啼時先取穢血按兒在胞衣之中以臍帶資生胞中皆是氤氳精氣生長蒸化並無血脈兒口之血從何而來或恐仰面下地開口啼時被産母穢血誤浸入口則拭法亦切要矣下胎毒甘草法粉草三錢切片煎汁布濾去滓以棉蘸洗兒口茶匙挑滴令兒咽之粉草甘平和五藏解百毒四時可用虛實皆宜黃連法川連一錢捶碎煎汁布濾去滓茶匙頻頻挑滴兒口以臍糞下為度黃連苦寒清熱解毒夏秋月有胎熱者宜之寒月夾冷者忌用朱蜜法硃砂末五分煉蜜調勻白湯沖化頻滴兒口令兒咽下硃砂鎮心定驚祛邪蜂蜜解毒清熱潤腸然胎元弱者亦忌用豆豉法豆豉煎濃湯每用茶匙挑滴令兒咽下三五口能解毒祛風豆豉輕腐宣發之藥凡怯弱之兒及春冬月服此最宜鹽茶法陳茶一撮入鹽少許煎成湯以布蘸洗兒口頻挑滴令咽下初生面紅唇赤口熱便閉有胎熱者每日服此最稔當又效捷淡薑法生薑煎淡湯軟棉蘸洗兒口日用數次以去寒涎開胃和中初生面色唇口淡紅㿠白及四時胎寒者皆可與服斷臍嬰兒初生斷臍當以五寸余為度太長則損肌太短則傷藏先將剪刀向火中烘熱剪斷臍帶次用燒紅烙鐵或紅火炭煤塊及大紙捻蘸桐油點燃繞臍帶烙焦帶口旋用烙臍餅子安灸臍上以防風邪外又用胡粉散敷臍帶間將軟絹新棉如法包裹以避尿濕風邪要不鬆不緊烙臍餅研爛豆豉一錢麝香五釐臨時溶化黃蠟一錢乘熱和勻前藥量臍大小捻作餅子放剪口上炭火灸溶封住帶口胡粉散木粉乾薑白石脂甑帶灰棉花灰各一錢麝香五釐共研極細每用一二錢敷撒臍上將帶盤好新棉蓋定如法包裹以避尿濕三日後開看臍自脫矣預燒發灰艾灰或棉花舊氈褐子等灰研細篩末壓住臍心並撒周圍上蓋熱艾茸一塊用布包裹凡倉猝臨産藥味備辦不及者須隨其鄉俗所常用之法用之大抵斷臍以五寸余為度先要約定以苧麻緊緊扎住烘熱剪刀一刀剪斷即取火炭烙焦帶口若搓大紙捻蘸桐油點火灼焦更妙預燒發灰艾灰之類干撒臍腹之上以薄棉隔住盤帶在上又蓋新棉方用軟布包裹要不鬆不緊如太鬆恐臍帶動搖牽扯臍心作痛太緊恐兒腹漸長氣滯不通腹痛多啼此項惟在乳母以意消息向溫暖處緊則放鬆鬆則扣緊三日後臍帶落時取發灰之類壓住臍心上蓋熟艾一塊如法包裹古法自初生以至半月臍上用碾細熟艾數塊輪流隔住外以軟帛裹定尿濕則換之兒生永無災疾如無艾茸代以棉絮俗用麻油潤臍最不妙蓋臍心喜溫惡濕麻油性冷多生變症慎之浴兒古法三朝浴兒為其革除汙穢也然寒涼之月亦不必泥定三日總要擇晴明天氣向無風密處浴之適可而止不可久在水中春冬恐受寒風夏秋恐傷暑濕浴湯法桃槐桑柳梅五枝等分切碎煎湯布濾去滓浴時下豬膽汁一枚以去其汙穢且能滋潤肌膚令兒不生胎瘡俗法春冬用艾湯水檀香湯夏秋用茶湯之類亦各隨其便藏衣凡藏胞衣若不謹慎於兒不利須盛在新瓶內以青布封口上蓋磚石擇向陽高燥之地天德月空處掘地三尺埋之兒自長壽無疾天德月空正月在丁二月坤三月居壬四月辛五干六甲七月癸八艮九丙十乙宮十一巽兮庚十二此是天德牢記心月空單月壬和丙雙月俱在甲與庚剃頭嬰兒滿月方可剃頭須向密室溫暖處剃之為其氣血未盈寒風易人也預研細去皮杏仁五枚薄荷五葉再同研勻滴麻油三四點加水粉拌勻剃完擦兒頭上能避風邪免生瘡癤不啼兒生落地啼聲即發形生命立矣有不啼者俗名草迷又曰夢生多因臨産時生育艱難以致兒生氣閉不通急用蔥鞭其背氣通則啼又有時值嚴寒兒氣為寒所逼亦不能啼宜用熏臍帶法急為挽回之若兒面青甲黑氣絶無聲是形難存而命已不立安望其生哉鞭背法生蔥一把火烘微熱輕輕鞭兒背上如無蔥以熱手輕輕擊背蔥辛通氣擊動醒神故可回生熏帶法初生若值天寒氣為寒閉啼聲不出須急用棉絮包裹抱在懷中且勿斷臍用大紙捻蘸油點火於臍帶下往來熏之令火氣由臍入腹寒得溫散氣得暖通啼聲自出集成口治夢生勿斷臍帶用燃火灸熱胞衣或用滾湯燙浸又以布袋裹貓捉其頭痛咬貓耳向兒耳邊大叫即醒一治悶臍生兒糞門有一脂膜悶住兒氣故不能啼手拍之膜破即啼或用銀簪腳輕輕刺破或煮胞衣熱入腹中其氣內鼓膜破自啼初生不乳兒出胞胎不吮乳者其故有二一因初生腹中臍糞未下致腹滿氣短嘔吐不乳當服一捻金一因孕母過食寒涼胎受其氣兒必腹痛多啼面青白而不乳者宜服勻氣散若四肢厥逆者當服理中湯一捻金生大黃白醜黑醜檳榔人參等分研末篩細每用二三分白湯沖化蜜水調服勻氣散陳皮桔梗各一錢炮薑砂仁炙草各五分木香二分研細篩末每用五分煎紅棗湯調服理中湯人參土炒白朮炙甘草乾薑等分紅棗引腹痛加木香引初生眼閉初生眼不開者由孕母飲食不節恣情厚味熱毒熏蒸致蘊兒脾眼胞屬脾其脈絡束緊故不能開內服生地黃湯生地赤芍當歸川芎花粉甘草等分煎服一方加赤茯苓豬苓澤瀉茵陳燈心治同外用熊膽洗法熊膽黃連等分滾湯淬汁頻洗兒目自開一有胎未滿月生育太早兩目合縫不開若乳養十日半月其目自開吐不止有因初生便祕腹中穢惡不淨令兒腹滿作吐不止者以一捻金下之見上不乳有因胎前受寒面青白四肢冷口吐清稀白沫者以理中湯溫之見上若生育時觸冒寒邪入里犯胃則曲腰而啼吐沫不止者宜溫散用香蘇飲又有胎前受熱面黃赤手足溫口吐黃澀酸黏者則用黃連二陳湯薑炒黃連五分薑製半夏陳皮茯苓甘草各一錢生薑引香蘇飲霍香蘇葉陳皮茯苓煨木香炙甘草薑炒厚朴麵炒枳殼薑引附哯乳哯乳者已前所服之乳不時吐出有宿乳停痰胃寒胃熱之分如面色多赤二便微祕手足指熱此為熱哯宜服和中清熱飲如面色青白糞青多沫手足指冷此為寒哯宜服溫中止吐湯如口熱唇乾夜臥不寧手足心熱此為傷乳而哯宜服平胃散如胸膈膨滿嘔吐痰涎此因停痰而作哯也宜服枳桔二陳湯若吃乳過多滿而自溢不須服藥惟節其乳則哯自止矣余見後吐門清熱和中飲薑炒黃連五分薑製半夏茯苓陳皮藿香各一錢炒研砂仁三分生薑引溫中止吐湯炒研白豆蔻製半夏白茯苓生薑等分煎湯磨木香五分取汁和勻服加味平胃散製蒼朮一錢薑汁炒厚朴陳皮炙草炒研砂仁炒神麯各五分生薑引枳桔二陳湯製半夏一錢陳皮茯苓麵炒枳殼桔梗甘草各五分薑引水煎服一方治傷乳吐哯擠乳汁入銅杓內炒焦白湯淬汁頻與兒服不小便初生不小便者胎熱流於下也熱輕者服導赤散熱盛者服八正散外用豆豉膏貼臍上則小便自通矣導赤散生地木通甘草梢淡竹葉等分燈心引加炒黃連滑石末赤茯苓更效八正散木通大黃瞿麥扁蓄赤茯苓生梔子車前子滑石末等分燈心引豆豉膏豆豉一合大螺獅取肉九枚切碎生蔥一把共搗極爛用芭焦汁調成膏烘熱貼臍用布包裹集成曰初生不尿須捶碎連須蔥二根用乳汁半杯拌勻加水二杯煎汁頻以茶匙挑滴兒口氣通尿利不大便初生一二日內即大便者俗云下臍屎此腸胃通和幽門潤澤也若過二三日不大便者名曰鎖肚乃胎中受辛熱之毒氣滯不通也其症面赤腹脹不乳多啼先用朱蜜法見前拭口設若不應當量虛實下之即用一捻金見前不乳繼用咂五心法請精壯婦人以溫水漱口咂兒前心背心兩手心兩足心並臍心五心計七處俱咂令皮見紅赤色為度須臾大便自通矣集成曰鎖肚之症因胎中熱毒壅結肛門倘用前方不效當用劫法上輕粉五分研細篩末蜜水調勻白湯沖化頻頻與服如又不效取生蔥白肥大者刮光長寸許將麻油潤濕輕輕套入穀道中以導之若至七日不通者死二便不通小兒初生大小便不通者最為急候乃因胎中熱毒太甚也急用前口咂五心法再服木通散行其熱紫霜丸開其結若至七日謂之一臘肚腹脹硬常作呻吟則難治矣木通散木通車子瞿麥扁蓄赤茯梔子枯芩甘草大黃薄荷滑石末燈心引紫霜丸代赭石火煅醋淬三五次研取淨末一錢赤石脂淨末一錢杏仁七粒去皮尖炒黃巴豆肉三粒捶爛紙包壓去油共研極細搗飯糊丸如麻子大白湯每化下三丸肛門內合初生肛門內合有因熱毒太甚壅結肛門者當內服黑白散外用蘇合香丸導之有因脂膜遮瞞無隙可通者先用金玉簪腳輕輕刺破脂膜照法導之庶可挽回於萬一黑白散黑醜白醜俱半生半炒生大黃陳皮檳榔各五錢甘草三錢元明粉一兩共曬研篩末每服五七分蜜湯調服蘇合香丸先研安息香末一兩用酒半斤另熬成膏後拌蘇合香油五錢和勻又丁香沉香木香檀香蓽茇香附子煨訶子肉鋸犀角末飛淨硃砂各一兩薰陸香冰片麝香各五錢各味照法研細篩末共入安息香膏內量加煉蜜和勻為丸芡實大空心白湯或酒聽服香丸導法每用蘇合香丸數粒捏作棗核狀納兒肛門其中香能開竅又能潤澤大便一下庶可望生如脂膜遮瞞無隙可通者用金玉簪尖當肛門處刺破脂膜照前法導之噤口此症失治多至不救其候舌上生瘡如黍米狀吮乳不得啼聲漸小由胎熱所致法當清熱疏利主以龍膽湯若肚腹脹硬二便不通者須服紫霜丸見前二便不通又有一種口吐白沫牙關緊急者此胎熱內結復為風邪外襲當以祕方擦牙散先擦其牙關次服辰砂全蠍散中病即止不可過服症退當調和脾胃主以勻氣散見前不乳龍膽湯膽草柴胡黃芩甘草赤芍赤茯桔梗鉤藤鉤煨大黃蜣螂去翅足等分紅棗引煎服祕方擦牙散生南星二錢去皮研末兌冰片末五釐用指蘸合生薑汁放大牙根上擦之如仍不開將應服之藥調如稀糊含在大人口內以筆管插兒鼻孔中用氣將藥徐徐吹入其關立開此法有通仙之妙不可不知辰砂全蠍散飛淨硃砂五分去毒全蠍三枚硼砂冰片麝香各一分共研極細令乳母唾津調成糊抹兒口唇里及牙根上附法集成沆瀣丹治噤口諸症胎熱甚者服此疏利藏腑酒炒大黃炒黃芩炒黃柏川芎各九錢炒黑醜炒赤芍炒枳殼薄荷葉滑石連翹檳榔各六錢切片曬研篩末蜜為丸重五分或一錢白湯茶酒聽其化服此集成清裡之要方也一治口噤不乳聲小便祕舌生粟粒其上齶必有白點子可用指甲刮破或用布針縛箸頭上挑破其點研鍋煙擦之一治口噤不乳蟬蛻十枚去頭足焙蠍梢七枚共研極細再入輕粉二分同研勻每用三分乳汁調糊搽兒口內牙根撮口其症口撮如囊口吮乳不得舌強唇青面色黃赤乃心脾之熱受自胎中而然也急當隨症治之如氣高痰盛者服辰砂殭蠶散二便祕結者服紫霜丸見前便閉身熱多驚者服龍膽湯見上噤口手足抽搐者服撮風散若更口吐白沫四肢厥冷雖有神丹亦無濟辰砂殭蠶散辰砂五分殭蠶一錢炒去絲蛇皮八分微炒黃麝香三分共研極細蜜調塗兒唇口牙根撮風散炙焦赤腳蜈蚣半條另研鉤藤錢半炒殭蠶焙蠍梢飛辰砂各一錢麝香五釐共研極細竹瀝每調三五釐白湯點服或用乳調以茶匙挑滴兒口咽下一方炙焦山甲尖甲五片焙蠍尾七枚研末乳調塗乳上令兒含乳咽下臍風臍者小兒之根蒂名曰神關穴近三陰喜溫惡涼喜干惡濕如斷臍悉遵前法臍風何自而起惟不知慎重以致風冷水濕之氣入於臍中兒必腹脹臍腫日夜啼叫此臍風之將作也急用驅風散治之驅風散蘇葉防風陳皮甘草鉤藤鉤煨木香炒殭蠶薑炒厚朴麵炒枳殼生薑等分煎服若寒邪深入已成臍風者又當視其所兼之形症治之如肚腹脹硬大便不通者臍風兼實也服黑白散見前肛合如面青肢冷二便不實者臍風兼虛也服理中湯見前不乳如面赤口乾身體壯熱者臍風兼熱也服龍膽湯見前噤口如撮口唇青抽搐不止者臍風兼驚也服撮風散見前撮口如痰涎壅盛氣高喘急者臍風兼痰也服辰砂殭蠶散見撮口如面青嘔吐曲腰多啼者臍風兼寒也當服益脾散人參三分煨木香煨草果炒蘇子炒厚朴炙甘草茯苓陳皮各五分生薑一片紅棗一枚煎湯頻與服附法鐵鏡曰風由臍入腹始附於肝木風附木而鳴目為肝竅故眼角有黃色由肝而逆犯脾土鼻為脾屬故鼻準又起黃色由脾而逆犯腎水上下口唇屬腎故又色黃而口撮由腎而逆犯心火舌為心苗故舌強直而含乳口松傳變到此風火歹威肺金亦隨而絶矣治法臍風初起見二三症時急用燈火治之見前附法門燈火圖説凡初起吮乳口必稍松眼角眉心忽起黃色此時用燈火治之最易黃色到準頭治之亦易若到人中承漿治之卻難及至唇口收束舌頭強直不必治矣集成曰臍風初起速用燈火開提次照症施藥可保萬全方藥詳見上亦有延至氣息喘急啼聲不出或肚上青筋吊疝作痛者此胎毒夾風邪入藏外用火功內服指迷七氣湯醋炒青皮炒研益智仁酒炒香附子薑製半夏煨莪朮藿香葉陳皮桔梗各一錢桂心甘草公丁香各五分薑棗引又方治撮口臍風芥穗防風枳殼桔梗天麻殭蠶膽星陳皮茯神甘草薄荷薑引凡撮口臍風視其牙根上齶必有白點俗名馬牙老則脹硬妨礙乳食當先挑破出血旋以棉蘸薄荷汁揩去涎血用鍋煙或京墨塗之一內因臍風原受胎時其父之命門真陽不足右尺脈細澀無神致兒稟賦虛弱生下五六日發為臍風面色慘淡不時搐搦此病生於五臟故有連産數胎無一存者此類是也一外因臍風由斷臍浴兒不知謹慎水濕風冷由臍入腹漸次傳變發為臍風多在二三四日之內或兼以上形症此病生於六腑初起按法調治無不治也臍濕臍瘡臍帶脫時須照前法包裹至於浴兒不可任意洗濯既包裹畢宜常留意勿令尿濕浸臍如不知慎遂致肚臍浸漬不幹名曰臍濕當用滲臍散煅龍骨枯礬各一錢麝香五釐研極細末干撒臍中臍濕失治久則焮赤成瘡名曰臍瘡當用金黃散黃連一錢煅龍骨水粉各一錢研極細末敷撒臍中臍瘡出血者研海螵蛸水粉頻頻塗敷草紙燒灰敷臍亦效臍突嬰兒初生臍帶突出赤腫虛大者由兒在胞胎受母積熱故初生即突也宜照前法斷臍忌敷寒涼恐伏毒內攻但令母子俱服清熱之劑自愈如十日一月內兒臍忽腫如吹色不紅赤捻動微響驚悸作啼者內服芍藥湯炒白芍炒苡仁鉤藤鉤澤泄甘草茯苓桂心生薑引外敷朴硝散朴硝二錢大黃煅牡蠣各五錢共研極細取活田螺數十洗淨用清水養一宿放去田螺將水調藥烘熱敷之又有小兒熱在腹中無所發泄頻頻伸引睡臥不寧努脹其氣衝入臍心致臍腫突虛大光浮此胎熱內發非斷臍之過內服犀角消毒飲犀角鋸末炒研牛蒡子金銀花芥穗防風甘草等分煎服外敷二豆散赤小豆豆豉南星白蘞等分研極細每用五分搗芭蕉汁調敷臍之周圍日換二次余法詳彤園醫書外科天釣小兒天釣症由邪熱痰涎壅塞胸間不得宣通發時驚悸壯熱眼目上翻手足瘛瘲爪甲青色症似驚風但目多仰視較驚風稍異如痰盛兼搐者服九龍控涎散驚盛兼風者服牛黃散搐盛多熱者服鉤藤飲爪甲若青者主以蘇合香丸見前肛門內合九龍控涎散赤腳蜈蚣一條酒塗炙焦去油乳香煅枯明礬真天竺黃炒荊芥穗各一錢雄黃臘茶炙草各二錢緑豆一百粒半生半炒共研末篩勻每服五分薄荷湯調下牛黃散另研牛黃硃砂蠍梢各一錢天竺黃鉤藤鉤各二錢麝香五分共研細末每服二三分白湯調下鉤藤飲人參炙草焙全蠍煨天麻鉤藤鉤羚羊角屑等分煎服按天釣乃內熱痰盛應減去人參內釣內釣者多因肝藏素病外受寒冷其候糞青潮搐作止有時傴僂腹痛曲腰而啼口吐涎沫症似驚癇但目有紅絲血點為異如瘛瘲甚者服前鉤藤飲見天釣腹痛急啼者服木香丸若肢冷甲青唇口黑者當服養藏散然內釣至此乃中寒陰盛不治之症木青丸煨木香炒茴香焙全蠍鉤藤鉤乳香沒藥等分研細篩末搗大蒜少許取汁和丸如梧子大曬乾每用二丸煎鉤藤湯化服養藏散煨木香沉香肉桂當歸川芎各二錢丁香一錢共研極細每用一錢淡薑湯調服盤腸氣痛此症俗稱內吊皆由寒邪所摶肝腎居下故痛則曲腰宜服白豆蔻散外用尉臍法其效甚速白豆蔻散白蔻砂仁陳皮炙草煨莪朮醋炒青皮酒煮香附等分研為細末每服一錢紫蘇湯調下尉臍法切碎生薑淡豆豉各二錢生蔥白五莖食鹽一兩共搗如泥入鍋炒熱用絹包裹頻頻尉臍腹附法集成調中湯通治盤腸氣煨木香川楝肉炒青皮炒枳殼炒萊蔔子去油沒藥茯苓炙草桂心等分蔥白引鐵鏡曰盤腸氣小腸氣膀胱氣俱痛在臍下氣海穴兩旁亦有筋腫到腎囊邊痛不可忍均用川楝肉荔枝核橘核小茴等分焙𧈟研極細末每用一錢酒水調下多服自愈胎黃遍體面目皆黃其色如金由孕母濕熱太盛兒在胎時受母熱毒故生下有是症也法當滲濕清熱如色微黃者只服加味生地黃湯見前眼開不開若色深黃者服後犀角散鋸犀角屑茵陳蒿天花粉龍膽草煅寒水石生地升麻甘草等分水煎不拘時服集成曰胎黃症有兼眼閉不開身體壯熱或大便祕尿赤如梔子汁或生小瘡不思乳食者令母子同服生地黃湯胎赤因孕母過食辛熱之物致毒熱凝結蘊於胞中小兒生下頭面肢體黃若丹塗故名胎赤熱盛便利者當服清熱解毒湯熱盛便祕者服蔣氏化毒丹按胎赤有似胎風見嬰兒外科清熱解毒湯黃連生地赤芍木通連翹甘草金銀花薄荷葉燈心引蔣氏化毒丹犀角鋸末黃連元參桔梗甘草薄荷葉生大黃各一錢青黛一錢共研極細煉蜜為丸重六分燈心湯化服胎熱此症通面紅焰異常口氣莽莽蒸手大便祕結小水短赤舌或腫眼閉胞浮或身發熱啼叫驚煩治遲恐發丹毒主以沆瀣丹見前噤口鐵鏡曰此症有兼牙根腫硬不能食者用銀針於牙關上下合骨處刺破出血自能吃乳隨用灶心土車前草連翹甘草煎服熱甚服大連翹飲連翹赤芍歸尾木通芥穗防風甘草赤遊風此症多由胎中毒熱而成或生後過於溫暖毒熱蒸發於外以致皮膚赤熱而腫色若丹塗遊走不定行於遍身故名赤遊風雖與外科赤遊丹相似但多發於頭面四肢之間若內歸心腹則危矣初服犀角解毒飲鋸犀角末炒研牛蒡川連生地赤芍甘草芥穗防風連翹銀花燈心引煎服數劑若不見效次服藍葉散曬𧈟藍葉微炒大黃犀角末生梔子柴胡黃芩各二錢升麻石膏甘草各一錢共研極細每用八分竹瀝調糊滾湯沖服煎服亦可兒氣怯弱者可去大黃砭血法口吮毒血各聚一處打碎細料磁器取有鋒芒者劈開竹箸夾住以線縛定兩指輕捉箸梢令磁鋒對聚血處再用箸一根頻頻擊刺砭出毒血如患在頭者不用砭法只用臥針倒挑患處令出毒血凡小兒未滿百日忌用砭法以其肌肉難任也可用豬肉貼法用生豬肉切片攤貼赤腫處須頻頻更換附法塗法生赤小豆研細篩末用雞子清調塗干則再塗天保采薇湯治赤遊風初起先服此以解表羌活獨活柴胡前胡升麻葛根枳殼桔梗川芎甘草赤芍茯苓陳皮藿香薑製半夏薑炒厚朴法制蒼朮煎湯溫服表甚用薑蔥引此方製為丸能調小兒諸病四順清涼飲治赤遊風服前表藥後次服此湯以清裡當歸生地白芍柴胡甘草便祕加大黃加味連翹飲此表裡兼治之劑連翹歸尾赤芍木通芥穗防風甘草柴胡黃芩梔子瞿麥蟬蛻炒牛蒡滑石石膏末車前子燈心引胎肥胎肥者初生肌膚虛厚肉色通紅面赤而黑睛多滿月以後漸次肌瘦五心熱而大便祕白睛忽變粉紅色此因孕母過食肥甘濕熱流入胞中致初生形質虛肥血分壅熱急服加味連翹飲見上赤遊風外用浴體法天麻檀香威靈仙各五錢硃砂青黛枯礬各二錢桃枝一尺共切片煎湯蕩溫浴兒數次胎怯胎怯者初生面無精光肌肉澆薄大便白色目無神采時作哽噎此非育於父母之暮年即生於産多之孕婦但當調理後天常服調元散人參炙草茯苓陳皮土炒白朮焙𧈟枸杞當歸各三錢炒黃陳米三合共研極細每用龍眼湯調一二錢日二服胎癇胎癇者內因兒在胞時孕母曾受驚嚇氣傳於子兒初生頻作抽搐身熱面青牙關緊急腰直身強目睛斜視不乳多啼當按二卷癇症門治之胎搐胎搐者外因風邪襲入經絡身先發熱面青多啼然後發搐手足抽掣較癇稍輕而無牙噤強直等症主以天麻丸煨天麻焙全蠍炒殭蠶法半夏膽星羌活防風各二錢鉤藤鉤五錢共研極細蜜為丸重五分日服三丸薑湯化下胎驚驚與風名異而症同如面青搐搦身熱背強口噤昏迷是也若目直竄視最為難治宜按前圖拿精威崑崙諸穴又曲兒小指重揉外勞宮隨用元宵燈火定之內服天保采薇湯見前赤遊風胎寒集成曰有內因孕母時患熱病多服寒涼藥或過食生冷致寒氣結於胞胎嬰兒生下昏沉多睡面白唇淡或瀉白吐乳此得自胎中內因病也有外因寒冷侵襲百日之內忽患戰栗面青口冷手足捲曲腹痛多啼此生後受寒外因病也初起俱服指迷七氣湯見前臍風若日久不愈虛寒兼吐者當服助胃膏人參肉桂木香丁香炒白蔻煨肉蔻炒益智仁各一錢土炒白朮炒砂仁炒淮藥藿香葉茯苓陳皮炙草各三錢共研極細蜜為丸重八分白湯化服鐵鏡曰兒初下地或一日半日內面青如靛口不吮乳先有啼聲後漸不啼而昏憒者視其眼角與鼻準俱無黃色口又不吹噓此定是胎寒按前圖式先拿精威崑崙諸穴其聲必出即不出俱用元宵燈火開提之青色漸退為吉須防作吐蓋藏腑皆寒胃虛寒而吐逆急用人參一分土炒白朮桔梗藿香各一錢生薑引煎湯頻頻與服大抵胎有寒而外無感冒則遲發於數日之間胎有寒而復感風寒則速發於一日之內其症面青唇白或瀉白吐哯腹痛多啼口不吮乳肢冷捲曲勿誤作臍風治當以辨臍風之法辨之附法附子理中湯治胎寒寒盛腹痛吐瀉人參炮附子各五分土炒白朮炙草炮薑各一錢煎湯乘熱挑滴兒口頻頻咽下香砂六君湯治胎寒兼有痰涎壅出人參炙白朮茯苓炙草陳皮法半夏藿香葉炒研砂仁生薑引鉤藤膏治胎寒日久恐成內釣等症去油乳香沒藥煨木香炒殭蠶等分研末煎鉤藤湯調膏服夜啼初生夜啼其因有二一曰脾寒面色青白手腹俱冷不欲吮乳曲腰而啼也主以鉤藤飲一曰心熱面赤唇紅身腹俱熱小水不利煩叫多啼也主以導赤散若無諸症但多啼者只用蟬花散鉤藤飲當歸川芎茯苓茯神炒芍炙草煨木香鉤藤鉤紅棗引蟬花散蟬蛻一兩去頭足研細篩末每用五分煎薄荷湯調服導赤散見前不小便附法一治心熱夜啼面紅多淚見燈啼甚無燈稍住手腹皆熱小便亦澀法宜按前圖式用水底撈月引水上天河退下六腑及運八卦推坎入艮諸法旋服導赤散加天麻梔子薄荷車子一治心血不足而啼其候睡熟驚悸忽啼神色慘淡舌淡紅而尿利宜服安神湯人參炙術當歸茯神陳皮法半夏炒芍棗仁五味子薑棗引一治藏寒腸痛而夜啼者手按臍腹其啼必減外症肢冷麵青不乳宜服人參乾薑炙草藿香當歸炒芍桔梗陳皮一治下焦虛寒夜深多啼少睡天明則已面淡白尿清長宜溫下焦用陳荷葉蒂三個艾葉七皮蒸湯頻服醋炒艾茸乘熱用絹包頻尉臍腹一治脾胃兩虛或吐或瀉食少而夜啼者用加味六君子湯人參土炒白朮茯苓炙草陳皮法半夏木香炮薑引一治異物所侵目有所視口不能言睡中驚惕抱母大哭面色紫黑者用遠志肉炒棗仁茯神炙草陳皮竹茹薑棗倘仍夜啼審其並無以上形症可將雜色紙張作一異物令兒視之隨對兒焚化疑釋自止按有因夜醒抱兒坐慣或遊走拍慣或執燈亮戲慣或乳母乳少兒不得飽皆能致夜啼不可不辨不寐嬰兒不寐有因心血不足睡中雖不聞響動而無故驚醒不得安眠宜服人參安神湯人參當歸生地茯神土炒白朮炒研棗仁炒遠志肉炒白芍龍眼肉生薑引有因膽經虛怯睡中稍聞人聲響動兒即驚醒再不熟睡而多啼治用參竹湯人參竹茹陳皮甘草去心麥冬淡竹葉製半夏小麥粳米多睡嬰兒多睡乃因膽氣虛健運之令不行故肢體倦怠貪眠嗜臥宜服加減六君子湯人參炙術茯苓炙草製半夏炒研益智仁煨木香薑棗引另有風溫症身重喜睡但鼻息鼾鳴身熱自汗為異治詳三卷瘟疫門變蒸天地生化萬物必以春溫夏熱兒之初生變生形神亦同此理自生之日至三十二日曰一變至六十四日曰一蒸變則長其百骸生其藏府蒸則增其智慧發其聰明也十變五蒸之外又有三大蒸合計五百七十六日變蒸既畢形神具足此後則不復變蒸矣然每變蒸之時其狀惟身微熱耳冷尻骨冷而無他病情狀蓋以陰陽和變生化形神故無他病身微熱者以陰陽氤氳變蒸之氣外發也耳尻冷者耳尻俱屬陰以陽不傷陰而與陰和之象故不熱也張景嶽曰變蒸之説古所無也西晉王叔和始言之自隋唐巢氏以來則口相傳演其説益繁以豫觀之似有未必然者蓋兒胎月足離懷氣質雖未成實而藏府已皆完備及既生後凡長養之機則如月如苗二息不容有間百骸齊到自當時異日新豈復有此先彼後如一變腎二變膀胱及每變必三十二日之理乎又小兒之病與不病余所見所治者蓋亦不少凡屬違邪非因外感即系內傷未聞有無因而病者豈真變蒸之謂耶又見保護得宜自初生至長了無疾苦抑又何也大抵變蒸之説未可全信余恐後人執泥故就其説指陳之夏禹鑄曰變蒸之候口唇舌色俱照尋常燒熱或有重輕精神卻不喪失口氣必不暴戾輕則三日即解重則五六日即平不可妄投方藥亦有熱盛發搐者但耳尻俱冷口上齶有白泡如魚目粟米為異耳初生無皮有因月分未足生育太早體未完實通身浸漬紅嫩而光此係胎元未足內服當歸飲外用稻米粉撲法數日內皮漸生成完而堅實矣有因父母素患楊梅結毒傳染胞胎故生下或上半身赤爛或下半身赤爛甚則色滯紫黑肉潰無皮此為遺毒惡候內服換肌消毒飲外搽清涼膏敷撒鵝黃散解去毒氣皮可復生當歸飲人參黃耆當歸生地白芍川芎甘草蒺藜白鮮皮制何首烏煎汁去渣頻頻挑滴咽下撲粉法早稻白米磨粉篩細時時撲之戒勿揩動皮自漸生治遺毒方換肌消毒飲當歸生地赤芍川芎甘草白芷苦參防風連翹銀花皂角刺白蘚皮土茯苓燈心引清涼膏角子石灰一斤用水泡化沒指半許露一宿面上有浮起如雲片者輕輕帶水掠取隨其多少對麻油一半以順箸攪成膏雞翎蘸搽鵝黃散川黃柏煅石膏上輕粉等分研末篩極細濕則干撒干則用豬膽汁調搽腐臭津水加冰片末少許毒盛加雄黃或加銀珠目爛赤熱目爛者胞邊赤爛痛癢難睜因胎中蘊熱生後熱毒上攻於目故有是症內服生地黃湯見前眼閉不開外用真金散黃連黃柏赤芍當歸各一錢杏仁五分去皮尖炒黃切碎研末用乳汁浸一宿日中曬𧈟再研至無聲細絹篩過每用一字搗生地汁調成糊乳調亦可頻頻搽點患處附法經曰諸脈皆屬於目又曰東方青氣入通於肝開竅於目夫目雖為肝竅而五藏俱備焉瞳仁屬腎主骨黑睛屬肝主筋白珠屬肺主氣兩角屬心主血上下眼胞屬脾主肉心色赤赤盛為實熱淡赤為虛熱肝色青青盛為風熱淡青為肝虛脾色黃黃盛為濕熱淡黃為脾虛凡目無精采及白睛多黑睛少者肺腎俱不足也集成曰目內赤色心經積熱上攻也必舌赤尿短宜瀉心火從小便中出服黃連防風赤芍木通甘草梢淡竹葉燈心引外蒸膽草水洗其目目內黃色脾熱也上下眼胞黃腫脾熱兼風濕也宜瀉脾火散風濕服古瀉黃散防風二錢黑梔仁五分甘草藿香石膏末各一錢目之上下左右如被風吹連札不住此肝風入目也若初生目直視者肝熱也熱氣入目障其筋脈兩角束緊不能轉運及目赤腫痛者均服瀉青湯羌活防風當歸川芎膽草梔仁酒炒大黃淡竹葉引小兒久嗽致目眶腫黑如被撞磕目珠紅赤如血者謂之血眼當內服瀉白散桑白皮地骨皮各二錢甘草一錢粳米引加桔梗錢半炒芩炒連各五分外用水浸透生地黑豆搗如泥作餅敷貼熏黑自消清陽散火湯治兒目羞明喜暗風熱盛者酒炒條芩芥穗歸尾川芎連翹梔仁羌活防風甘草石膏薄荷燈心懸癰凡喉里上齶腫起如蘆筍盛水狀者名曰懸癰胎毒上攻也須以箸頭扎針留鋒刺之瀉去青黃赤汁未消來日再刺刺後以綿蘸鹽湯拭口搽一字散硃砂硼砂各五分朴硝一分冰片五釐共研極細蜜調少許鵝翎蘸搽口內余法詳見彤園醫書外科二卷垂癰生喉前上齶下垂如珠紅腫脹痛不能吮乳三四日後宜用針挑破放出膿血腫痛必減此係積熱凝結宜內外交治內服五福化毒丹元參桔梗赤茯苓各三錢膽草牙硝青黛川連甘草各一錢人參硃砂各三分冰片五釐共研極細蜜丸重五分薄荷湯化服冰硼散硼砂元明粉各一錢硃砂冰片各一分共研極細磁瓶收貯或竹管吹入或雞翎蘸掃重齦小兒在胎有熱蓄於胃中故牙根腫如水泡名曰重齦先用銀針刺破鹽湯拭淨外敷一字散見上懸癰內服清胃散當歸生地丹皮各一錢熟石膏錢半升麻川連各五分或加黃芩一錢燈心引鑽牙疳由脾胃積熱牙根肉內鑽出骨尖如刺疼痛異常先用鈹針刺開好肉取出骨尖血若不止頻以濕紙換貼即止敷以冰硼散見上垂癰內服蘆薈消疳飲蘆苔胡連玄參桔梗羚羊角末炒研牛蒡炒梔仁石膏末銀柴胡淡竹葉薄荷葉甘草梢酒炒大黃等分煎服走馬牙疳由積熱毒火上攻牙根腫爛隨變腐黑臭穢難聞有因癖疾火毒攻牙者服前蘆薈消疳飲又有因麻痘後餘毒攻衝者當服清肝解毒湯川連柴胡人中黃各五分防風芥尾知母連翹元參淡竹葉熟石膏羚羊角末炒研牛蒡各一錢燈心引外蘸陳茶洗淨常搽溺白散人中白五錢煅枯鹽梅肉二錢枯礬一錢共研極細頻搽腫爛處余按彤園醫書外科二卷又有牙齦腐爛時津白膿者此係胃中濕熱為病外用鹽湯蘸洗常搽胡桐淚散胡桐淚北細辛白芷川芎製蒼朮各一錢青鹽二分煅寒水石二錢共研極細頻頻吹搽內服犀角升麻湯犀角如無以川連代升麻黃芩川芎白芷羌活防風甘草元參生地等分煎服牙癰癰初起牙床焮腫疼痛發熱惡寒必待腫處宣軟方可刺破茶湯拭淨隨塗搽冰硼散見前懸癰初起服荊防敗毒散荊芥防風羌活獨活柴胡全胡枳殼桔梗川芎茯苓薄荷甘草生薑蔥白去荊防加人參名人參敗毒散牙疔疔因胃火與大腸濕熱上攻牙根腫起一粒形如粟米疼脹麻悶宜針破出血拭淨隨塗拔疔散內服解毒湯拔疔散另研硇砂硃砂各一錢又白礬食鹽各錢半拌勻燒紅鐵鏽刀將鹽礬煅枯擇丁日午時合前二味研勻篩細每用少許頻塗疔上黃連解毒湯黃連黃芩黃柏梔子等分煎服附咬牙寒戰小兒夢中咬牙乃因胃與大腸積熱生風故相擊有聲必在夢中者風屬陽動則風行於外靜則風行於里也當服宣風散去白陳皮炒香黑醜各一兩檳榔炙草薄荷葉各五錢共研極細臨臥白湯化下一錢按病中咬牙寒戰有寒熱二症如身體壯熱煩躁口渴大便祕結小水赤澀脈洪數者熱也蓋胃熱則咬牙肺熱轉發戰治當清內熱如身涼惡寒二便清利脈沉遲者寒也蓋胃寒則咬牙肺寒則寒戰治宜解表集成曰小兒懸癰牙疳牙疔皆因脾胃夾熱而成內服沆瀣丹見前噤口外以針挑破茶湯蘸洗頻搽碧雪散青黛硼砂蒲黃甘草元明粉等分研極細常用神效鵝口因白屑生滿口舌如鵝之口也由在胎中受母飲食熱毒之氣蘊於心脾二經故生下發於口舌內服清熱瀉脾散外用發蘸井水拭日頻搽保命散日敷二三次自愈倘治遲必口舌糜爛吮乳不得則難痊矣清熱瀉脾散薑炒黃連炒梔子煅石膏赤茯芩生地黃芩燈心引保命散煅枯白礬水飛硃砂各三錢馬牙硝五錢共研極細取白鵝糞水攪取汁糊藥頻塗舌與口角上或搽碧雪散見上外治法頭髮蘸井水揩拭口舌帶出白屑後方搽藥又法煎毛李球汁濾去渣粗布扎箸頭蘸洗數次又法粗青紗蘸薄荷湯重刮口舌雖刮出血無妨附法口糜口瘡集成曰鵝口屬心脾積熱內服沆瀣丹見前噤口外用前方固為得法至若口糜乃口內生瘡糜爛成片是膀胱移熱小腸膈腸不便故上為口糜宜服木通生地赤茯豬苓赤芍澤瀉甘草梢淡竹葉燈心引外搽碧雪散見前牙疔余見後泄瀉門凡小兒口瘡喉瘡均用鳳凰衣微火焙𧈟生橄欖燒灰存性孩兒茶等分研細兌片末少許或搽或吹凡患口瘡服涼藥不效者視其瘡色必淡而放光乃肝脾之氣不足虛火炎上也法宜散之劑外研吳萸末一兩拌灰面三錢醋糊作二餅貼兒兩足心以布包裹過二夜即引熱下行吐瀉後生口瘡俱用此溫胃湯治脾胃虛寒口流冷涎浸漬兩頤者薑製半夏醋炒青皮土炒白朮炮薑陳皮炙草木香異功散治無故頻頻撮口脾氣不和者人參炙術茯苓炙草陳皮薑棗引經曰中央黃色入通於脾開竅於口又曰脾氣通於口脾和口能知五味又曰南方生熱熱生火火生心心竅在舌心氣通於舌心和舌能知五味木舌此因心脾積熱而成蓋脾之脈絡在舌下又舌為心苗遇火上衝令舌腫滿木硬不能轉動故名木舌外敷川消散內服瀉心導赤湯川消散朴硝五分真紫雪二分炒鹽一分其研極細竹瀝調敷舌上或敷碧雪散見前牙疔或搽冰硼散見前懸癰瀉心導赤湯黃連生地木通甘草淡竹葉燈心引重舌因舌下近舌根處其腫形似舌故名重舌此心脾蘊熱外吹涼心散內服清熱飲黃連生地木通甘草連翹白蔻肉淡竹葉煎湯時時灌之涼心散乳汁浸黃連曬𧈟煅幹人中白黃柏硼砂青黛各二錢朴硝一錢冰片二分共研極細頻吹搽之鐵鏡曰木舌重舌皆先用銀針從旁刺令血出蘸鹽湯拭淨外搽碧雪散見前牙疔內服川連連翹木通甘草梢淡竹葉灶心土羚羊角末煎湯多服吐舌兒因心經熱極面紅煩躁口渴尿赤其舌伸長而收緩宜多服瀉心導赤湯見上木舌亦有大病後脾藏虛熱吐舌動搖不即收縮者俗名蛇絲驚審其無躁渴便祕面唇舌色淡者此脾胃津液不足勿作熱治只服七味白朮散人參炙術茯苓炙草乾葛藿香木香薑棗弄舌舌在口中時時搖動者因心脾有熱以致唇焦舌乾煩熱便穢宜先服古瀉黃散見前目爛附法後服瀉心導赤湯見上木舌附法凡刺木舌重舌用布針縛箸頭上留鋒少許向舌尖舌面舌旁刺破出血蘸茶洗淨隨搽冰硼散見前懸癰若誤刺舌心舌筋舌根多令出血不止頻以鍋煙塗之倘割斷舌根必無生理凡嬰兒急欲吮乳而口不能吮煩叫尿赤此心脾有熱舌強不能轉送也服炒連炒芩炒柏炒梔子赤茯苓澤瀉茵陳燈心引凡舌忽然脹大腫硬氣絶不通名曰纓舌用皂礬一兩瓦上煅紅刮取研末塗舌數次自消若中毒舌脹治詳四卷凡舌根下忽有筋一條上絆舌尖或粗如線梗起牽扯致舌縮不能吮乳各曰絆舌症當用扁針從中挑斷其筋隨塗蒲黃末止其血凡舌尖咬斷亦可復生取活螃蟹放炭火上炙焦研極細末頻頻塗斷處漸次生矣喉風蛾痹經曰咽喉者水穀之道喉嚨者氣之所以上下者也一陰一陽結謂之喉痹蓋咽為胃管主納水穀而居後喉為肺管主呼吸而居前又曰左為食喉右為氣喉乳蛾疳癬統載彤園醫書外科二卷茲附數方以備緩急清咽利膈湯治喉風總方炒研牛蒡芥穗防風連翹梔子玄參桔梗炒連條芩銀花甘草薄荷大黃芒硝淡竹葉便利去硝黃牛蒡解毒湯治蛾風喉痹炒研牛子炒青皮升麻桔梗條芩花粉甘草玄參梔子川連連翹生地防風葛根白芷赤芍外吹川消散見前廣筆鼠黏湯治喉癬喉閉生地貝母各錢半炒牛子玄參花粉甘草射干連翹各一錢炒殭蠶苦竹葉各五分外吹保命散見前鵝口少陰甘桔湯治漫喉風午後作痛身熱足冷脈微者桔梗三錢甘草元參柴胡川芎陳皮條芩各一錢酒炒升麻羌活各六分蔥白引甘露飲治漫喉風色淡微腫面赤咽乾不渴而脈虛大者天冬麥冬生地熟地石斛茵陳甘草條芩炒枳殼蜜炙枇杷葉煎服吹冰硼散小兒咽喉生瘡牽連鼻孔內赤爛者煅枯鹽梅肉二錢炙焦穿山甲一錢枯礬五分共研末篩細頻吹搽或用冰硼散碧雪散見懸癰牙疔小兒喉瘡破爛難進乳食者蒸熟豬腦髓入鹽少許乘熱與兒咽下若喉中結核不通乳食者蜜調鍋煙每三分白湯沖服數次自消小舌吊下色赤腫大心脾熱也鹽醋調吊揚塵箸頭蘸點數次愈若色淡紅吊下尖長乃屬虛熱研硃砂末頻頻吹點余法見外科鼻病摘要經曰西方白氣入通於肺開竅於鼻又曰五氣入鼻藏於心肺外徵於鼻小兒鼻塞肺氣不通也肺主皮毛外為風寒壅遏故不宣通內服川芎散川芎白芷各二錢甘草藁本各一錢北細辛去皮尖杏仁各五分生薑引外研細辛末吹鼻取嚏鼻瘡諸症詳見彤園醫書外科通氣散治風寒侵肺鼻塞流清涕者羌活防風白芷川芎獨活芥穗葛根木通甘草細辛炒升麻製厚朴薑蔥引萬金膏治流涕日久成齆不聞香臭羌活細辛白芷川芎桔梗甘草石菖蒲薄荷葉共研極細薑汁調膏白湯沖服辛荑散治鼻流濁涕稠黃腥臭膽熱移腦名曰鼻淵辛荑淨仁炒蒼耳子薄荷葉白芷梢各五錢炒連一錢共研極細每用一錢茶調服小兒鼻流臭黃水日久不愈此濕鬱生熱有蟲蝕腦也名控腦砂常服天羅散經霜絲瓜藤燒灰存性研細篩末米湯每調一錢日三服小兒鼻常乾燥乃因心脾兩熱上蒸於肺津液枯竭不潤於竅當清熱潤燥用生地麥冬木通甘草花粉桔梗赤芍知母淡竹葉小兒鼻竅生粟瘡乾燥痛癢久則鼻外牽腫紅熱焮痛內服黃芩湯酒炒黃芩桑皮赤芍連翹桔梗芥穗薄荷麥冬甘草梔仁外搽定痛散胡連熟石膏各二錢硃砂三分冰片五釐研細末頻頻吹搽附唇風生唇之上下初起發癢色赤腫硬久則破裂流水痛如火燎又似無皮或唇瞤動歪口吸氣初起服荊防敗毒散見前牙癰次服清咽利膈湯見前喉風外搽真金散見前目爛余詳彤園醫書外科凡唇燥裂接飯甑上氣水頻搽唇破流血頻搽冰硼散見前懸癰耳病摘要經曰北方生寒在藏為腎在竅為耳又曰腎氣通於耳腎和耳能聞五音小兒腎氣實其熱上衝於耳致精液瘀壅為膿或為清汁亦有生水入耳停作膿灌均搓綿紙捻入耳展去膿水吹後藥末俱服蔓荊子散去殼荊子蜜炙桑皮酒炒升麻去心麥冬前胡葛根赤芍甘草木通赤苓生地烏藥蔥白引頻頻熱服吹撒龍骨散煅龍骨枯礬炒黃丹各二錢水粉一錢麝五釐研細篩末先用綿捻展淨膿汁將竹筒吹入少許二味拔毒散治熱毒攻耳耳外赤腫焮痛明雄黃五錢白礬四錢共研極細蜜水調搽豬油調更妙小兒耳後生細瘡日久延開摺紋上下狀如刀裂甚者浸淫頭項破爛不堪名為月蝕瘡內服前蔓荊子散去升麻桑皮重加柴胡外搽黃柏散川柏枯礬滑石煅龍骨炒黃丹海螵蛸等分研極細濕則撒之干則用豬油蜜水調搽余法另詳彤園醫書外科凡無故耳聾腫痛流膿腥臭者用紙捻展淨搗虎耳草汁頻滴自愈或滴童便花酒蟲入耳者頻滴麻油膿不幹者研石榴花末吹撒氣閉耳聾削石菖蒲作挺紙包煨熱去紙插耳數日取出其耳自通耳忽內痛如蟲攻衝或干痛兼癢或突出血水取蛇蛻燒存性篩末每吹少許自定以上五官其餘症治詳見彤園醫書外科二卷
