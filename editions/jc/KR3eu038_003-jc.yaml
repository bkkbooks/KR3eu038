body:
  text: 卷之二驚風門總括心藏神心病主驚肝屬木肝病主風凡小兒心熱肝盛一觸驚受風則風火相摶必作急驚若素稟不足或因急驚用藥過峻暴傷元氣每至變成慢驚更有因吐瀉既久中氣大虛脾土衰弱肝木乘虛而內生驚風者名曰慢脾風也三者致病之因既不同故所現之症亦各異急驚屬陽必有陽熱有餘等實象也慢脾屬陰必有陰冷不足等虛象也至於慢驚初得之時陰陽尚未過損或因急驚傳變而成其中常有夾痰夾熱等證故屬半陰半陽不比慢脾純陰之病也須詳分陰陽虛實寒熱以治驚風八候八候謂搐搦掣顫反引竄視也搐謂肘臂伸縮搦謂十指開合掣謂肩頭相撲顫謂手足動搖反者身仰向後引者臂若開弓竄則目直視而似怒視則目睛露而不活其搐以男左手女右手男大指在外女大指在內為順反是為逆此八候急驚慢驚同皆見之虛實無所異惟在醫師詳審通關救急驚風搐搦必神氣昏憒皆由痰壅氣塞聚結胸中而成急用通關散吹鼻取嚏有嚏者生再審表裡虛實隨症用藥通關散生半夏豬牙皂北細辛薄荷葉等分研細竹管每吹少許急驚風急驚風證多暴發壯熱煩急面紅唇赤痰壅氣促牙關噤急二便秘澀其脈洪數皆主陽熱也然亦各有所因分別症治於下急驚症治清熱鎮驚湯治因目觸異物耳聞異聲神散氣亂面青唇赤卒然驚搐去心麥冬鉤藤鉤膽草黃連薄荷梔子柴胡木通茯神甘草淡竹葉燈心引臨服調硃砂末少許服此藥後可兼服去神鎮驚丸茯神天竺黃去心麥冬各五錢建青黛一錢炒棗仁煅龍骨薄荷葉膽星牛黃黃連梔仁當歸赤芍木通辰砂各三錢研末煉蜜丸如綠豆大擂金鉑滾衣量兒大小薑湯化下至寶丹治因心肝火盛外為風寒鬱閉不得宣通火鬱生風表裡兼實麻黃防風芥穗薄荷當歸赤芍川芎黃芩大黃芒硝連翹桔梗川連梔仁滑石甘草天麻細辛羌活獨活黃柏全蠍白附子熟石膏炙白朮炒殭蠶等分曬研極細煉蜜為丸重五分薑湯化下牛黃丸治因痰盛熱極而內動風急驚發時痰壅氣促壯熱便秘等症白醜黑醜各七錢半九轉膽星麵炒枳實薑製半夏各五錢去皮弦牙急驚附法丹溪曰五藏各有火五志激之其火隨起急驚症多因諸火內生而成也鐵鏡曰驚生於心風生於肝痰生於脾熱生於肺此一定之理也熱盛生風風盛生痰痰盛生驚此賊邪克逆必至之勢也治驚必先豁痰豁痰必先祛風祛風必先解熱解熱當從肺始蓋風寒暑濕燥火六邪之來皮毛受之即入犯乎肺肺本出熱之地燥火暑邪一入則熱與熱合而熱甚風寒濕邪一入肺竅為邪壅閉則熱無所泄而鬱極生驚法宜解熱必先祛邪祛邪之法一用拿法急驚發時照一卷手圖對拿精威二穴拿緊必有掙聲模樣再按背圖重揉肺俞二穴肺竅開啼聲必出若揉拿不醒肺氣絕矣二用推法按一卷面圖如法推掐又按手圖推三關退六腑分推總筋並兩手大指面三運八卦按一卷左手圖說從艮宮旋推入坎宮周圍運三十回又曲兒小指重揉外勞宮三十下再掐揉五指節骨一回然後將左腳委中穴往下重推三十四用燈火按一卷元宵燈火圖說如法施行亦有急驚卒死沉困不醒者按定兩肺俞穴各用燈火一燋至若心窩古法忌灸如果寒痰壅蔽不妨用燈火開提五用艾灸按一卷回生艾火法切生薑片貼定兩肺俞穴搓艾丸輪流灸三壯後方服天保采薇湯見一卷赤遊風若繫心經熱盛發為急驚煩熱狂叫者則忌用燈火艾火只用前三法更按手圖用水底撈月引水上天河二法助之內服加味導赤散川連連翹梔子防風生地木通甘草赤茯苓淡竹葉燈心引慢驚風慢驚一證有因稟賦虛弱土虛木盛者或由急驚過用峻利之藥以致轉成此症者發時緩緩搐搦時止面色淡黃或青白相兼身必溫和昏睡眼合或睡臥露睛脈來遲緩神氣慘慘大便青色此乃脾胃虛弱治宜培補元氣如虛而夾痰者服醒脾湯脾虛肝旺者服緩肝理脾湯醒脾湯人參茯苓天麻木香陳皮炙草製半夏土炒白朮炒殭蠶去毒全蠍真膽星炒陳穀米生薑引緩肝理脾湯人參炙術茯苓炙草陳皮炒芍炒山藥炒研扁豆嫩桂枝煨姜紅棗夾熱夾痰慢驚慢驚之症本無熱可言但脾虛虛熱內生故痰涎上泛咽喉氣粗身熱心煩所謂虛夾痰熱也痰熱相兼者服清心滌痰湯見急驚後調理法脾虛肝旺痰盛者服後二方青草白丸子生南星白附子各二兩生半夏浸去衣稱足七兩生川烏去皮臍五錢共研極細絹袋盛之水擺出粉末盡再研再擺以盡為度貯磁盆內日曬夜露春五夏三秋七冬十日取粉曬䘌篩細末煮糯米粥糊為小丸煎薑湯送下一錢小兒化下五分柴芍六君湯人參炙草各五分土炒白朮薑製半夏陳皮茯苓柴胡炒芍各一錢薑棗引或加鉤子天麻膽星慢脾風慢脾風症多因吐瀉既久脾氣大傷致土虛不能生金金弱不能制木肝木強盛惟脾是克故曰脾風其症閉目搖頭面唇青暗額汗昏睡四肢厥冷舌短聲啞頻嘔清水此乃純陰無陽之症逐風則無風可逐治驚則無驚可治惟宜大補脾土生胃回陽為主吐瀉亡陽者服溫中補脾湯大病後轉成慢脾者服固真湯四肢厥冷者服附子理中湯溫中補脾湯人參丁香乾薑炙草茯苓陳皮炮附子炒白朮製半夏炒研砂仁蜜炙黃耆酒炒白芍上肉桂煨生薑固真湯人參肉桂炙草炮附子各五分茯苓炒山藥炙白朮蜜黃耆各一錢薑棗引或加鉤子天麻附子理中湯人參炮附子炒白朮炙甘草炮乾薑等分服張景岳曰太陽血少者多有戴眼反張等症由太陽膀胱脈起於目內眥上額由頂下項循行至腰及足小指凡血虛不能榮養經絡者一觸寒邪則收引而急縮理固然也世俗不察視為驚風往往用截風化痰金石重墜之藥轉耗血液豈不悖哉痙病門柔痙經曰太陽病發熱汗出而不惡寒名曰柔痙其症發熱自汗口氣蒸手呵欠煩悶手足顫動頭搖口噤或戴眼反張此由風邪傷衛亦因腠理不密衣被不謹風邪乘虛客入太陽尚屬虛邪為病法當解肌調和榮衛倘誤認作急慢驚風治之則變生諸病茲分別症治於下柔痙症治桂枝防風湯治柔痙自汗發熱口噤頭搖反張搐搦邪入太陽脈浮而緩者服此酒洗白芍桂枝炙草防風川芎生薑等分紅棗引桂枝葛根湯治柔痙自汗發熱已經二日脈浮而洪太陽兼陽明症者酒洗白芍桂枝炙草生薑各一錢葛根錢半紅棗一枚服取微汗柴胡防風湯治柔痙服前表藥邪不解而欲傳經往來寒熱口噤直視靜躁無常脈浮而弦邪將入少陽成半表半裡之症也人參以沙參萎蕤代柴胡各二錢條芩法半甘草防風各錢半薑棗引服此和解之防風當歸湯治柔痙出汗過多壯熱口噤搐搦反張脈洪而虛太陽陽明合邪者防風川芎各二錢當歸生地各三錢服此養血祛風當歸四逆湯治柔痙失治邪傳陰經自汗昏沉握拳反折脈細肢冷酒洗白芍當歸桂枝各錢半炙草木通各一錢北細辛五分姜棗引海藏附子散治已成陰痙汗出不止肢冷筋急項背牽強脈沉而微炮附子炙草桂枝各二錢川芎川獨活各一錢姜棗引剛痙經曰太陽病發熱無汗反惡寒者名曰剛痙其症初起惡寒無汗發熱頭痛偎藏母懷蓋小兒口不能言父母亦不自覺但知其發熱而不知其惡寒頭痛及至身熱足寒項背強急俗醫妄指為驚風置傷寒表裡而不問輒用一派涼驚截風之藥抑遏表邪不能外出迨至傳遍三陽則見身熱頭熱面赤目脈赤獨頭搖卒口噤背反張之全症俗指為驚風八候者即此也此皆外感風寒濕之實邪為病當按傷寒門循經調治分別於下剛痙症治葛根湯治剛痙發熱無汗惡寒面赤頭搖口噤項背強急脈浮或緊太陽風寒盛者葛根二錢麻黃桂枝酒芍炙草生薑各一錢紅棗引羚羊清解散治剛痙二三日內俱症現齊煩躁驚悸脈浮數或洪弦風寒濕合入三陽者鋸羚羊角末獨活葛根柴胡防風條芩枳殼茯神麥冬石膏甘草酒洗膽草或加鉤藤若已傳三陰變成陰痙者當服海藏附子散當歸四逆湯方見上切忌誤作慢驚慢脾施治痙病附法小續命湯治風寒濕雜揉成痙隨症加減防風錢半酒炒黃芩白芍酒洗川芎防己麻黃桂枝人參炙草去皮尖炒研杏仁各一錢炮附子五分姜三片棗一枚加減法風寒盛則無汗為剛痙去人參附子風濕盛則有汗為柔痙去麻黃表實去參附加羌活獨活裡實去參附加芒硝大黃若痰湧氣促加膽星法半夏茯苓以化痰枳殼陳皮蘇子以利氣如聖飲通治剛柔二痙表裡俱實者羌活防風白芷川芎柴胡黃芩法半甘草當歸白芍烏藥酒炒大黃生薑竹瀝引加減法剛痙無汗加麻黃製蒼朮柔痙有汗加桂枝炙白朮便通去大黃尿秘加木通澤瀉癇症門總括癇症類乎驚風痙風者謂發時昏倒抽搐痰涎壅盛氣促作聲與驚風痙病相似也但四體柔軟一食之頃即醒依然如無病之人非若痙風一身強硬終日不醒也然亦各有所因分別症治於下陰癇陰癇屬陰藏寒之病也多因慢驚之後痰入心包而得發時手足厥冷偃臥拘急面色青白口吐涎沫聲音微小脈來沉細輕者服醒脾湯見前慢驚風甚者服固真湯見前慢脾風服藥病退用後丹調理定癇丹炒遠志製半夏煨天麻炒白芍當歸炙草陳皮琥珀人參各三錢炒棗仁炙白朮天竺黃無真者用膽星鉤藤鉤白茯神各五錢皂二錢川大黃兩半共曬乾研極細煉蜜為丸重五分薑湯化下涼膈散治熱極生風時發驚搐壯熱便秘舌赤唇焦脈數而面色青紅連翹二錢酒浸大黃芒硝甘草各一錢炒梔仁黃芩薄荷淡竹葉各五分生蜜引無汗者加羌活防風羌活散治風熱急驚不甚暴戾用此平緩治之羌活防風天麻川芎薄荷甘草柴胡前胡黃連桔梗炒枳殼炒殭蠶生薑引瀉青丸治肝經風熱發為急驚面目夾青潮熱抽搐脈來弦數之症焙乾膽草梔子當歸川芎羌活防風酒煨大黃等分曬研極細蜜為小丸煎淡竹葉薄荷湯化下五分涼驚丸治心熱成驚舌燥尿赤面紅狂叫等症膽草防風青黛鉤藤鉤各二錢黃連三錢牛黃五分共研極細煮麵糊丸重五分金器煎湯化下兼服瀉心導赤湯見一卷木舌清熱化痰湯治熱痰急驚乍然昏搐痰閉火伏氣喘以秘痰兼熱者去心麥冬製半夏炒枳殼桔梗甘草陳皮赤苓黃連黃芩竹茹膽星生薑燈心引急驚後調理法凡治急驚多用寒涼藥亦急則治標之法也但得痰火稍退即當調補氣血若過用寒涼必致轉成慢驚等症故驚卻一退餘熱尚在者當用琥珀抱龍丸若脾虛多痰者宜用清心滌痰湯琥珀抱龍丸人參琥珀茯神膽星炙草天竺黃麵炒枳實枳殼各五錢檀香辰砂各三錢炒山藥一兩另擂赤金鉑三十片共研末篩細蜜為丸重一錢小兒半丸薑湯化下清心滌痰湯去心麥冬麵炒枳實姜煮半夏炒研棗仁石菖蒲泡南星人參黃連茯苓甘草陳皮竹茹生薑引共曬研極細煉蜜為丸重一錢薑湯化下小兒半丸陽癇陽癇屬陽府熱之病也多因急驚去風下痰不淨久而致成此症發時身熱自汗仰臥面赤脈象洪數牙關噤急或啼叫不已口吐涎沫如風兼熱者服龍膽湯見一卷噤口肝經熱者服瀉青丸見前急驚風若痰涎壅塞者服四制抱龍丸真天竺黃五錢九轉膽星一兩明雄黃辰砂各二錢麝香分半共研極細篩淨末另切甘草麻黃款冬花各五錢煎濃湯布濾去渣慢火熬成膏合藥末為丸重五分煎薄荷湯化下驚癇小兒心肝熱盛偶被驚邪所觸因而神氣潰亂遂成驚癇發時吐舌急叫面色乍紅乍白驚惕不安如人將捕之狀驚退又如好人先服大青膏次服鎮驚丸大青膏煨天麻三錢白附子天竺黃鉤藤鉤各二錢烏梢蛇肉酒浸焙焦蠍梢去毒青黛硃砂薄荷葉各一錢麝香三分共研極細每用五分煉蜜調膏滾湯沖服如無蛇肉鋸羚羊角末二錢代之鎮驚丸去心麥冬焙乾七錢天竺黃鉤藤鉤膽星茯神各五錢羚羊角末遠志肉炒棗仁石菖蒲生黃連甘草硃砂各三錢珍珠牛黃各二錢共研極細每丸重五分薑湯化下痰癇痰癇因小兒平素痰盛或偶因驚熱觸動成癇發時痰涎壅塞喉間氣促昏倒口吐痰沫先宜下其痰服一捻金見一卷初生不乳次服朱衣滾痰丸煅礞石川大黃各一兩條芩七錢沉香五錢或以木香代共研極細水泛為丸硃砂滾衣量兒大小白湯化下食癇食癇者其病在脾因小兒乳食過度停結中脘乘一時痰熱壅盛而成其初面黃中滿吐利酸臭後變時時發搐痰盛者服前朱衣滾痰丸食積搐盛服妙聖丹下之後服清熱和胃湯調理之妙聖丹巴豆肉三粒紙包捶壓去油代赭石火煅醋淬杏仁去皮尖炒黃蠍梢焙乾明雄黃硃砂各二錢共研極細煮紅棗取肉糊為丸重三五分木香湯化服清熱和胃丸去心麥冬麵炒枳實生梔子川連連翹竹茹大黃陳皮甘草各五錢炒神麯炒麥芽山楂肉各一兩共研極細煉蜜為丸重一錢白湯化下風癇風癇者因汗出脫衣腠理開張風邪乘隙而入發時目青面紅手如數物治法先宜疏風解表輕者服化風丹重者服羌活桂枝湯風兼痰者當用祛風牛黃丸化風丹膽星二錢羌活獨活芥穗防風天麻鉤子川芎甘草人參薄荷葉各一錢共研極細蜜丸重一錢薑湯化下羌活桂枝湯羌活防風麻黃桂枝天麻甘草大黃生薑祛風牛黃丸牛黃錢半焙全蠍炒殭蠶去足蟬蛻天麻白附防風膽星各二錢麝香三分共研極細煮棗肉糊丸重五分薑湯化下癇症附法萬羅田曰癇者卒然昏倒四肢柔軟目閉不開睛或上翻口噤咬牙或壅痰涎身熱面赤或青或白或作六畜之聲隨其藏氣也古有三癇五癇之名每發有時或以旬日計身體柔軟醒來依然如好人為異耳夏禹鑄曰陽癇者發則咬牙抽搐痰壅氣粗身熱面赤脈浮有力多在日發此病在六府肌表當按一卷急驚拿法治之如拿不醒可炙肺俞穴又掐老龍穴自服天保采薇湯見一卷赤遊風陰癇者發則手足逆冷口吐涎沫僵臥拘急氣乏脈遲面色青白多在夜發此病在五藏忌推拿余法按前陰癇服藥集成定癇丸治患諸癇日久表裡已清而無雜病用此丸健脾補中人參炙術當歸茯苓各兩半法半陳皮炒芍製蒼朮各一兩木香炒白蔻石菖蒲煅龍嫩桂枝各五錢研末蜜丸硃砂滾衣薑湯每下一丸神病門五臟神情七神者心藏神肝藏魂脾藏意與智肺藏魄腎藏精與志也七情者心生喜肝生怒脾生憂與思肺生悲腎生恐與懼也按氣和則志達故生喜笑氣暴則志憤故生恚怒繫心不解散故生憂思淒心則哀苦故生悲哭則觸事物非常變異故生恐懼神病六證六證者驚悸怔忡恍惚健忘失志傷神也此為大人固有之症但小兒心虛膽怯每多患此口不能言父母醫師亦慢不覺察茲附數方於下仁熟散治小兒膽虛氣怯睡臥驚惕熟地三錢去油柏子仁茯神枸杞各錢半炒棗皮白菊花北五味各一錢麵炒枳殼桂心人參各五分姜棗引歸脾湯治脾虛氣弱怔忡恍惚人參炙白朮蜜黃耆炒棗仁龍眼肉茯神各二錢酒洗當歸去心遠志各一錢炙草木香各五分姜棗引養心湯治心虛膽怯神傷健忘蜜炙黃耆薑製半夏茯苓茯神當歸川芎各一錢去油柏子仁炒遠志肉炒研棗仁五味子炙草人參肉桂各五分無桂用桂心無參用沙參客忤二因外因者謂外來人畜之氣忤觸其兒之正氣也蓋小兒真元不足神氣未充故外邪客氣乘虛忤之或因生人遠來或因牲畜暴至或抱兒戲騎牛馬或父兄遠回未及洗浴即抱其兒致汗汙山嵐不正之氣從鼻傳入經曰五氣入鼻藏於心肺則正氣受忤其症口吐青黃涎沫面色變異喘急腹痛反側不定手足瘛瘲微似驚癇但神不昏亂為異耳初起用通關散見前急驚風或用覩鼻法內服攝生飲㗜鼻法薄荷葉元胡索川芎藜蘆硃砂雄黃等分研末吹鼻取嚏攝生飲製法半夏泡南星桔梗各錢半北細辛製蒼朮石菖蒲炙草各一錢木香生薑引愈後服香砂六君子湯見一卷胎寒內因客忤者或因平日所喜之物卒然奪之或因平日所畏之物戲而嚇之凡親愛之人玩弄之物忽被失去心常戀戀口不能言神志因而喪沮其症昏沉貪睡夢中警惕手足動彈食減形消氣乏肢冷日久潮熱作搐頗似慢驚但不口噤反張為異耳當先曲體兒情順其心志內服安神丸人參炙術茯神炙草陳皮法半桔梗木香遠志肉川連香附米棗仁俱炒黃研極細末蜜丸重一錢硃砂末滾衣鉤藤湯化下惺惺散人參炙術茯神炙草川芎炒芍花粉桔梗防風細辛姜棗引大驚卒恐張景岳曰小兒卒被驚恐最傷心膽之氣口問篇曰大驚卒恐則氣血分離陰陽破敗經絡厥絕脈道不通陰陽相逆經脈空虛血氣不次乃失其常此內經概言受驚恐之病有如此者矧小兒氣血尤非大人之比者若受大驚卒恐則神氣散亂不堪尚何實邪之有斯時也收復正氣猶恐不暇顧可復為清散耶既如硃砂琥珀之類不過取其鎮墜之意亦非救本之法也今幼科諸書皆法大驚卒恐症混作驚風不知急驚由於風熱慢驚由於脾腎兩虛皆不必由驚而得若大驚卒恐症突被驚恐心膽受傷神氣陡離當以敗復為主服後數方秘旨方人參炙草五味子各五分炒研棗仁薑製半夏當歸茯神炒芍陳皮各一錢生薑引作丸服亦妙團參散人參當歸等分研末用膹豬欒心一個切片煎湯調服一錢一方用豬欒心一個劈開洗淨汙血搽硃砂末一錢合攏扎定碗盛放飯甑內蒸三四飧取起切片與兒臨食白湯送下治心虛驚恐神效中惡中惡之症比前客忤為尤甚蓋客忤無非外來人畜不正之氣觸忤為患若中惡則直中惡毒之氣由肺而入心脾如古塚敗棺腐屍枯井滛祠冷廟破屋廢溝皆有惡毒冷濕糜爛之氣乘虛襲入小兒神氣未足一經觸犯從鼻而入肺先受之閉其清道漸侵心脾故神魂離舍忽然昏倒目閉面青不省人事或四肢厥逆手足握拳上氣喘急脈緊細者吉浮大者凶初起宜灌蘇合香丸見一卷肛門內合如無此丸用後三法霹靂散新牙皂北細辛川芎白芷各五分明雄黃三分麝香五釐躑躅花俗名老虎花一分共研極細每用少許吹鼻取嚏以宣惡毒調氣平胃散製蒼朮炒厚朴炒研白蔻砂仁木香丁香檀香藿香茯苓陳皮甘草姜引煎湯頻頻灌之集成返魂湯治中惡昏死氣閉喘急脈浮緊無汗用此開通肺氣麻黃三錢杏仁十粒去皮尖研炙草錢半蔥白三寸如口噤不開將藥煎汁含在大人口中以竹管插入兒鼻含汁從管中徐徐吹入但得下咽無不全活中毒又有誤食毒物亦名中惡如菌蕈河豚瘟牛疫馬自死牲畜露脯鼠殘之類兒誤食之腸胃受毒故心腹刺痛腹皮青黑悶亂欲死甚則面黑甲錯氣閉昏倒先用前霹靂散吹鼻取嚏次用熱茶泡膽礬一錢鵝翎掃咽喉以探吐或研人參蘆竹瀝調五分灌之旋以指探吐內服雄黃解毒丸治小兒誤食毒物腹痛悶死用此吐下巴豆肉紙包捶壓去油取霜一錢明雄黃川鬱金各研末二錢研極勻醋糊丸重三分茶湯化下或吐或下自愈吐下之後當調和脾胃中毒附法凡中蠱毒必嘗白礬不澀食生豆不腥舌脹爪青心胃悶痛當濃煎石榴皮湯頻頻熱服或用膽礬探吐法見前總以得吐為炒又方研鬱金末三錢米泔調服薺苨甘草黑豆煎服能解百毒中砒霜毒急飲熱便及糞汁或飲靛汁或刺羊血乘熱頻服或搗螺獅水調汁服或服綠豆湯甘草湯中鹽滷毒多服豆腐生漿中菌蕈毒多服黃泥漿生豆漿中肉食毒豬骨燒存性煎服又杏仁去皮尖和豆豉煎湯頻服凡中飲食毒心中煩滿者醋煮苦參服之取吐余詳大方脈五軟五軟者謂頭項軟曲無力兩手兩足軟曲無力口唇軟薄無力皮寬不長肌肉軟弱無力此五者皆因稟受不足氣血不充故骨脈不強筋肉痿弱治宜補精氣久服後方自效補腎地黃丸法制熟地二兩炒棗皮炒山藥茯苓各一兩酒洗牛膝八錢酥炙鹿茸丹皮澤瀉各五錢共研極細煉蜜為小丸鹽湯送下一二錢日三服常服此丸補其先天扶元散人參土炒白朮蜜炙黃耆炒山藥石菖蒲熟地當歸炒白芍川芎茯苓茯神炙草薑棗間服此湯補其後天集成曰肝主筋腎主骨肝腎虧故項軟無力脾主四肢脾胃弱故手足俱軟口軟者唇薄舌虛出口而懶於言肌肉軟者肉少皮寬肌虛脆弱也服前地黃丸補肝腎須間服補中益氣湯以補中氣補中益氣湯蜜炙黃耆二錢土炒白朮當歸炙草各錢半留白陳皮一錢人參升麻柴胡各五分姜三片棗二枚五硬五硬者謂仰頭取氣難以動搖頸硬也氣牽胸膈連腰強痛胸硬腰硬也手心足心時冷如硬冰強硬不活手硬足硬也此五者皆因陽氣不榮於四末最為難治若肝木乘脾食少氣弱者服加味六君子湯硬而兼風者服小續命湯見前痙病輕者但調其氣服烏藥順氣散烏藥陳皮各二錢麻黃桔梗白芷川芎炒枳殼各一錢炒殭蠶炮姜炙草各五分蔥白引汗甚去麻黃或加續斷加味六君湯人參炙術茯苓炙草陳皮法半蜜炒升麻醋炒柴胡炮姜桂心姜棗或加當歸炒苡仁五遲五遲者行遲坐遲齒遲發遲語遲也如因父母氣血虛弱先天有虧致兒生下筋骨痿軟行步艱難坐不能穩齒不速長三者皆因腎氣不足之故當先滋陰用前補腎地黃丸去牛膝加五加皮再和麝香五分常服之間服補中益氣湯見前五軟以調養其氣久服自效至若足少陰為腎之經其華在發若腎經血氣不足即不能上榮頭髮故發遲而焦痿當服苣勝丹苣勝子即脂麻又名胡麻又有驚邪乘入心氣數歲不能言者當服菖蒲丸苣勝丹另研苣勝子二兩曬研生地當歸各一兩另研炒芍一兩木粉二錢共研勻蜜丸綠豆大每服一錢黑豆湯送下菖蒲丸石菖蒲去心麥冬炒遠志肉去油乳香人參硃砂當歸川芎等分研極細蜜為小丸空心米湯送下解顱小兒生下囟骨不合縫數歲仍然者名曰解顱蓋腎生髓腦為髓海腎氣有虧腦髓不足亦如花木無根現症面色㿠白形體削瘦目多白睛愁眉少笑治宜補養腎氣先服補腎地黃丸再服扶元散俱見前五軟如法常服外塗封囟散另研柏子仁又研防風南星各一兩和勻再研每用二錢豬膽汁調作餅子攤貼骨縫處以軟帶兜項緊扎一日一換久用自合囟陷小兒藏府有熱渴飲水漿故成瀉痢久則脾氣虛寒不能上充腦髓故囟陷成坑現症面目青黃四肢逆冷六脈沉緩神氣慘淡先服補中益氣湯升之見前五軟再服固真湯補脾見前慢脾風外貼烏附膏烏附膏干川烏附子各五錢明雄黃二錢共研極細又取連根葉生蔥一把盡搗如泥和藥末入罐內水熬成膏每早空心時將膏塗貼陷處次早刮去再塗久用自效又方炙焦狗頭骨存性研末雞蛋白調成膏照前法塗貼囟填因小兒乳哺無度或寒或熱乘於脾經致藏府不調濁氣上衝填脹腫突毛髮憔悴頻頻汗出胸高氣喘口唇色紅須分表裡虛實如肝氣盛脈浮而弦者當服瀉青丸見前急驚風若屬裡熱脈浮數有力者當服加味連翹飲見一卷辨胎丸如腫硬不熱脈沉遲者當服理中湯見一卷初生不乳若因表郁脈浮緩而洪當服防風升麻湯防風升麻木通甘草梔仁麥冬淡竹葉龜胸小兒飲食不節痰熱熾盛復為風邪所傷風與熱搏以致肺竅脹滿攻衝胸膈高如覆盆現症咳嗽喘急身體羸瘦治宜清肺化痰先服寬氣飲以開通氣道再服百合丹以除壅滯寬氣飲去皮尖炒研杏仁蜜炙枇杷葉蜜炒桑皮炒研蘇子麵炒枳殼去心麥冬炒葶藶子陳皮甘草等分煎服百合丹干百合六錢去皮尖炒杏仁蜜炙桑皮葶藶子生石膏木通各五錢大黃三錢共研極細銼碎去心天冬一兩蜜二兩同煮成膏再搗去筋糊前末為小丸空心白湯送下一二錢鐵鏡曰龜胸由感風熱凝注為痰停滯胸膈咳嗽喘促肺氣脹滿積久而成或乳母過食辛辣夏哺熱乳亦成此症龜背乃因小兒坐早或坐濕地被客風吹入脊膂致傴僂曲折背高如龜往往為終身錮疾內服松蕊丹外用聖惠灸法搓艾丸墊生薑片灸肺俞心俞膈俞三穴各三五壯見彤園醫書外科一卷圖或以鏡照龜龜即撤尿取其尿逐點背脊骨節久用亦效松蕊丹松花獨活防風炒枳殼各一兩麻黃大黃前胡桂心各五錢共研極細蜜丸如黍米大米湯每下十丸集成曰龜胸有治龜背乃難治之症蓋由小兒精髓不足元陽虧損故其症背彎如弓命門上下骨節漸次浮露實因骨痿不能撐持之故豈盡風邪使然耶前賢立有松蕊丹反用麻黃獨活大黃一派攻伐之藥似未盡善予以為當用六味地黃丸加桂心鹿茸固其先天六君湯加歸身扶其胃氣或可保全鶴膝風因小兒稟賦不足血氣不榮肌肉削瘦遂致骨節外露筋脈攣縮股漸細小膝漸腫大時作疼痛由腎虛不能生精髓風邪得以干之先服大防風湯次服補腎地黃丸見前五軟或用後法大防風湯防風羌活牛膝杜仲人參炙草茯苓炙術熟地當歸川芎炒芍炮附子蜜黃耆姜棗引屈膝散鶴膝初起先服數劑制何首烏炒苡仁炒苦參炒牛膝獨活防風各五錢炒殭蠶花粉秦艽炙鹿茸各三錢共研末酒下二錢八珍湯治焮腫赤痛欲成膿者熟地二錢土炒白朮茯苓當歸白芍川芎各錢半人參炙草各一錢薑棗引加牛膝製蒼朮炒川柏苡仁有因瀉痢日久而成鶴膝者服補中益氣湯加牛膝苡仁見前五軟其餘內外治法詳載彤園醫書外科三卷膝部呆笑多悲兒無甚病只見人呵呵大笑每日如是或不見人亦然此心熱上浮也服茯苓木通法半桔梗甘草梢淡竹葉灶心土煎服數劑小兒無故愁眉少笑或悲啼不解常多哀慟者此因藏燥也服去心麥冬小麥法半夏茯苓竹茹沙參炙草薑棗常服自止迅雷所驚其證抽掣形狀似乎急驚但手掌橫直紋皆帶深黃色此因膽虛受驚服參竹湯人參竹葉法半夏陳皮柴胡甘草小麥麥冬生薑粳米再取大鼓對兒前從輕至重敲打數十聲落後重打數聲以釋兒疑凡膽虛之兒見異物聞異聲即發驚搐者俱服參竹湯外將所觸異物再與熟視或效所聞異聲令兒熟聽其驚自定疳證門總括大人十五歲以上病則為勞小兒十五歲之前病則為疳因素稟氣血虛弱藏府嬌嫩易於受傷或因乳食過飽甘肥無節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則消耗氣血灼枯津液初起尿如米泔午後潮熱日久失治致令青筋暴露肚大脹硬面色青黃肌肉消瘦皮毛憔悴眼睛發䀽而疳痘成矣分別症治於下脾疳脾屬土色黃主肌肉故見症面黃肌肉削瘦身熱倦臥心下痞硬懶進乳食好食泥土肚腹硬痛頭大頸細時作吐瀉口乾煩渴大便黏腥此名脾疳治當先攻脾積後調脾土消疳理脾湯脾疳初起用此攻積蘆薈蕪荑川連胡連檳榔甘草陳皮炒青皮煨三稜莪朮炒神麯麥芽使君子肉燈心引肥兒丸攻脾積之緩劑炙白朮使君肉胡連各五錢煨蘆薈炒神麯麥芽山楂肉北沙參茯苓黃連炙草各三錢共曬研極細米粥糊丸綠豆大米湯送下二錢參苓白朮散攻積後用此調脾人參土炒白朮炒山藥炒苡仁炒研扁豆砂仁去心炒萸肉炙草茯苓陳皮桔梗姜棗引夏氏調脾湯治脾疳好食泥土茶米肚大黃瘦食少倦怠炒青皮公丁香使君肉煨砂仁炙白朮茯苓炙草木香生薑引疳瀉此因積熱傷脾致水穀不分頻頻作瀉法當清熱滲濕服清熱和中湯炒厚朴炒神麯炒穀芽炙白朮使君肉赤茯苓陳皮川連澤瀉甘草煎服數劑瀉久不止服上參苓白朮散疳腫此因傳化失宜脾肺兩傷胸滿痞悶氣逆喘咳肚腹腫脹面色浮光服御苑勻氣散炙桑皮桔梗腹毛赤茯陳皮木通藿香姜皮燈心夏氏褐子丸治脾疳腫脹肢體浮黃脈洪實者炒蘿蔔子一兩炒五靈脂煨莪朮炒青皮炒黑醜陳皮赤苓檳榔各五錢木香三錢共研極細麵糊小丸白湯每下一錢疳痢此因熱結腸胃以致下痢或赤或白腹中窘痛初起形氣尚實服香連導滯湯酒蒸大黃煨木香炒黃連檳榔各五分姜炒厚朴炒神麯陳皮甘草茯苓山楂各一錢燈草引余方見後附法肝疳肝屬木色青主筋故面目爪甲皆青眼生眵淚隱澀難睜揉目搖頭合面睡臥耳瘡流膿肚大青筋形神消沮燥渴煩急糞青如苔先用柴胡清肝湯清其熱肝疳已成熱甚體虛者常服蘆薈肥兒丸肝疳已退用加味逍遙散抑肝扶脾湯如法調理柴胡清肝湯酒炒柴胡當歸生地連翹各二錢炒研牛蒡赤芍各錢半炒連炒芩梔仁丹皮升麻甘草各五分又方治肝疳潮熱盛者銀柴胡炒青皮炒梔子淡竹葉甘草連翹膽草生地胡連赤芍薄荷蘆薈肥兒丸干蘆薈炒胡連川連炒蕪荑鶴蝨銀柴胡各一兩炒五穀蟲炒使君子肉炒扁豆炒山藥炒神麯炒麥芽山楂肉各二兩煨肉蔻七錢炙焦蝦蟆四個檳榔五錢辰砂三錢麝香一錢共研極細醋糊為丸綠豆大米湯每下一錢或五分日二服加味逍遙散柴胡茯苓酒洗當歸酒炒白芍土炒白朮各二錢炙草丹皮各一錢薄荷梔子各五分煨姜三片抑肝扶脾湯姜炒川連酒炒柴胡醋炒青皮炒白芥子炒神麯炙白朮人參茯苓陳皮膽草山楂炙草姜棗引心疳心屬火色赤主血脈現症面紅目脈赤壯熱自汗時發搐咬牙口乾舌焦生瘡作渴小水短赤胸膈痞滿伏臥貪食又或吐瀉狂叫多啼先服瀉心導赤湯清心熱見一卷木舌熱甚兼驚者服珍珠散定之疳久心虛者服茯神湯調理之珍珠散豆腐煮珍珠羚羊角末酒炒胡連大黃天竺黃當歸甘草各三錢膽星雄黃硃砂各二錢去心麥冬茯神各八錢曬乾研細蜜丸重五分擂金鉑為衣白湯化下古用牛黃犀角今改易之茯神湯茯神人參當歸炙草龍眼肉炒蓮肉去心麥冬等分姜棗引疳渴此因肥甘積熱灼耗脾胃致津液枯竭不時大渴引飲心神煩熱當服清熱甘露飲去心麥冬金釵石斛蜜炙枇杷葉酒炒知母條芩滑石末茵陳生地熟石膏甘草梢燈心引肺疳肺屬金色白主皮毛現症面白氣逆咳嗽毛髮枯焦皮上生粟肌膚燥裂憎寒壯熱鼻流清涕準頭頷頰常生小瘡先宜解熱後補肺虛分別於下清肺飲初起用此解散外邪蜜炙桑皮酒炒條芩天冬生地前胡桔梗蘇葉防風連翹甘草當歸赤茯姜棗甘露飲次服此方以清肺熱蜜炙枇杷葉去心麥冬天冬麵炒枳殼金釵石斛生地熟地枯芩桔梗茵陳紅棗引補肺散疳熱退後服此補肺蛤粉炒阿膠去皮尖炒杏仁馬兜鈴茯苓炙草糯米等分煎服腎疳腎屬水色黑主骨初起必有解顱鶴膝五遲等症更因甘肥失節久則成疳面色黎黑牙齦出血口中氣臭腹痛作瀉足冷多啼先用金蟾丸攻疳積次服加味地黃丸補腎疳退後形氣虛者服調元散見一卷胎怯金蟾丸煅焦蛤蟆五個胡連川連鶴蝨各二錢煨肉蔻苦楝根皮蘆薈蕪荑雷丸各三錢共研末蜜丸重五分雄黃末為衣白湯化下加味地黃丸熟地二兩炒棗皮五錢炒山藥澤瀉茯苓丹皮當歸川楝肉使君肉各三錢共研極細搗熟地膏和煉蜜為小丸鹽水每下二錢疳熱腎疳初起有發熱汗出脈細而數者先服鱉甲青蒿飲若疳火虛熱脈細形羸者只服鱉甲散鱉甲青蒿飲醋炙鱉甲銀柴胡地骨皮炒知母胡連青蒿生地赤芍甘草等分燈心引鱉甲散醋炙鱉甲人參蜜耆熟地生地炒芍當歸地骨皮日服二次腦疳因兒素受風熱又兼乳哺失調致令頭皮光急腦生餅瘡頭熱發枯腮囟腫硬目暗鼻焦心煩困臥自汗潮熱如腦熱生瘡者服龍膽丸若煩熱羸瘦者服龍腦丸外俱用吹鼻散龍膽丸膽草蘆薈赤茯防風酒炒升麻苦楝根皮燒發灰存性各二錢川連青黛各一錢共研細末豬膽汁糊丸重五分薄荷湯化下龍腦丸冰片麝香各五分蘆薈胡連各三錢雄黃硃砂牛黃各二錢煅枯蝦蟆灰四錢共研細末膽汁糊丸麻子大薄荷湯送下五分吹鼻散煅蝦蟆灰蝸牛殼炒瓜蒂北細辛川連桔梗各一錢同研篩末另兌冰片麝香各五釐再同研勻每用少許日吹鼻三次眼疳因疳熱上衝於眼故發時癢澀赤爛眼胞腫痛白睛生翳漸次遮滿時常流淚閉目羞明初起宜解表通里服瀉肝散及白睛生翳次服退翳湯清疳熱日久服加味逍遙散見前肝疳余法按彤園醫書眼科全書瀉肝散羌活防風薄荷川芎當歸赤芍生地梔子連翹膽草酒炒大黃等分燈心引退翳湯酒炒胡連羚羊角末銀柴胡白菊花白蒺藜梔子膽草木賊赤芍蟬蛻甘草生地薄荷燈心引鼻疳因疳熱攻肺鼻為肺竅其症鼻塞赤癢焮痛浸淫濕爛下連唇際或氣喘咳嗽毛髮枯焦初起熱甚赤痛喘嗽者服清金散若熱灼鼻爛成瘡者次服化毒丹如鼻內蟲蝕痛癢甚者服化蟲丸外敷鼻疳散內吹蟬殼散或研五倍子枯礬末內外吹搽亦效清金散蜜炙枇杷葉梔子枯芩生地花粉麥冬連翹薄荷元參桔梗甘草燈心引化毒丹羚羊角末薄荷葉川連大黃元參桔梗銀花甘草各二兩青黛五錢共研極細蜜丸重五分燈心湯化下日三服化蟲丸蕪荑蘆薈白芷川芎胡連川連建青黛煅蝦蟆灰等分研末豬膽汁糊丸麻子大煎杏仁湯每下二三十丸鼻疳散青黛一錢熊膽五分麝香五釐為末豬脊髓調膏頻頻敷搽蟬殼散焙乾蟬蛻蛇皮燒灰滑石青黛各一錢共研極細兌麝香三分同研勻磁瓶收貯每用綠豆大吹鼻中日吹二次疳蟲盡出牙疳因毒熱攻胃致牙齦肉赤爛焮痛口臭出血牙齒枯落穿唇破腮初起服消疳蕪荑湯先瀉毒熱攻瀉之後次服蘆薈肥兒丸以清之見前肝疳外敷牙疳散余詳彤園醫書外科消疳蕪荑湯蕪荑蘆薈大黃芒硝川連胡連雄黃黃芩等分服數劑如服後便軟及不思食者去硝黃加石膏末羚羊角末牙疳散瓦焙人中白火煅綠礬炒焦五倍子各三錢冰片二分共研極細先以水漱洗牙疳用此頻敷有蟲加檳榔末脊疳因積熱生蟲上蝕背脊以手擊背空若鼓鳴脊骨削露形如鋸齒外症身體發熱下利煩渴手指多瘡好咬指甲其狀甚惡先宜服蘆薈丸殺其蟲後服金蟾散以消疳愈後按前脾疳調理蘆薈丸蘆薈雷丸胡連川連貫眾熊膽青黛硃砂蟬蛻尾炒乾蚯蚓煅蝦蟆灰各一錢先研極細篩末又兌麝香一分再同研勻搗爛蝸牛糊末為丸麻子大米湯每下五分日二服金蟾散酥炙蝦蟆一個桃根嫩皮樗根白皮地榆皮訶黎勒夜明砂白蕪荑百合子以上俱炒人參大黃黃柏水粉丁香檳榔等分研極細米湯每調五分日三服蛔疳因過食生冷油膩肥甘之物致濕熱生蟲腹中擾動煩躁絞痛多啼面唇乍紅乍白口常流涎肚腹青筋肛門濕癢初起服使君子散以治蟲若蟲仍不止再服下蟲丸蛔蟲已下後服肥兒丸調補見前脾疳使君散炒使君肉十四枚苦楝子肉三錢蕪荑一錢粉草錢半膽汁浸一宿焙乾共研極細白湯每調一錢日三服下蟲丸苦楝根皮酒浸焙乾桃仁去皮尖焙乾煅蝦蟆灰炒蕪荑貫眾木香檳榔各三錢炒鶴蝨上輕粉各一錢焙乾使君肉五錢共研極細麵糊丸麻子大白湯每下五分日二服以蟲下為度無辜疳有因浣衣夜露被無辜鳥落羽所汙兒著衣中毒而成者有因乳母有隱病積鬱傳染小兒而成者初起頸項生瘡或項內有核形如彈丸軟活不痛其中有蟲狀如米粉可速刺破免蟲蝕藏府便利膿血身熱面黃體日消瘦也初起先清其熱服柴胡飲數劑後常服蘆薈肥兒丸見前肝疳柴胡飲柴胡赤芍法半桔梗川連條芩甘草膽草夏枯草浙貝母煎服丁奚疳此症遍身骨節暴露狀如丁肌肉乾枯啼哭不已手足細削面色黧黑項小腹大肝臍突出尻骨尖削神困身軟骨蒸潮熱燥渴煩急初起先宜化積滯服五疳消積丸積消後常服人參啟脾丸以調脾五疳消積丸使君肉焙乾五錢炒神麯炒麥芽山楂肉陳皮各一兩川連蕪荑膽草各三錢曬研極細米湯糊為小丸白湯每下一錢人參啟脾丸土炒白朮炒扁豆炒山藥茯苓陳皮各五錢人參炙草煨木香炒神麯麥芽各三錢曬研極細蜜為小丸白湯每下一錢日三服勿間若小兒用白湯化下五分哺露疳因乳食不節大傷脾胃解顱枯瘦煩渴吐蟲日晡蒸熱久則兩頷骨露形如燕頷食物或吐初起當先消積服集聖丸積消之後再服肥兒丸見上脾疳若日久失治已成哺露疳者當攻補兼施常服人參丸集聖丸炒蘆薈炒五靈脂炒使君肉醋炒青皮煨莪朮炒砂仁炒夜明砂炙焦蝦蟆焙乾當歸川芎川連木香陳皮各二錢共研極細豬膽汁糊丸重一錢米湯化下大兒作小丸吞服人參丸煨訶藜勒煨大黃炙鱉甲蜜黃耆去心麥冬薑製半夏茯苓炙草條芩柴胡川芎人參等分研末蜜糊丸麻子大米湯每下一錢鐵鏡曰疳者干而瘦也此由寒熱失調飲食不節或因吐久瀉痢久瘧久渴久汗久咳久瘡久致脾胃先虧亡失津液而成諸疳也按小兒疳疾諸家方書每囫圇論過致後之學者視為泛常殊不知此乃內因為病如大人之五勞七傷各有所屬也謹遵金鑑幼科心法分經論治隨證立方俾學者循序推求不致昧其所因云失血門總括凡失血之症陽盛乘陰則血為熱迫不能安於脈中乾兒氣分妄行不能歸入經脈也若血病傷及於府者則血滲入腸胃之濁道上行於咽出而為吐為衄下從二便出而為便血淋血也若血病傷及於藏者則溢出於胸中之清道上從喉出而為咳血嗽血下從精竅出而為尿血也夫血藏於臟內行於脈中流於軀殼之間不可得而見也非因損傷豈能為病而損傷之因有三一曰熱傷陽絡府病也熱傷陰絡藏病也治宜清熱一曰努傷治宜破逐瘀血一曰勞傷治宜調理虛損若日久血止而咳嗽不休者凶失血脈宜沉細身涼微者亦吉忌脈大身熱若芤與緩小皆應見之脈衄血鼻中出血曰衄其症鼻孔乾燥身熱不渴常苦頭痛是熱傷陽絡也有因傷寒失汗衄血者乃熱鬱於榮分也如脈浮緊無汗者服麻黃湯汗之浮緩有汗者服桂枝湯解之若脈數不浮不兼表病只因內熱而衄者服犀角地黃湯清之熱甚服四物三黃瀉心湯瀉之外俱用發灰散麻黃湯麻黃一錢桂枝錢半炙草一錢去皮尖杏仁六粒溫服取汗桂枝湯桂枝生薑酒洗白芍各二錢炙草錢半紅棗二枚服取微汗犀角地黃湯犀角末如無以川連二錢代之生地五錢丹皮一錢白芍三錢熱甚加黃芩因怒致血加柴胡梔子一方加當歸紅花桔梗陳皮甘草藕汁四物三黃湯酒洗當歸生地白芍川芎川連條芩大黃發灰散取壯盛婦人頭髮入陰陽瓦內煅灰存性細研篩末每用少許頻吹鼻中若吐血不止酒水調服二錢附法鐵鏡方治脾熱傳肺虛火上炎血行清道從鼻衄出無實熱者北沙參炙白朮炒條芩黑梔仁炒香附茯苓炙草生地當歸桔梗麥冬煎服集成方搗爛韭菜絞汁一杯兌熱童便和勻滾湯沖服能止吐衄又方大蒜去皮搗如泥作餅如錢大左衄貼左足心右衄貼右足心左右俱衄貼兩足心衄止洗去又方寄樹葉搗爛塞鼻亦能止衄又方黑梔仁研細末頻吹鼻中亦止鼻衄吐血兒吐血而不咳嗽者因內熱迫血妄行上逆也服上犀角地黃湯若因勞傷吐血必兼咳嗽痰中帶血血色深紅口渴有熱服雞蘇散如血色淡紅無實熱也可服救肺散又有努力勞損吐血而兼咳嗽者宜逐瘀生新先服桃仁承氣湯次服加味四物湯雞蘇散雞蘇即皺面薄荷似蘇葉而尤香者蛤粉炒阿膠炒黑蒲黃去心麥冬白茅根生地貝母甘草桔梗黃耆等分童便兌服加味救肺散沙參麥冬黃耆鬱金當歸炒芍炙草貝母五味子馬兜鈴等分煎服桃仁承氣湯去皮尖研桃仁十粒酒浸大黃三錢芒硝桂枝甘草各味二錢加當歸赤芍蘇木紅花加味四物湯當歸生地赤芍川芎丹皮甘草藕節蒲黃梔仁白茅根等分酒水煎服附法清胃湯治胃中積火迫血妄行從口吐出川連梔子當歸生地陳皮煎服數劑再服麥冬飲去心麥冬五味子沙參黃耆當歸生地若因怒極傷肝面青嘔血及肝燥勞嗽痰中帶血者服加味逍遙散見前肝疳芎歸飲治飽食後用力持重努傷脈絡及跌撲損傷致血妄行吐衄便血均服此方引血歸經酒洗當歸一兩川芎五錢童便兌頻頻服瘀血成塊便秘脹痛加酒炒大黃甚者再加紅花桃仁赤芍鬱金蘇子降氣湯治上盛下虛痰壅氣促致血妄行吐嘔嗽咯宜散郁和中炒研蘇子炒厚朴前胡當歸法半夏陳皮炙草桂心生薑引集成降火湯治心腎水火不升降火灼肺金咳血嗽血者生地當歸炒芍知母玄參麥冬川連茯苓花粉甘草蓮肉桔梗多服元麥地黃湯治小兒唾血由腎水不足虛火上炎尺脈細數者熟地三錢炒山藥棗皮茯苓丹皮澤瀉玄參去心麥冬各錢半日二服經效方治男婦大小體瘦火浮咳血嗽血咯血吐血痰中帶血日久者川大黃去皮取八兩切片酒浸九蒸九曬再用燒酒浸透拌淨紅花二兩建黛二兩盡蒸至紅花色黑為度曬乾研末酒糊小丸白湯下一錢臟毒大便下血因小兒恣食甘肥致生內熱傷其陰絡而成若血色暗濁肛門腫痛先血後糞者此為近血初起服皂刺大黃湯服後令血大下以消之或服黃連解毒湯若熱雖盛不腫微痛者服槐花散和之若血下肛墜濕盛不痛者服平胃地榆湯和之皂刺大黃湯皂刺大黃等分酒水兌煎酌量器之以下新血黃連解毒湯川連川柏枯芩梔子燈心引等分煎服以解毒槐花散炒槐花炒芥穗醋炒枳殼炒側柏葉川連等分治藏毒加苦楝肉製蒼朮治腸風加秦艽防風平胃地榆湯地榆皮製蒼朮炒厚朴陳皮甘草或加芥穗生地腸風腸風下血血鮮而清腹中不痛先糞後血此為遠血從胃脘小腸來也服前槐花散和之熱盛者服清胃湯加石膏防風芥尾見前吐血下血日久清氣下陷者服補中益氣湯加胡連見前五遲若日久不止氣血兩虛脈微細者服升陽和血湯調之後服人參養榮湯以補之升陽和血湯蜜耆秦艽炒芍當歸生地熟地丹皮炙草甘草炒升麻製蒼朮桂心槐花人參養榮湯人參蜜耆炙草各錢半炙術當歸熟地各二錢炒芍陳皮茯苓遠志各一錢五味子桂心各五分姜棗引簡便方亂頭髮側柏葉雞冠花等分各燒灰存性篩末和勺酒水每調下一錢或童便調能止血又方經霜老絲瓜燒灰存性酒水調服一錢加炒槐花更效溺血溺血為精竅之病乃尿與血先後分出也宜服牛膝四物湯酒洗牛膝當歸川芎熟地赤芍車子木通鬱金瞿麥甘草梢燈心引余法並詳彤園醫書婦科淋血淋血乃尿竅之病尿與血同出而作痛也宜服加味八正散車前子木通瞿麥扁蓄生地鬱金黑梔仁滑石末甘草梢酒洗大黃各一錢淡竹葉燈心引附法珀珠散通治老幼溺血莖中脹痛欲死者琥珀一錢珍珠一錢滑石一兩粉草二錢共研極細煎黃色木通湯每服二錢日服三次一治溺血搗旱蓮草汁車前草汁滾水沖服一治尿血烏梅燒灰存性篩末米湯下二錢一治衄血搗蘿葡自然汁熱酒沖服一治吐血搗鮮生地絞汁白湯沖服凡失血病身涼脈細小者為順身熱脈大而數者為逆若大衄大下血如泉湧者凶疝證門總括厥陰環陰器入少腹任脈起於中極之下以上毛際循腹裡上關元故諸病疝莫不屬之但小兒多因先天不足本藏血虛弱復外感風邪內傷生冷寒邪凝結而成或因濕熱鬱於中覆被寒邪束於外邪氣乘虛並於血隧流入厥陰經屬肝木其性急速故牽引睪丸少腹絞痛也又有胎疝症多因孕母哭泣過傷動於陰氣結聚不散令兒生下致成此疝總之熱則多縱寒則多痛在血分者不移在氣分者多動濕腫重墜虛腫墜輕治各不同也寒疝因兒平日過食生冷或坐臥濕地致陰結於內氣滯不行為日既久復為風邪所乘水濕所傷故發時囊冷結硬牽引少腹作痛初起兼表者服烏頭桂枝湯寒甚者服金茱丸烏頭桂枝湯炮製川烏錢半酒洗白芍桂枝各一錢炙草一錢生薑引金茱丸金鈴子肉一兩泡吳茱萸五錢焙乾研末酒煮麵糊丸麻子大鹽湯每下一錢集成方治寒疝日久服此溫中散寒當歸錢半炒小茴川芎炮姜各一錢泡吳萸炙草桂心各五分木香引濕熱感寒疝因兒平日過食厚味內生濕熱濕熱之氣下行流入陰囊復為風寒外束故發時囊縱紅腫常常刺痛治宜烏頭梔子湯若日久失治形氣虛者服加減柴苓湯烏頭梔子湯泡製川烏炒研梔子等分煎湯頻頻溫服生薑引加減柴苓湯柴胡茯苓炙術法半夏澤瀉豬苓枯芩甘草延胡索炮川烏炒梔子桂心姜棗日三服胎疝因孕母啼泣過傷氣結不散傳入胞胎致兒生下陰囊硬痛輕者服十味蒼柏散重者服金鈴散川楝丸十味蒼柏散法制蒼朮醋炒青皮醋炒元胡醋炒香附炒研益智仁去皮尖炒研桃仁炒川柏炒小茴炮附子山楂子煎服金鈴散金鈴淨肉一兩鉤藤鉤茯苓陳皮各五錢三稜莪朮枳殼青皮小茴各三錢俱炒乾檳榔木香甘草各二錢曬研極細每服一錢小兒五分白湯和酒調日二服川楝丸煨三稜莪朮炒青皮陳皮木香檳榔黑醜桂心各三錢醋炒蕪花五分去油巴豆肉三粒淨川楝肉二兩共研極細煮麵糊丸麻子大薑湯每下十丸或五丸附法疝氣者寒邪結聚而成也內則臍腹絞痛外則卵丸腫大專屬肝經與腎無涉蓋肝主怒因小兒怒急啼叫氣動於內而成氣疝宜行氣開鬱服加味二陳湯法半夏茯苓陳皮炙草川芎川楝炒香附炒小茴炒元胡索桂心姜引次服木香內消丸木香醋炒青皮各二錢醋炒三稜莪朮酒炒元胡澤瀉豬苓陳皮川楝肉各五錢共研末麵糊小丸鹽湯每下一二錢小兒久坐濕地冷氣入腹久而成疝者宜溫中散寒先服加味當歸散歸身二錢炒小茴炮姜川芎各一錢泡吳萸炙草桂心木香各五分煎服次服茱萸內消丸鹽湯泡吳茱萸鹽水炒小茴醋炒青皮元胡索炒小茴陳皮桂心各三錢去皮尖炒桃仁炒去刺蒺藜木香各錢半共研極細煮麵糊為小丸鹽湯每下一錢日二服小兒木腎疝氣因中濕所致腎丸腫墜不熱不疼宜行濕消腫常服加減守效丸製蒼朮泡南星白芷各一兩炒楂肉炒橘核炒神麯泡吳萸製半夏川芎各三錢共研極細麵糊小丸煎小茴湯每下一二錢小兒素有疝氣數月一發發則有形外連睪丸內貫小腹腫硬成條約長數寸發時大小便秘或日久不愈服當歸木香湯當歸川芎豬苓澤瀉橘核木通川楝肉炒青皮炒小茴元胡各一錢木香黑梔仁各五分煎服小兒陰腫陰器者諸筋之總會也因邪客於少陰厥陰之經濕熱之氣與風冷之氣相搏氣不宣通故結聚而陰囊腫大總之風盛多癢濕盛多墜熱盛多痛如腎莖與腎囊俱腫癢痛重墜者風濕襲於下也服疏風五苓散如只腎囊色赤腫痛光亮尿秘者心火移熱於小腸也服加味五苓散更有偏墜一症或左或右睪丸腫突因食積不消濕氣下注也服加味守效丸疏風五苓散羌活防風蒼朮白朮茯苓豬苓澤瀉桂心蘇梗生薑加味五苓散金鈴肉炒白朮炒小茴茯苓豬苓澤瀉桂心木通赤芍橘核檳榔淡竹葉燈心引加味守效丸酒炒山楂肉製蒼朮泡南星各三錢泡吳萸焙乾海藻昆布各五錢醋炒元胡青皮炒荔枝核橘核神麯製半夏白芷各八錢共研極細麵糊為小丸酒下一錢日三服小腸氣痛因濕氣在內寒氣又束於外故發時少腹脹急下控睪丸中引腰脊上衝心痛而不腫赤當詳審形狀治之如引腰而痛宜溫散服加味香蘇飲痛而上衝心氣者服加味失笑散如少腹中有形如卵上下往來痛不可忍者服葫蘆巴丸加味香蘇飲醋炒香附蘇莖葉製蒼朮炒小茴川楝肉陳皮甘草蔥引加味失笑飲微炒元胡炒蒲黃五靈脂等分研細酒服一錢日二服葫蘆巴丸炒葫蘆巴炒川楝肉各五錢炮附子醋炒吳萸炒黑醜各二錢炒小茴巴戟肉各三錢共研極細麵糊小丸酒下五分日三服附法七疝湯治諸疝氣及奔豚氣酒炒元胡炒小茴川楝肉黑梔仁北沙參各二錢炮附子一錢焙全蠍三隻木香五分酒水兌煎頻頻溫服奔豚方治奔豚氣痛不可忍者焙乾全蠍酒炙山甲炒小茴廣木香等分研極細酒水調下一二錢奪命湯治奔豚攻心神色昏怖鹽水炒吳萸二錢澤瀉一錢肉桂五分煎服余法見彤園醫書婦科積聚門附治小兒腎囊潰爛睪丸突出者燒杉木炭研末篩細厚塗患處取蘇葉包裹以絹縛住或用生荷葉烘熱如法包裹亦效附治小兒坐臥濕地被蚯蚓氣吹下陰致腫大而垂久則痛引少腹常用蒼朮和鹽煎湯浸洗能解蚓毒兼服數次小兒脫囊脫肛遺毒臍瘡胎瘤丹毒俱詳載彤園醫書外科四卷小兒諸處瘡瘍癰疽皆與大人同治另詳四集彤園醫書外科書黃疸門總括總因濕熱鬱久外發皮膚面目皆黃遍身金色甚者深黃色暗狀如煙燻其中又有陰陽之別分疏於下陽黃乃因胃經濕熱鬱久發黃色亮身熱口渴唇焦尿赤脈洪若浮洪無汗而表實者服茵陳麻黃湯使黃從汗解脈洪實腹滿便秘而裡實者服茵陳蒿湯使黃從下解若表有汗里不便秘是表裡無症不可汗下只宜利小便常服茵陳五苓散通利之茵陳麻黃湯茵陳五錢麻黃二錢煎湯熱服蓋被臥取汗汗後禁風按此湯施於冬月最宜恐夏秋月熱難任峻表可服當歸拈痛湯治陽黃表實無汗身痛發熱口渴便秘茵陳苦參黃芩知母俱酒炒製蒼朮炒白朮北沙參當歸炙草羌活防風升麻葛根澤瀉豬苓煎服取汗用代前湯茵陳蒿湯茵陳四錢酒浸大黃錢半炒梔子二枚煎湯溫服取下或小便利下如皂角汁狀黃從利解矣茵陳將軍湯治陽黃裡實脈沉實腹滿便秘等症茵陳三錢酒浸大黃姜炒厚朴黃芩各一錢煨枳實炒梔子甘草各五分生薑燈草引若治寒濕發黃去大黃梔子加乾薑炮附子若陽黃表裡已解去大黃加酒炒黃柏清之茵陳五苓散治陽黃表裡無症服此通利小便或尿秘煩渴常服自除茵陳澤瀉各二錢土炒白朮茯苓豬苓各錢半桂心五分陰黃乃因脾濕腎寒兩虛而成其色暗黃身冷不渴自利脈遲若沉遲嘔逆腹痛便利宜溫脾去黃服茵陳理中湯如脈沉細下利清穀肢冷腹痛宜溫腎去黃服茵陳四逆湯陰黃退後服後二方調理茵陳理中湯茵陳土炒白朮炮姜炙草人參等分煎服茵陳四逆湯茵陳炙草各二錢乾薑錢半生附子三錢切三片煎服集成溫胃飲治陰黃日久食少倦怠茵陳炙草當歸陳皮炮姜人參土炒白朮炒研扁豆棗引或常服六君子湯加茵陳集成肥兒丸陰黃退後服此調脾胃土炒白朮乳蒸沙參茯苓各一兩炒蓮肉二兩神麯苡仁白芍楂肉俱炒黃製半夏陳皮炙草各五錢炒川連炒砂仁各二錢曬研極細蜜為小丸米湯每下二錢日三服水腫門總括小兒水腫皆因水停脾肺二經停於胸中則滿停於膈下則脹所腫部位又當詳察如腫在腰以上者屬風法當發汗腫在腰以下者屬濕法當利水有通身上下俱腫者系風濕兩傷法當汗利兼施若腫而喘不得臥宜逐肺飲腫而便秘脹滿宜攻脾水腫從腹起漸至四肢者易調治腫從四肢起延至腹者每難治又有陽水陰水之分陽水屬實法宜攻泄陰水屬虛法宜溫補水腫脈宜浮大洪實忌沉細虛微風水腫乃因外感風邪致上身頭面肩背至腰間皆腫治宜發汗經所謂開鬼門是也主以越婢湯輕者服加減參蘇飲越婢湯麻黃三錢石膏末四錢生薑錢半甘草一錢棗二枚加法制蒼朮二錢不用棗引溫服被蓋臥取汗惡風甚加炮附子加減參蘇飲春夏秋月風水腫用此發汗祛風沙參蘇葉前胡桔梗陳皮枳殼法半夏葛根木香甘草去皮尖杏仁蜜炒桑皮大腹皮茯苓皮生薑皮蔥白引水煎熱服取汗風甚加羌活防風蒼朮桂枝濕水腫乃因脾經濕熱內發致下身自腰臍至兩足皆腫法宜利水經所謂潔淨府是也外用貼臍法內服沉香琥珀丸輕者服後方貼臍法研巴豆肉八錢紙壓去油取霜四錢水銀粉二錢石硫黃一錢共研成餅先用新棉一片將餅包裹安放臍中外以軟布縛定良久必瀉下惡水待瀉下三五次方可取去飲米粥補住體弱隔一日取下一次沉香琥珀丸沉香如無以木香代去皮郁李仁炒葶藶子各四錢防己琥珀陳皮澤瀉赤茯苓炒蘇子皮尖炒杏仁各二錢各味另稱足曬研極細蜜為丸綠豆大麝香末滾衣白湯每下一錢或五分加味五苓散治小兒濕腫不堪峻利改用此方土炒白朮赤苓豬苓防己各一錢炒苡仁澤泄各二錢檳榔桂心各五分燈心煎服五皮飲治濕水腫五加皮地骨皮茯苓皮大腹皮生薑皮等分煎服風濕腫乃因內停濕飲外感風邪風濕相搏水道不利外攻肌表致頭面手足通身皆腫若喘急口渴便秘脈沉數氣實者用疏鑿飲子峻攻之脈弱不任攻者用茯苓導水湯緩利之如水停胸上攻肺喘急不得臥者用蘇葶丸瀉之水停中州脹滿不堪者用舟車神佑丸攻之余按後方疏鑿飲子羌活秦艽商陸檳榔木通椒目澤瀉大腹皮茯苓皮生薑皮赤小豆等分煎服茯苓導水湯蜜炒桑皮土炒白朮去心麥冬赤茯苓蘇莖葉大腹皮陳皮澤瀉木瓜各一錢炒研砂仁檳榔木香各五分燈心引蘇葶丸炒蘇子炒葶藶子等分研極細煮紅棗取淨肉搗膏糊藥為丸綠豆大薑湯每下五分舟車神佑丸炒䘌黑醜八錢酒浸大黃四錢甘遂紅芽大戟俱麵裹煨熟芫花青皮俱醋炒陳皮各二錢木香一錢輕粉二分共曬研極細水糊小丸空心薑湯每下一錢或五分便利三次為度加減胃苓湯治遍身浮腫脹滿喘急脈浮數者製蒼朮炒厚朴茯苓豬苓澤瀉桂心陳皮伏毛桑皮木瓜檳榔防己無汗惡寒加麻黃葛根喘急加杏仁葶藶尿秘加木通麥冬足冷重脹加苡仁附子身腫而痛加五加皮北防風脹甚加枳殼草果喘咳加蘇葉桔梗頭痛加羌活防風白芷葛根五子五皮飲治通身浮腫腫而後喘氣上喘急不得臥炒蘇子山楂子炒蘿蔔子炒葶藶子香附子桑白皮茯苓皮生薑皮大腹皮陳皮陽水腫乃因濕熱內郁水道阻塞外攻肌表致外腫內脹發熱口渴便秘心煩脈實浮洪濕盛脹滿者用前舟車神佑丸熱盛煩渴者服大聖濟川散或煎前五皮飲化下沆瀣丹見一卷噤口輕者服前加減胃苓湯大聖濟川散炒乾黑醜四錢泡去皮郁李仁酒炒大黃芒硝各二錢麵裹甘遂煨熟一錢研極細末薑湯每調下五分取通利為度陰水腫乃因脾虛不能制水腎虛不能主水致外泛作腫內停作脹脈弱無力若二便不實身不發熱心不煩躁者先服實脾散繼服金匱腎氣丸如身冷怯寒不熱不渴便利脈沉遲初起服加味平胃散後服腎氣丸實脾飲土炒白朮姜炒厚朴茯苓木瓜各錢半木香炙草炮附子炮黑姜大腹皮煨研草蔻各一錢姜棗引煎湯頻服金匱腎氣丸蒸曬熟地二兩另搗成膏炒山藥炒棗皮茯苓各一兩丹皮澤瀉車前子酒浸牛膝各七錢炮附子上肉桂各三錢後九味共研極細將地黃膏拌勻加煉蜜半斤糊丸梧子大白湯下一二錢日三服加味平胃散法制蒼朮姜炒厚朴土炒白朮煨研草蔻陳皮甘草茯苓藿香炮姜木香寒甚加炮附子先煎服數劑水腫附法小兒陰水腫脹若服溫補藥不效者是虛中有實也欲用峻攻恐兒難堪若不攻之坐以待斃須攻補兼施或一補一攻三補一攻審其有可攻之機以意消息必藥與元氣相當始能逐邪而不傷正攻補藥俱見上小兒胎元本虛或因瘧痢傷寒吐瀉之後致脾虛變生浮腫肢冷不渴尿利糞溏不思乳食氣乏虛喘脈沉微細者忌服消克利水之劑只用加味四君子湯人參炙草炮姜桂心煨研砂仁煨研白蔻公丁香各五分土炒白朮茯苓大腹皮炒苡仁各一錢姜皮引多服自消如通身不腫只肚腹腫大脹滿按之卻軟彈之如鼓鳴者宜服加味六君子湯前湯去桂心丁香加陳皮法半夏炒厚朴炒神麯凡患水腫脹滿百日之內忌食酸鹹脹滿門總括脹滿之症脾胃二經主之有虛有實虛者因久病內傷其脾法宜補脾土實者因飲食生冷停滯於胃法宜消導之脹滿脈浮大洪實者易治療分別於下虛脹寒脹因小兒久病脾虛或吐瀉暴傷元氣健運失常致飲食不化雖少食腹即脹滿精神倦怠肌瘦面黃主以香樸四君湯若脾胃虛寒脹滿便利肢冷氣乏脈沉遲者服厚朴溫中湯中寒虛脹滿悶不思飲食脈浮遲弱者此為寒脹初服樸香散若脹滿夾寒形氣虛者服寒脹分消湯如因吐痢大病後脾胃已虛覆被食積鬱氣寒飲濕痰停滯作脹者主以香砂和中湯又朝急暮寬者為氣虛服六君子湯加白蔻蘇梗暮急朝寬者為血虛用六君子湯加當歸川芎朝暮俱急者為氣血兩虛用六君子湯加當歸川芎香附砂仁香樸四君湯酒炒香附姜炒厚朴土炒白朮茯苓各二錢炙草人參各一錢生薑皮錢半或加陳皮厚朴溫中湯薑汁炒厚朴炮姜陳皮茯苓各二錢煨研草蔻炙草木香各五分寒甚加桂心炮附子樸香散薑汁炒厚朴一兩炮製附子五錢木香三錢共研極細薑湯每調下一二錢日三服寒脹分消湯炮川烏畢澄茄炒厚朴炒川連炒青皮乾薑生薑麻黃柴胡澤瀉當歸各一錢泡吳萸煨草蔻炒黃柏製半夏炒研益智仁升麻茯苓黃耆人參木香各三分水煎頻頻服香砂和中湯藿香香附炒研砂仁土炒白朮製蒼朮炒青皮炒枳殼神麯山楂陳皮茯苓甘草姜皮引六君子湯人參炙術茯苓炙草陳皮法半夏姜棗照前法加味經曰寒因寒用故用補藥治寒脹初服愈脹久服自通惟精達經旨者知之實脹熱脹因小兒飲食過度胃中停滯致腹脹滿大便秘結身體潮熱心煩口渴形氣壯實脈洪有力者用小承氣湯下之輕者服加味平胃散或服沆瀣丹見一卷噤口若腹脹便秘發熱喘渴脈沉數者此為熱脹服枳實分消湯熱脹形氣虛者服熱脹分消湯小承氣湯大黃四兩姜炒厚朴二錢麵炒枳實一兩熱服取下為度加味平胃散製蒼朮厚朴陳皮山楂蘇葉茯苓大腹毛蘿蔔子神麯麥芽香附枳殼俱炒黃生薑皮引枳實分消湯炒厚朴三錢炒枳實錢半酒炒大黃一錢炙草桂心各五分生薑引熱脹分消湯炒厚朴二錢川連條芩知母枳實俱炒法半夏陳皮澤瀉茯苓各一錢乾薑薑黃豬苓炙草炙術砂仁人參各五分凡腫脹之症皮浮色蒼者屬陽氣分也陽性急為脹也速可從上漸下故得以安臥邪在外也皮薄色澤者屬陰血分也陰性遲其為脹也漸每從下而遞上更有咳喘不得臥之徵也外有單腹脹經脈脹蠱脹水脹諸條非小兒常有之證茲不備載學者欲窺全豹請按初集大方脈四卷雜病篇
