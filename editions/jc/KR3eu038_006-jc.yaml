body:
  text: 卷前篇麻疹證治疹原疹非一類有瘙疹癮疹溫疹蓋痘疹奶麻風疹皆非正疹也附錄後篇惟麻疹則為正疹系胎元之毒伏於六腑感天地邪陽火旺之氣自肺脾而出故多咳嗽噴嚏鼻流清涕眼淚汪汪眼胞浮腫身熱二三日或四五日始見點於皮膚之上形如麻粒色若桃花間有類於豆大者此麻疹初發之狀也形尖稀疏漸次稠密有顆粒而無根暈微起泛而不生漿此麻疹見形之後大異於痘也須留心調治始終不可一毫疏忽雖較痘症稍輕而變化亦速在頃刻也分別症治於下麻疹輕重麻疹出時有輕重之分臨時須審症若氣血和平素無他病者雖感時氣而正能制邪故發熱和緩微微出汗神氣清爽二便調勻見點則透徹乃至收沒不疾不徐此症輕而易治若素有風寒食滯表裡交雜一觸邪陽火旺之氣內外合發而正不能制邪故初起大熱無汗煩躁口渴神氣不清便閉尿澀見點不能透徹收沒或太緊速此症重而難治也活幼心法曰麻疹初起白睛色赤聲啞唇腫狂叫煩渴腰腹脹痛口鼻出血者毒閉於內也急服宣發藥疹能透出者或可得生大抵鼻出血者毒重口出血者毒尤重初起手心如焚者毒亦重此時若不清解致毒蘊於胃口鼻息氣腥臭則生牙疳身熱不退流入大腸則成毒痢矣又有一種奶痧風痧斑疹皆感風寒暑濕而成不與麻疹同其治法麻疹主治大法凡麻疹出貴透徹宜先用表發使毒盡達於肌表若過用寒涼冰伏毒熱則必不能出透多致毒氣內攻喘悶而斃至若已出透者又當用清利之品使內無餘熱以免疹後諸症且麻疹屬陽熱甚則陰分受傷血為所耗故收沒之後須以養血為主此首尾治疹之大法也所有疹中前後雜病詳見後篇雜症治法門活幼心法曰麻形如麻痘形如豆皆象其形而名之也痘出五臟屬陰臟陰多虛寒故治痘多溫補麻出六腑屬陽腑陽多實熱故治麻宜解散也然麻雖屬腑而其熱毒之氣上蒸肺臟肺主皮毛實受其毒故初發熱雖似傷寒而肺經現症居多如咳嗽噴嚏面腫腮赤鼻流清涕眼淚汪汪兩胞浮腫是也初起熱和緩身微汗二便調能飲食者最吉若氣喘鼻乾壯熱驚煩者最重疹出初形如疥或如米尖漸次稠密色潤正紅者順紫色者險黑色者逆大法麻初發熱即當發表疹已出透方用清涼收沒之後養血為主又當辨其寒熱虛實隨症施治不可用藥失序也所有雜症詳見後篇忌驟用寒涼初宜發表使毒透發若遽服寒涼則毒氣壅鬱反而內攻忌誤用辛熱如麻桂羌獨蒼朮砂仁木香丁香之類皆能生熱助毒也忌妄用補澀如麻疹多有下痢之症輕者毒從痢減不必治痢重者亦只宜通利小便痢可自止忌用參朮訶子肉蔻之類餘症仿此麻疹禁忌比痘疹尤甚忌食雞鵝羊犬魚腥恐日後遇時疫斑疹重發也忌食肥甘醇酒恐釀濕熱變生惡候也多食酸鹹令咳不止妄食辛辣令生搐熱誤食生冷停滯凝痰初起固宜禁收後又當禁一月麻疹前後要禁風寒初起犯之壅蔽毒邪疹後犯之致成傷感而難治麻疹發熱症治麻疹一症非熱不出故欲出時身先熱也表裡無邪者熱必和緩毒氣鬆動則易出而易透若兼風寒食熱諸症其熱必壯盛毒氣伏鬱則難出而難透主以宣毒發表湯隨症加減或有夾雜之症當於後方選用宣毒發表湯升麻葛根芥穗防風前胡桔梗甘草木通淡竹葉薄荷葉去心連翹麵炒枳殼炒研牛蒡芫荽引或用蔥白若外感寒邪加麻黃夏月勿用食滯加山楂肉內熱甚加黃芩活幼防風湯治麻疹發熱已三日尚不見出或系奶痧風疹疑似不分防風葛根芥穗桔梗去皮尖炒研杏仁各一錢麵炒枳殼當歸川芎陳皮蘇梗甘草山楂各八分紅花四分冬月加羌活八分蔥白三寸引毒方紫蘇莖葉數兩切入罐內水浸封口煎熟揭開令兒鼻嗅其氣或以綿蘸湯洗手足心但忌通身洗浴恐熱氣內蒸致煩躁不寧也發熱附方升葛桂枝湯春冬天寒用此發表升麻葛根桂枝赤芍防風甘草豆豉生薑引冬感寒無汗加麻黃春加羌活蘇葉咳加芥穗桔梗喘加杏仁頭身痛加川芎羌活內熱加炒牛蒡升葛白虎湯夏秋天熱用此發表升麻葛根白芍甘草知母各一錢石膏末三錢粳米一撮喘嗽甚加芥穗防風杏仁桔梗熱甚便秘煩渴加芩連梔子木通荊防敗毒散天氣平和用此發表芥穗防風茯苓川芎羌活獨活柴胡前胡枳殼桔梗各一錢甘草薄荷各五分生薑引天何采薇湯鐵鏡治麻疹初發熱羌活獨活柴胡前胡升麻葛根川芎陳皮甘草茯苓赤芍桔梗炒枳殼炒厚朴製蒼朮製半夏藿香姜蔥麻疹見形症治麻疹見形貴乎透徹出後細密紅潤則為佳美有不透徹者須察所因如因風寒閉塞必身熱無汗頭疼嘔逆疹色黯而淡紅宜服加味升葛湯如因毒熱壅滯必身熱面赤譫語煩渴疹色滯而紫赤宜服三黃石膏湯又有正氣虛弱不能送毒外出者必面色㿠白身體微熱精神倦怠疹色白而不紅宜服人參敗毒散余法按後附方加味升葛湯升麻葛根各錢半白芍炙草蘇葉川芎炒研牛蒡各一錢生薑三片蔥白三寸三黃石膏湯石膏末三錢蜜炒麻黃川連川柏條芩梔子各一錢豆豉二十粒蔥白三寸引有微汗減麻黃一半人參敗毒散羌活獨活柴胡前胡枳殼桔梗川芎茯苓各一錢炙草人參各五分生薑三片無人參重用沙參代見形附方解毒快斑湯孟氏治發熱二三日麻方見點恐出不透預服此宣發之連翹葛根芥穗桔梗當歸生地紫草炒芩各一錢川芎防風山楂肉各八分蟬蛻七隻去頭足煎服數劑化毒清表湯吳氏治麻已出齊深紅腫大煩渴便秘因毒熱壅盛者炒研牛蒡地骨皮川連梔子薄荷條芩各五分知母玄參花粉桔梗前胡連翹木通葛根防風甘草各八分渴甚加麥冬石膏燥結加大黃集成曰痘疹宜作三四次出謂之出勻麻疹貴乎一齊湧出謂之出透以紙捻燃火照之遍身如塗朱之狀此將出之兆也出則細密粒粒成形微微滯手或三五相連界限清而無紅暈此麻疹見點之形也非若風斑瘟疹只皮紅成片顆粒不清或如蚊咬之跡也要之麻發於心正紅為貴色若淡白心血虧也宜服養血化斑湯色太紅豔或紫赤焮腫及麻出太甚者俱服大青湯色若紫黑乃凶症也急往東方路邊上尋取幹人糞燒灰篩末酒水每調一錢服二三次疹變紅色者可生若仍紫黑不治之症也見形時所有雜症統載後篇養血化斑湯治疹色淡白心血虧者沙參三錢當歸生地各二錢酒炒芥穗紅花去足蟬蛻各八分姜三片棗二枚解毒大青湯治疹色紫赤毒熱太甚大青葉淡竹葉石膏末地骨皮芥穗元參生地熟地知母花粉木通甘草煎服鐵鏡曰亦有麻疹發熱數日心火盛極刑剋肺金不得透出者必舌赤苔焦煩渴便秘先用川連木通梔子連翹淡竹葉燈心草等分煎服隨用升麻葛根芥穗防風枳殼桔梗赤芍木通柴胡連翹甘草車前子炒桑皮炒研牛蒡煎服自然出透麻疹收沒症治麻疹見形三日之後當漸次收沒不疾不徐始為無病若一二日疹即收沒此為太速乃因調攝不謹或風寒所襲或邪穢所觸致毒反而內攻輕則煩渴譫狂重則神昏悶亂急服荊防解毒湯外用胡荽酒熏其衣被引疹透出方保無虞若三日之後當收不收其症潮熱煩渴口燥咽乾此因內有虛熱留滯於肌表不可純用寒涼之劑主以柴胡四物湯使血分和暢餘熱除疹即收矣余法按後附方荊防解毒湯芥穗防風川連條芩連翹薄荷人中黃大青葉炒研牛蒡犀角如無代以羚羊角末蘆根燈心引胡荽酒切碎胡荽四兩酒淹入罐內封口煎熟乘熱揭開頻熏其衣被引疹透出如無胡荽用鵝不食草代或用蘇葉生蔥照法熏之柴胡四物湯當歸生地炒芍川芎柴胡條芩地骨皮淡竹葉酒炒知母去心麥冬北沙參姜棗引收沒附法鐵鏡曰亦有麻方見點忽然收沒審其脈症非系風寒邪穢所侵但見唇色慘白口氣微微時瀉清水者此因內虛不能送毒出外也治宜托裡用加味八珍湯若系風寒外襲蔽毒攻裡者服前天保采薇湯發之亦有三日後疹已收沒但見面色青白唇淡氣弱者主以調元保肺湯亦有疹出綿密三四日不收沒面赤煩渴便秘者此毒火太甚也宜服化斑解毒湯使毒發於外里無餘邪免生後患也加味八珍湯土炒白朮酒炒白芍當歸川芎生地熟地茯苓甘草芥穗防風人參姜棗外用酒煎蔥白常熏其衣被調元保肺湯蜜炙黃耆沙參茯苓當歸炒芍丹皮陳皮百合子炒研苡仁去心麥冬瀉白加木香瀉黃加車前子化斑解毒湯玄參知母升麻連翹人中黃大青葉石膏末淡竹葉炒研牛蒡酒炒大黃便利去大黃集成曰麻疹出沒常以六時為準者輕症也假如子後出午後即收午後出子後即收乃陽生陰成陰生陽成旋出旋收合造化自然之妙一滿三日通身收沒並無他疾此症最輕可勿藥而愈若麻點見出延纏三四日不收紅豔煩渴者當服大青湯見前見形若發熱五六日不甚見點或初出即收當審其或外感風寒或內傷生冷或曾吐瀉伏毒難出或肌膚厚實腠理不開輕者服荊防敗毒散發之見發熱附方表重者服加減麻黃湯倘觸犯寒邪毒氣內攻裡熱甚者服涼膈散加減麻黃湯麻黃石膏升麻甘草去足蟬蛻蔥白引涼膈散酒炒大黃芒硝梔子連翹薄荷竹葉甘草加炒研牛蒡生蜜引卷後篇雜證門身熱不退麻疹初起熱不出但熱貴和緩微微汗出方無表裡兼症可不藥自愈若初起壯熱無汗煩渴便秘是夾雜風寒食熱也治法已載初發熱門麻已出透身熱當減倘仍大熱者是毒盛壅結也宜服化毒清表湯若疹色紫赤煩渴悶亂宜服大青湯見現形附方如熱盛閉結又宜通里當服涼膈散見收沒附法若疹紅熱甚小水赤澀服連翹湯有麻初見點適值時疫流行反令壯熱僧寒強痛無汗症兼表裡壅蔽疹毒不能透出如蛇在灰如蚓在塵之狀者又當審其所兼之症治之如裡熱太盛急服黃連解毒湯如渴熱悶亂服荊防解毒湯見前如前症而兼吐瀉喘逆服柴胡橘皮湯表重服宣毒發表湯見前外用胡荽酒並用後方引疹透出見收沒症治麻已收沒身尚微熱不兼他症者此屬虛熱待氣血調和不藥自愈如收沒後餘熱留於肌表身常發熱惡寒渴飲者當服柴胡清熱飲若發熱太甚日久不退用柴胡麥冬飲清之至收沒既久往來寒熱或夜則熱甚發枯肌瘦此餘熱滯於血分也服柴胡四物湯見前收沒有麻後燒熱不除忽作搐搦不可誤作驚風妄用鎮墜之劑只常服導赤安神湯身熱匯方化毒清表湯炒研牛蒡地骨皮薄荷葉葛根防風川連條芩連翹木通知母元參甘草桔梗生薑燈心連翹湯連翹歸尾柴胡黃芩芥穗防風赤芍木通車前子生梔子滑石末甘草梢燈草引黃連解毒湯川連條芩川柏梔子等分熱服柴胡橘皮湯柴胡陳皮法半夏枯芩白芍竹茹炙草沙參赤茯苓生薑引柴胡清熱飲柴胡黃芩生地赤芍知母甘草地骨皮去心麥冬燈心引柴胡麥冬飲柴胡麥冬玄參膽草生地條芩沙參甘草竹葉引導赤安神湯木通生地當歸茯神炙草枯芩炒川連淡竹葉鉤藤鉤薄荷葉去心麥冬生薑燈心引煩躁口渴凡出麻疹煩躁口渴乃毒熱壅盛也蓋心為熱擾則煩身為熱動則躁胃為熱鬱則渴當疹未出時而見煩渴者用加味升葛湯發表清裡麻已見點心煩躁亂口渴鼻乾舌苔枯焦頭痛惡熱者當服白虎湯再煮綠豆湯炒米湯頻頻與服忌飲涼水前後仿此麻已收沒煩渴不止者主以竹葉石膏湯煩渴匯方加味升葛湯升麻葛根白芍花粉去心麥冬二錢炙草一錢姜引頭痛加川芎白芷身痛背強加羌活防風頭面浮腫加芥穗防風熱甚加連翹牛蒡石膏末咽痛再加桔梗玄參白虎湯熟石膏末五錢知母二錢甘草錢半粳米一合竹葉石膏湯石膏末四錢淡竹葉去心麥冬薑製半夏炙草沙參各二錢粳米一合或減半夏加花粉葛根又方人參去心麥冬煅石膏末生知母生甘草淡竹葉亦治煩渴又方淡竹葉石膏末薄荷木通桔梗甘草治胃熱作渴譫語妄言此症乃因毒火太甚熱昏心神致譫語亂言妄見妄聞神氣昏憒而然也麻疹未出而譫妄悶亂者服三黃石膏湯見前現形症治麻疹已出而譫妄昏憒者毒熱內壅也主以加味解毒湯麻疹收後譫妄神昏氣弱者餘毒未清也服辰砂導赤散譫妄匯方加味解毒湯川連條芩川柏梔子生地連翹丹皮銀花甘草淡竹葉辰砂導赤散蜜蒸萎蕤去心麥冬川連梔仁木通生地甘草梢淡竹葉煎湯臨服調入辰砂末一二分喘急症治喘為惡候麻疹尤忌之如初出未透發熱惡寒通身無汗而喘急者此表實拂鬱其毒也服麻杏石甘湯發之使疹透出喘自止矣若有汗而喘急者此內停表邪也服桂樸杏仁湯以清解之麻疹已出忽胸滿喘急者此毒氣內攻肺金受克服清氣化毒飲清之若遲延失治以致肺葉焦舉則難救矣麻疹已收尚有餘毒嵇留肺胃致令喘急咳嗽身或發熱者當用清肺飲清之至若麻後氣逆喘嗽面白有痰此乃肺金本病常服清金飲余法按三卷喘急匯方麻杏石甘湯蜜炒麻黃三錢熟石膏末六錢去皮尖炒研杏仁生甘草各一錢生薑三片溫服取汗桂樸杏仁湯桂枝生薑酒洗白芍姜炒厚朴各二錢生甘草去皮尖炒研杏仁各一錢紅棗引清氣化毒飲前胡桔梗連翹甘草川連枯芩蘆根元參制栝蔞仁蜜炒桑皮去心麥冬去皮尖炒研杏仁煎湯常服清肺飲熟石膏生地各二錢歸尾玄參知母桔梗柴胡片芩去心麥冬陳皮各一錢甘草淡竹葉炒殭蠶各五分煎服清金飲前胡柴胡知母貝母炙草茯苓陳皮桔梗炒桑皮炒枳殼薄荷葉去心麥冬常服自愈咳嗽症治麻疹發自脾肺故多咳嗽若咳嗽太甚當分前後施治不可用藥失序如疹初發熱及初見點時咳嗽太甚者此因風邪所郁也宜服加味升葛湯透發之輕者服荊防敗毒散加蘇葉杏仁見前發熱附方麻疹已出透而咳嗽不止者乃肺為火灼也宜服清金寧嗽湯或火灼肺金咳嗽面浮致麻疹出不透徹者先服集成甘桔湯以清肺熱次服荊防解毒湯透發之見前收沒麻已收沒餘毒未解咳嗽潮熱者服前清肺飲咳嗽吐痰者服前清金飲若喘急咳嗽身熱心煩者當服集成清肺湯麻收未久內熱不清頻頻咳嗽無有已時久則心神慌亂夜臥不安或脾虛食少四體生瘡形羸消瘦者可常服孟氏大真膏余法按三卷咳嗽匯方加味升葛湯升麻葛根白芍前胡桔梗各錢半炙草蘇葉去皮尖炒研杏仁各一錢生薑蔥白引清金寧嗽湯陳皮前胡川連桔梗甘草貝母蜜炙桑皮淨栝蔞仁去皮尖炒研杏仁生薑紅棗引集成甘桔湯桔梗熟石膏各三錢甘草酒炒知母炒研牛子各一錢薄荷五分引陳氏清肺湯去心天冬麥冬酒炒知母干桑葉地骨皮片芩茯苓生地前胡炙草沙參薄荷引孟氏天真膏去心麥冬沙參玄參生地知母黃耆當歸土炒白朮桑白皮各二兩茯苓茯神丹皮陳皮紫菀棗仁各一兩共切碎末入砂鍋內水煮至藥片無味為度布濾去滓取汁再入鍋內用文武火熬成稠糊方入白蜜和勻再熬成膏磁器收貯每用一匙滾湯沖化日進三服咽喉腫痛疹毒熱盛上攻咽喉輕則腫痛甚則湯水難下最為可慮當按法治之如初起發熱時表邪郁遏疹毒不能發舒於外致咽喉腫痛者主以元參升麻湯外吹二聖散前後皆用此忌吹寒涼藥及噙涼水有麻初發熱便覺咽喉腫痛喘咳連聲面目光浮時臥時起者此火毒蒸肺也主以加味甘桔湯或煮爛綠豆炒米少加鹽花以當飲食麻疹已出或裡熱壅盛致咽喉腫痛者主以涼膈消毒飲外吹二聖散集成曰麻痘喉痛本是常症總因疹毒上蒸致咽喉乾燥悶痛甚則紅腫不似喉痹蛾風之有形跡可任針割也故忌用針灸寒涼當按前法喉痛匯方玄參升麻湯芥穗防風元參升麻甘草桔梗炒研牛蒡煎湯頻服二聖散切碎苦參薄片曬研淨末三錢白直殭蠶曬研淨末一錢稱足合研每用竹管吹入二三分加味甘桔湯桔梗甘草知母元參升麻葛根石膏末炒研牛子竹葉引涼膈消毒飲芥穗防風連翹枯芩樸消甘草薄荷梔仁炒研牛子酒炒大黃燈心引聲啞失音聲啞失音者乃熱毒閉塞肺竅而然也如麻疹初發熱即失音者主以元參升麻湯見前喉痛忌食生冷酸辣油膩之物麻疹已出聲啞失音者當兼清熱主以加減涼膈散麻疹收後聲啞失音者但宜清解餘熱主以兒茶散音啞匯方加減涼膈散去心麥冬炒研牛子薄荷葉生梔子元參連翹桔梗甘草條芩蔥白引兒茶散兒茶五錢硼砂二錢共研極細每用溫水調服一錢麻疹嘔吐凡麻疹嘔吐者皆由火邪內迫胃氣衝逆也宜和中清熱服竹茹石膏湯有麻初發熱便作大吐而後見點者本屬輕症謂毒從吐解也與平常吐症不同治法但當微表安胃和中主以吳氏和中湯嘔吐匯方竹茹石膏湯竹茹赤茯苓各錢半熟石膏三錢法半夏陳皮生薑各一錢甘草五分吳氏和中湯土炒白朮酒炒白芍當歸茯苓法半夏陳皮甘草桔梗柴胡丹皮防風葛根姜棗引麻疹泄瀉麻疹泄瀉乃毒熱移入腸胃使傳化失常也當分別治之忌用溫熱諸劑麻疹初發熱初見點即作瀉者主以加味升葛湯麻已出透而內熱壅盛作瀉者主以加味解毒湯集成曰麻疹發熱吐瀉總由火邪內迫而成須分上中下焦隨症用藥如邪在上焦則嘔吐宜服芩半湯邪在下焦則泄瀉宜服黃芩湯若邪在中焦則吐瀉交作宜服柴胡橘皮湯見身熱不退泄瀉匯方加味升葛湯升麻葛根白芍赤茯各二錢豬苓澤瀉甘草各一錢加味解毒湯川連川柏條芩梔仁赤茯木通淡竹葉引芩半湯枯芩白芍甘草陳皮薑製半夏生薑引黃芩湯黃芩三錢酒洗白芍炙草各二錢棗引麻疹痢疾麻疹作痢謂之夾疹痢因毒熱未解移入大腸所致此症不可輕投澀劑凡前後腹痛下痢或白或赤或赤白相兼者悉用清熱導滯湯彤園曰麻初發熱即患痢者法當棄輕從重先用宣毒發表湯透發表邪使疹現出次用清熱導滯湯治痢方為合法疹後患痢當按前痢疾門隨症施治痢疾匯方清熱導滯湯吳萸湯炒黃連麵炒枳殼醋炒青皮炒研牛蒡檳榔各五分姜炒厚朴酒炒條芩當歸炒芍連翹甘草山楂各一錢生薑引集成方治麻出下痢用赤茯豬苓澤瀉草朮滑石末甘草梢淡竹葉治痢兼赤白用吳萸湯炒川連炒白蓮肉陳皮木香煎服治麻後赤痢川連芥穗地榆槐花俱酒炒煨枳殼側柏葉治麻後白痢升麻地榆俱酒炒泡吳萸煨枳殼滑石末甘草烏梅治患痢不已枯芩白芍俱酒炒滑石末甘草陳皮薑棗引麻疹腹痛此因食滯凝結毒氣不得宣發於外故不時曲腰啼叫蹙眉踐腳治以加味平胃散使滯消毒解痛自除矣麻已收沒內伏餘熱致腹痛脹秘或兼吐瀉者治以加味四苓湯腹痛匯方加味平胃散升麻葛根防風甘草陳皮山楂炒麥芽製蒼朮炒厚朴炒枳殼燈心引加味四苓湯土炒白朮姜炒厚朴赤茯豬苓澤瀉木通陳皮丹皮赤芍枯芩車前子麻疹衄血肺開竅於鼻毒熱上衝肺氣載血妄行則衄作矣衄中有發散之義輕者毒從衄解不必止之但衄血太過則血脫而陰亡宜外用發灰散內服加味犀角湯並後二方衄血匯方發灰散壯盛人頭髮洗淨納滿小砂罐內瓦片蓋口鹽泥固濟陰乾架炭火內煅令通紅待冷取灰研末篩細每用竹管吹入鼻中三五分加味犀角湯生地三錢白芍錢半犀角如無以川連代紅花甘草各五分當歸丹皮桔梗陳皮各一錢藕汁兌服活幼方治麻疹前後口鼻出血歸尾連翹生地赤芍丹皮甘草花粉貝母紫草薄荷砂研牛子酒炒川連淡竹葉引集成方治衄血太甚恐防陰脫玄參生地各二錢桔梗丹皮甘草白芍當歸丹參炒蒲黃黑梔仁各一錢冬茅根引牙疳口瘡凡麻後牙齦黑爛肉腐血出鼻息氣臭名曰走馬疳此因餘毒未解上攻齒牙甚則脫落穿唇破腮多至不救主以後三方牙疳匯方清毒涼血飲知母連翹當歸赤芍生地丹皮芥穗梔子大黃黃連俱酒炒石膏末孟氏方治牙疳及口瘡腫痛諸症炒殭蠶炒桑皮丹皮甘草連翹銀花生地川柏赤茯元參淡竹葉引外治方焙乾人中白二錢硼砂青黛兒茶各一錢明雄黃六分冰片一分共研極細先用米泔水漱淨口每用數分頻頻吹搽其餘口瘡諸症詳見一卷牙疳口部奶麻風疹凡初生之兒或在月內忽然發熱遍身見出紅點者俗名奶麻子是也亦有見出白點者名曰風疹皆內由胎熱外觸風邪而發切不可誤作麻疹施治主以後二方溯源解毒湯當歸生地白芍川芎炒連連翹陳皮木通沙參甘草母子同服活幼防風湯見麻初發熱通治奶麻風疹疑似不分母子同服瘙疹辨症兒在胎中受母血熱之氣熏蒸既久及生後外遇涼風致身起紅點狀如粟米月內見者名爛衣瘡百日內見者名百日瘡未出麻痘之前見者名曰瘙疹俱系皮膚小疾輕者勿藥自愈重者治同奶麻辨蓋痘疹此因痘後餘毒未盡或恣意飲食外感風寒致令痘瘡治愈此疹隨發其疹色赤作癢始如粟米漸成云片延及遍身只宜疏風清熱常服加味消毒飲炒研牛蒡酒炒升麻芥穗防風連翹薄荷赤芍山楂蟬蛻甘草生薑引癮疹症治先因心火灼肺又復外受風濕發時紅赤多癢隱隱於皮膚之中先宜疏風散濕服加味羌活散次當清熱解毒服前加味消毒散加味羌活散羌活防風前胡川芎連翹赤茯甘草桔梗麵炒枳殼去足蟬蛻薄荷葉生薑引外有瘟斑痧疹已載三卷瘟疫門麻後調理麻後禁忌統載前篇主治大法門書云麻疹收後養血為主茲附數方惟在醫者隨症加減四物湯熟地黃三錢當歸白芍各二錢川芎錢半乃養血總方六味地黃湯蒸曬地黃四錢棗皮山藥茯苓各二錢丹皮澤瀉各錢半人參養榮湯人參蜜耆炙術炙草陳皮茯苓桂心白芍熟地黃酒洗當歸去心遠志炒五味子姜棗引肥兒六白散淮藥芡實白蓮肉俱切片攤炒三次茯苓乳汁蒸曬各四兩苡仁三兩米泔浸一宿蒸熟曬白扁豆研去殼取肉一兩炒三次六味共研極細磁瓶收貯每用滾湯調化三五錢或加白糖少許疹後日服二次能壯脾胃痘中雜症水痘症治水痘發於脾肺由濕熱釀成初起與大痘相似面紅唇赤眼光如水咳嗽噴嚏唾涕稠黏身熱二三日而始出頂尖而圓大明淨如水泡形同小豆內含清水易出易收皮薄結痂中心圓潤不作膿漿與大豆迥別又不似丹毒根腳紅腫時隱時現也初起宜發表服荊防敗毒散見麻疹發熱水痘出透次宜清裡服加味導赤散始終忌食姜椒生冷葷腥外忌沐浴冷水敷搽涼藥犯之則成瘡癩水腫等症又忌過於溫暖恐痂燥難脫而成爛瘡所有禁忌同上麻疹見前篇主治大法加味導赤散生地赤茯滑石末去心麥冬各二錢木通連翹甘草梢淡竹葉各一錢酒炒川連五分燈心引痘癰因出大痘灌漿不足致毒不得透發留結經絡中小者如李大者如桃漫腫不紅亦無焮痛身熱心煩單生者毒在肌肉屬順連發數處者船小載重屬險若結於骨節之間成對發出者毒深難潰難斂屬逆初起不可強消內服透膿散外敷烏龍膏若膿已熟透用針刺破外貼萬應膏見彤園醫書外科六卷潰後服保元湯透膿散生耆三錢當歸川芎各一錢炙山甲皂刺各一錢酒兌溫服烏龍膏木鱉肉生半夏各一兩草烏三錢俱切碎再拌陳小粉二兩入鍋內炒焦研末篩細冷水調糊自外向內日敷塗三次保元湯人參以沙參代土炒白朮蜜炙黃耆當歸炙草等分姜棗引痘里夾癭此癭結於頸項或生耳後腋下形如桃李瓜果身熱煩渴由痰氣凝結也如痘初起即發癭者當托毒消痰忌寒涼耗散之藥若痘發三四日內而作癭者則毒隨痘漿灌泄自可挽回主以三消散倘癭先紅腫將膿一潰元氣先泄痘漿必不能充灌當乘未潰時服黃耆衛元湯若至七八日痘已灌足而發癭者宜服沖和飲子至痘已結痂而發癭者只宜清毒兼保元氣外治痘癭潰爛常貼生肌玉紅膏見彤園醫書外科六卷三消散當歸赤芍生地紅花茯苓法半花粉甘草陳皮木通去足蟬蛻炒研牛蒡煎服黃耆衛元湯人參生耆當歸炙草炒芍桔梗紅花防風等分煎服沖和飲人參生耆當歸炒芍柴胡桔梗芥穗防風花粉茯苓連翹楂肉去心麥冬土炒白朮痘里發丹丹之形色當與彤園醫書外科四卷赤遊丹參考但夾於痘里施治尤難主以加減牛蒡湯炒研牛蒡生地赤芍甘草木通柴胡芥穗羌活防風初起服數劑若毒湊上焦頭頂丹盛加炒連梔子外洗化斑湯升麻連翹白芷元參知母甘草黃連牛子煎湯蘸洗又研京墨冰片二末豬膽汁調搽痘風瘡爛由痘後遇風先發細瘡作癢次延成片脂水浸淫宜搽滲濕救苦丹若日久瘙癢無度毒水浸漬肌無完膚即成痘爛癩疾宜服十全大補湯兼服苦參丸外塗麥餞散若痘出破爛身無完膚者當用經效方滲濕救苦丹陀僧滑石各二兩白芷五錢共研細或干撒或蜜調搽十全大補湯人參炙術茯苓炙草當歸熟地炒芍川芎黃耆桂心姜棗苦參丸苦參二兩大黃川連條芩枳殼俱酒炒獨活防風元參各一兩炒梔仁白菊花各五錢研極細蜜為小丸茶湯每下一二錢麥餞散炒焦小麥二兩硫黃四錢白砒一錢川椒枯礬各二錢百草霜八錢共研極細先煎蔥湯蘸洗拭乾麻油調塗蓋扎油紙三日一換經效方新茶葉撿去梗入滾湯中一炸即撈起再撿去粗葉及硬梗乘熱鋪平床上上隔軟料草紙令兒臥之一夜膿水即干痘後生翳目病固多多因風熱而起症治詳見彤園醫書眼科書至痘後生翳忌用寒涼峻攻如翳膜遮睛隱澀羞明者主以加味龍膽湯若翳膜遮蔽睛痛赤腫者主以清毒撥翳湯若目翳日久不愈者常服鐵鏡方至痘後羞明怕日及流熱淚者服涼肝明目散加味龍膽湯膽草防風川連白芷蟬蛻蒺藜木賊草密蒙花蔓荊子白菊花煎服清毒撥翳湯當歸生地白芷川芎柴胡桔梗薄荷防風羌活甘草炒川連炒牛子炒蒺藜炒梔仁草決明白菊花密蒙花木賊草穀精草姜引便秘加酒炒大黃此方功兼表裡多服自愈鐵鏡方野兔屎焙研篩末滾湯每調二錢常服自愈涼肝明目散當歸膽草柴胡川芎防風荊子蒙花炒連每味一錢切豬肝一兩和入罐內水煎乘熱服痘疔八症五臟各有痘疔症治詳見五集彤園醫書痘科書再有痘中八疔附錄於下捲簾疔生舌根底下小如黑豆大似葡萄令兒舌卷喉痛急用銀鉤鉤破放去惡血將茶湯漱淨隨吹拔疔散研白礬食鹽各三錢燒紅鐵繡刀煅枯又研硇砂硃砂各二錢半擇丁日午時合研極細每用二三分竹管吹搽疔上內服黃連黃柏黃芩梔子等分煎服火珠疔生於鼻孔內填塞噴火面紅眼赤急用銀鉤鉤破放盡惡血頻塗黃連膏黃連黃柏薑黃各錢半歸尾三錢生地五錢麻油六兩浸藥三日漫火煅焦去渣再下黃蠟五錢攪令溶化布濾入磁碗中攪冷成膏聽用內服川連牛蒡生地紅花赤芍桔梗蘇葉甘草忘汲疔生於眼沿腫如蚌蛤面紫煩熱急用銀針挑破出血嚼爛胭脂取汁頻塗又煎菊花蒲公英湯蘸洗再點胭脂汁服藥同前豢虎疔生於耳內木悶脹痛俟膿成之時用銀針挑破搓綿紙捻拭淨膿血隨搽拔疔散見上服藥同前燕窩疔生於腋下腫硬煩躁如疔在左腋潛伏則右體之痘沉暗失色右亦如之急用銀針挑破出血拭淨頻塗拔疔散方見上內服川連連翹生地紅花赤芍茯苓木通甘草炒研牛蒡羚羊角末燈心引注命疔生於足心腫硬如鐵如豆如椒有紫筋直透足股用針挑破取大螺獅刁起厴納入冰片末五釐平放杯中良久螺竅內滲出涎汁雞翎蘸點疔上敷次後用生綠豆蒲公英搗成膏敷之服藥同前透腸疔在痘出五六日內生於肛門旁腫硬如錐用針挑破煎銀花防風湯浸洗研冰片輕粉珍珠白蘞末麻油調塗服藥同捲簾疔驪龍疔在痘出之時生於尿孔內身熱狂躁腹脹睛翻肢冷尿閉用蟾酥牛黃麝香冰片等分研細煎黃連汁待冷調藥成糊以細軟稻草心蘸藥吹入尿孔數次服藥同燕窩疔種痘源流傳聞宋真宗時峨眉山有神人出為丞相王旦之子種痘而愈法傳江右達於京畿湖南衡人復得秘訣此說雖似渺茫然以理撥之卻有參贊化育之功因時制宜之妙蓋自出之痘感於得病之後治於成病之時病因病引變症莫測而種痘則施於未病之先調於無病之日自表傳裡由里達表既無諸症夾雜於其中復有善方引導於其外熏蒸漸染胎毒盡出此誠避危就安之良法也有宋以來漢皆口傳心授未有成書近代名醫輩出如劉河間錢仲陽張潔古王海藏陳文中朱丹溪既薛立齋萬我田黃西邱諸人各抒精蘊著書立說以行於世然或主寒涼或主溫補或主解毒或兼活血養氣執論不一迄無定評茲薈萃群言歸諸折衷識者幸垂覽焉
