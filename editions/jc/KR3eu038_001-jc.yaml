seq: 1
body:
  text: 自序一先大父嘗手錄幼科方法甚詳予少時好而讀之輒有悟以醫人亦輒效予私自喜雖刀圭藥餌之費累數百金不屑屑計也術未竟入成均下帷攻苦三試棘闈膺薦不售乃喟然嘆曰余何必然哉棄舉子業退而讀家藏大方脈書上自靈樞素問本草難經暨仲景傷寒論金匱要略晰其條理通其歸趣鍵戶危坐炷煙徐裊而向所學方負圖卦太極無極之旨亦時況況胸臆間因又熟讀御纂醫宗金鑑見其訂正訛謬註釋詳明所為躋一世於仁壽之域者其在斯乎其在斯乎漢郭玉有言曰醫之為言意也矧上兒病病不自喻形在心手之間較諸大方脈為尤難顧其證候傳變客有出陰陽表裡寒熱虛實八者之外乎博觀諸家幼科脫漏者眾率行私臆似是而非後之學者瞀焉不揣簡陋思薈萃而折衷之分門別類辨證立方遵奉金鑑幼科為主輯諸家可相發明者附焉帙成以授梓客謂予曰子之為是書也歷嚴寒盛暑至夜分不輟義精而約詞簡而賅匪惟醫幼人儘可醫矣行見陽春無足而懸之國門將遍走通邑大都朱門高第下逮閭巷婦孺無不寶是書者予喟然嘆曰客奚為是言哉予既棄場屋予之為此特此率先人之遺業非以求名也顧嘗聞歐陽子之言矣利雖不必博於物要其心之厚於仁世之習是術者執斯編而讀之其亦鑑予之心也夫嘉慶二年新鐫自序二上古醫經有法無方後漢張仲景著傷寒論立二百九十七法一百一三方神明變化既詳且盡其治雜證也又有金匱要略分門別類包舉兼括無非示人以規矩準繩欲其觸類旁通以應變於無窮也而傷寒論自成無己創注以來踵行者數十家金匱要略自趙氏衍義後繼起者十餘人各有精義羽翼經文然或涉浮泛或近隱僻純疵互見難以適從御纂醫宗金鑑採輯諸家註釋刪其駁雜取其精粹補其闕漏發其餘蘊於以集醫學之大成焉茲衍其奧旨彙纂幼科分為四卷凡傷寒感冒驚癇疳痙雜病麻疹悉分經論治諸家方書有似是而非者概不入選俾學者志有定向不惑他歧由此而融會貫通於以施治大小男婦無難矣幼科云乎哉
