body:
  text: 卷之四霍亂門總括霍亂者乃風寒暑飲之雜邪為病也卒然揮霍變亂心腹大痛吐瀉交作其能吐能瀉者謂之濕霍亂夫暑飲雖盛一經吐瀉邪有去路其症易治若欲吐不能吐欲瀉不得瀉謂之乾霍亂蓋寒盛則凝既不吐瀉邪無去路俗名絞腸痧若喘滿抽搐不治之症也分別於下濕霍亂濕霍亂乃因暑飲合邪其症吐瀉不已肚腹疼痛口渴引飲胸膈痞悶飲盛者治以二香飲見三卷傷暑暑盛者治以辰砂益元散見三卷暑厥門若暑濕風寒雜揉而成霍亂壯熱憎寒吐瀉腹痛者當服藿香正氣散若暑濕相兼吐少瀉多脈浮尿秘者當服五苓散藿香正氣散藿香蘇葉白芷茯苓各錢半陳皮桔梗製半夏炙白朮炒厚朴大腹皮各一錢甘草五分姜棗引或加木瓜傷食加消導藥加炒研扁豆姜炒川連香薷名二香飲又名藿薷飲五苓散土炒白朮豬苓茯苓各錢半澤瀉二錢肉桂五分有表用桂枝四苓散即前方減去肉桂也暑毒入心加川連胃熱加石膏竹茹乾霍亂乾霍亂俗名絞腸痧乃因寒暑凝結欲吐不能吐欲瀉不得瀉治當分別如煩渴大飲者為暑盛服桂苓甘露飲先清暑熱便利自減若絞痛不渴手足逆冷脈沉伏者屬寒凝服加味理中湯以溫散裡寒桂苓甘露飲滑石末二錢寒水石石膏末各一錢炙白朮茯苓豬苓甘草澤瀉桂心各五分燈草引理中湯土炒白朮炮姜炙草各二錢人參五分無參用姜煮萎蕤三錢加藿香錢半寒甚加附子寒實結胸加枳實五分凡絞腸痧初起忌食穀米粥飯麵食肉糜之類即米湯下咽亦能助胃邪強盛邪無去路內攻越急雖乳哺亦宜停緩待服藥後或得吐瀉腹痛減時方可飲食切記切記初起服後湧吐方最妙霍亂轉筋轉筋者俗名縮陰症有寒熱二因皆令陰莖縮入腎囊縮小少腹絞痛也女子則陰器束緊少腹牽痛兩乳收縮治詳彤園醫書婦科三卷厥陰傷寒門中但小兒宗筋拘急腎莖縮入者急扯出用竹戥盒夾住將箍扣緊分別寒熱治之陰寒轉筋寒邪深入厥陰肝臟牽引宗筋致莖囊縮入臍腹脹痛肢冷喘逆口鼻氣涼面黑舌短苔滑無津時出冷汗脈微絕或洪弦或沉細皆屬裡寒症主以固真湯或用前理中湯加炮附子上肉桂陳皮茯苓固真湯蜜炙黃耆土炒白朮乾薑各三錢人參茯苓炮附子炒良薑姜炒厚朴各一錢空心煎服一方治陰寒轉筋炒枯黑豆淬酒頻頻蕩服又方熱酒調樟腦頓服又方研石硫黃胡椒末白湯每下五分搗爛薑蔥炒熱布包熨臍腹陽熱轉筋寒入厥陰從陽化熱致少腹煩滿循陰器之筋為熱所灼莖縮囊收舌焦卷而胎燥裂大便秘而腹絞痛飲多尿少脈數而大熱氣撞心皆屬實熱當服六一順氣湯攻下之方見三卷陽明傷寒若陽熱尚微脈不甚實雖見此症只用四逆散疏通其陰後服前二香飲四逆散柴胡炙草酒炒白芍麵炒枳實等分研末白湯每下二錢心下悸加桂枝尿秘加赤苓等分煎服亦可一方治陽熱轉筋枯礬白礬各五分研末白湯調服小兒減半又方滑石末二錢甘草末五分薑湯調頻服自效湧吐方炒枯食鹽二兩乘熱淬入熱童便中作三次頓服必令吐瀉倘不吐瀉是邪盛結在中焦也用前方多與兒服少頃抱緊兒肚以指頭或鵝翎探掃喉間必令或吐或瀉後服諸藥準繩曰鹽調童便非獨用以降陰之不通也陰不通血亦不行用此以行血按絞腸痧初起毋論寒熱皆宜用此方瘧疾門總括瘧疾之症多因夏傷於暑其氣舍於榮內至秋復感寒風則榮衛合邪而成瘧發時或寒或熱者陰陽相併也每日作者因初病邪氣尚淺伏藏於榮隨經絡而行故也其間日作者因邪已深入脊膂間伏藏於衝脈故也其晝發者因邪在三陽之淺其夜發者因邪在三陰之深也瘧將退者則由夜而晝由間日而至每日此為去陰就陽由深出淺其病欲已也分別症治於下寒瘧瘧疾初起因先傷於寒後傷於風寒多熱少脈浮緊無汗此為寒瘧服麻黃羌活湯麻黃羌活防風各二錢甘草一錢生薑三片嘔加法半夏煎湯於將發之先溫服用被蓋臥取汗自解後按附法門調理風瘧瘧疾初起有因先傷於風後傷於寒熱多寒少脈浮緩有汗此為風瘧服桂枝羌活湯桂枝羌活防風各二錢甘草一錢生薑三片嘔加半夏煎湯照前法服此瘧疾初起發散之二法也風寒瘧疾瘧初起寒熱兩平不多不少者此屬太陽未盡之表邪名風寒瘧主以桂麻各半湯桂枝麻黃酒洗白芍各錢半生薑炙草各二錢去皮尖研杏仁七粒大棗二枚汗少倍麻黃汗多倍桂枝熱甚加石膏末煎湯照前法服食瘧此因食而病瘧由小兒飲食無節復受風暑之氣致寒熱交作胸腹痞脹惡食面黃右關氣口脈來緊盛或弦數洪實輕者服柴平湯重者服大柴胡湯方見三卷陽明傷寒加煨研草果姜炒厚朴檳榔芒硝攻下之柴平湯柴胡法制蒼朮各二錢法半夏黃芩陳皮炙草姜炒厚朴各一錢人參五分無參用蜜蒸萎蕤三錢姜棗引氣實加煨研草果檳榔痰瘧飲瘧小兒素有痰飲復因外邪凝結脾胃致嘔逆痰涎往來寒熱或熱多寒少口苦嗌乾小便赤澀脈來弦數宜用清脾飲和之隨症加味清脾飲青皮厚朴俱醋炒酒炒黃芩土炒白朮薑製半夏煨研草果茯苓柴胡炙草生薑加味法初起氣實加檳榔久瘧不止再加酒炒常山一錢烏梅一個痰盛倍半夏加陳皮大渴加麥冬知母渴而壯熱再加花粉石膏飲盛倍茯苓加蒼朮濕盛加蒼朮澤瀉兼食滯加炒曲麥芽山楂諸瘧附法桂枝白虎湯見三捲風溫症治治溫瘧初起先發熱後惡寒心煩不眠汗多脈遲陽明症兼太陽者若脈洪大汗出惡熱煩渴甚者只服白虎湯見三卷陽明傷寒柴胡白虎湯見陽明傷寒治癉瘧陽氣盛陽獨發但發熱而不惡寒煩渴喘嗽口苦脈弦陽明熱兼少陽症者柴胡桂枝湯治牝瘧陰氣盛陰獨發但惡寒而不發熱腰疼足冷微嘔支結脈弦而遲少陽病兼太陽表症者柴胡三錢桂枝錢半人參酒洗白芍薑製半夏條芩甘草各一錢生薑三片紅棗一枚加減香薷飲治暑瘧蒸熱自汗頭痛惡寒心煩吐逆肢體倦怠脈虛浮或下利者陳香薷三錢薑製厚朴炒研扁豆各錢半煨研草果一錢烏梅一個服數劑不止者再服清暑益氣湯加草果見三卷暑厥蘇合香丸方載一卷肛門內合治鬼瘧逢夜則發時多惡夢心常恐懼由屍氣注之也宜開竅辟邪余詳中惡附方桂枝麻黃柴胡四物合方治三陰瘧疾發在夜間初起憎寒壯熱而無惡夢心悸法宜汗解之桂枝麻黃柴胡人參當歸酒芍熟地川芎黃芩炙草製半夏炒研杏仁姜棗柴胡四物湯治邪在血分夜瘧不止柴胡白芍各二錢當歸熟地各三錢川芎錢半人參五分黃芩法半夏炙草各一錢姜棗引柴胡飲子即前湯去半夏熟地川芎加大黃治脈洪弦數積熱瘧疾四獸飲治久患瘧疾形氣已虛脾胃不健倦怠不思食而無表裡症者人參茯苓土炒白朮薑製半夏煨研草果炙草陳皮烏梅姜棗控涎丹治痎瘧經年不愈發時胸背腰項筋骨牽痛手足拘急時或麻痹走移不定氣脈不通此因痰飲留於上下內外勿誤作癱瘓治宜逐痰飲去心甘遂去皮大戟白芥子等分曬研極細米湯糊為丸綠豆大臨臥薑湯送下五丸後漸加至十丸小兒只服三五七丸加味法驚痰加全蠍硃砂熱痰加朴硝腳氣痛甚加木瓜檳榔寒飲涎盛加乾薑桂心丁香川椒驚氣成塊加炙山甲炙鱉甲醋炒莪朮元胡索化滯丸治瘧母久瘧不已腹中結成癖塊時或嘔吐作痛通治濕熱鬱結氣積食滯脈沉有力者紙包巴豆肉捶壓去油取霜一錢三稜莪朮青皮俱醋炒川連酒炒各三錢製半夏陳皮各四錢木香丁香各錢半共曬研極細麵糊丸綠豆大薑湯量下五分或一錢十全大補湯治勞瘧因久病勞損氣血已虧復患瘧疾蜜炙黃耆二錢土炒白朮茯苓白芍當歸川芎各錢半熟地三錢炙草一錢人參肉桂各五分生薑三片紅棗二枚如無參桂用桂心蜜蒸萎蕤代補中益氣湯治虛瘧因久瘧不已身熱心煩頭痛惡寒懶言惡食或喘渴自汗凡清氣下陷氣虛不能攝血脈洪而虛或浮無力中氣不足者蜜炙黃耆二錢炙草當歸土炒白朮各錢半陳皮一錢人參升麻柴胡各五分生薑三片紅棗二枚加減法肺熱去人參用沙參二錢嗌乾加葛根頭痛加蔓荊子一身盡痛加羌活防風濕痰加法半夏風痰加膽星飲盛加乾薑寒痰加煨研草果砂仁濕盛加蒼朮喘渴加麥冬嗽久加五味八珍湯即十全大補湯去蜜耆肉桂乃平補之劑照前加減四物湯當歸白芍川芎各二錢熟地三錢治陰虛似瘧加柴胡二錢若兼渴熱再加條芩頭痛加酒炒芥穗三解湯治時行瘧疾初起形氣實者用此汗利和三法解之虛者內加補藥麻黃澤瀉柴胡等分煎服截瘧要方凡瘧初起當按前法審症施治必待表裡無症瘧發三五七次仍不解者方可用截藥若表裡未清而遂截之則瘧邪內錮反復不已如表裡已清而不截之則正氣日虛邪愈進而難治矣柴胡截瘧飲治久瘧表裡無症者柴胡二錢人參法半夏條芩甘草檳榔常山煨研草果各一錢去皮尖桃仁七粒烏梅一個姜三片棗二枚服截藥法每於點燈時將藥煎熟連渣傾放大碗內擱天井中露一宿次早收貯罐內俟瘧將發先於一二時蕩熱頓服用被蓋臥倘噁心欲嘔用白糖拌烏梅嚥下壓之常山飲截瘧之緩劑酒炒常山二錢煨研草果知母貝母甘草檳榔各一錢烏梅姜元棗引半酒半水煎熟照前法露一宿於日未出時蕩熱頓服將藥渣再煎湯待瘧欲發時取服被蓋臥陀僧散截瘧之峻劑陀僧研末每用七分冷酒調糊臨發之先一時面向南方白湯沖服不愈如法再服禁葷腥發物七寶飲治實瘧久發並息瘧食瘧寸脈弦滑浮大脈沉澀微細者總用酒炒常山醋炒青皮薑製厚朴煨研草果陳皮甘草檳榔等分酒水煎熟照前法露一宿臨發之先蕩熱頻服吳又可曰凡瘧初起脈實氣實均宜汗吐下三法以解表清裡若表裡俱清法當和解和解不愈方用截藥如久瘧形羸可用補劑朱丹溪曰諸瘧不外風寒暑濕痰飲食積所感而發無汗要有汗以散邪為主有汗要止汗以扶正氣為先經曰瘧脈自弦寒熱為病多屬少陽半表半裡之界也弦遲多寒弦數多熱弦滑痰飲弦短傷食弦微為虛代散則死凡瘧正發作之時不可服藥最忌遂進飲食蓋此時服藥反致助熱助寒要在將發之先既發之後服之方效至若飲食必須寒熱退盡乃可與之否則中脘多蓄黃水久而成癖脅痛寒熱諸症作矣凡瘧發口渴忌飲冷湯宜切生薑和茶葉煎湯少少與服凡瘧後浮腫初服胃苓湯次服六君子湯加姜皮桂心炒研砂仁草果凡瘧痢並作主以小柴胡湯加當歸白芍檳榔以上治幼科瘧疾之要訣也余法詳大方脈嘔吐門總括嘔吐者諸逆上衝所致也或因乳食過多停滯中脘致傷胃氣不能健運而上逆或因食時觸驚停積不化而上逆或痰飲壅盛阻隔氣道或蛇蟲擾亂懊惱不安而上逆也上逆之因雖不同而皆能成嘔吐但有虛實寒熱之辨分別於下傷乳吐傷乳吐者因乳哺過飽停蓄胃中致運化不及頻吐乳片猶如物盛滿而上溢也身熱面黃肚腹膨脹治用消乳丸保和丸方見三卷積滯門化其宿乳安胃和中再節乳哺吐自止矣初生哯乳方見一卷吐不止傷食吐傷食吐者因小兒飲食無節過食油膩面果致壅塞中脘肚腹脹悶口臭惡食頻吐痰黏三稜丸煨三稜炒神麯法半夏陳皮各四錢姜炒川連麵炒枳實公丁香各二錢曬研極細煮麵糊丸黍谷大薑湯每下二三十丸以止吐和胃湯炒研砂仁姜炒厚朴法制蒼朮酒炒香附藿香葉製半夏炒神麯麥芽陳皮炙草山楂生薑煎服數劑以化滯夾驚吐夾驚吐者因小兒飲食之時忽被驚邪所觸致令頻吐清涎身體發熱心神煩躁臥不得寧先用全蠍散截其風次用定吐丸止其嘔全蠍散焙䘌全蠍二錢煨天麻羌活防風白芷炙草各錢半沙參茯苓蜜炙黃耆炒扁豆炒蓮肉各三錢煨木香薄荷葉各一錢曬研極細煎薑棗湯每調一錢或五分溫服定吐丸姜煮半夏三錢細切公丁香二十粒制蠍梢四十枚曬研極細煮紅棗取淨肉糊藥為小丸薑湯每下一錢小兒化服五分痰飲吐痰飲吐者因小兒飲水過多停蓄胸膈積久成痰痰因氣逆致令頭目暈眩面青肢冷嘔吐涎沫初服香砂二陳湯虛者服香砂六君子湯香砂二陳湯炒研砂仁藿香陳皮法半夏茯苓甘草香附生薑引香砂六君湯炒研砂仁土炒白朮法半夏茯苓炙草陳皮藿香人參姜炒香附生薑紅棗引蟲吐此症有寒熱二因如因胃熱熏蒸令蟲不安擾亂作吐者外候面色乍赤乍青口氣蒸手口渴飲冷便秘身熱氣粗脈實主治化蟲丸使君丸若因胃寒內迫令蟲不安胃口時痛時止頻嘔清涎面色乍紅白小便清利爪甲色白口氣多涼四肢逆冷氣乏脈遲主治加減理中湯化蟲丸蕪荑三錢檳榔水粉鶴蝨草焙使君肉炒苦楝根白皮各五錢枯礬一錢共研極細麵糊小丸白湯每下五分或一錢使君子丸見三卷腹痛門治蟲吐反食加減理中湯土炒白朮乾薑川椒人參烏梅引虛吐虛吐者因胃氣虛弱不能消納乳食致兒精神倦怠囟門煽動睡臥露晴自利不渴頻頻嘔吐主以丁沉四君子湯公丁香沉香人參各五分炙白朮茯苓各錢半炙草一錢姜棗引虛吐兼痰者服前香砂六君湯去香附加丁香實吐實吐者因兒平素壯實偶爾停滯致胸腹脹滿痞硬疼痛二便秘結口渴飲冷吐多酸臭宜攻下利主以三一承氣湯酒洗大黃姜炒厚朴麵炒枳實炙甘草芒硝等分煎服沆瀣丹大黃黃芩黃柏俱酒炒川芎各九錢酒炒赤芍炒黑醜滑石連翹檳榔各六錢麵炒枳殼薄荷葉各四錢切片曬研極細煉蜜為丸每重一錢白湯茶酒聽其化服寒吐寒吐者因兒過食生冷或乳母當風取涼寒入乳房小兒飲之致令朝食暮吐暮食朝吐吐出之物不臭不酸面唇色白手足常冷治當溫中定吐輕者服姜橘散寒甚服丁萸理中湯姜橘散白建姜二錢陳橘皮一兩炙草錢半共研極細煎紅棗湯每調一錢日三服丁萸理中湯公丁香泡吳萸人參各五分炙白朮炙草乾薑各錢半熱吐熱吐者因兒過食煎炒辛熱物或乳母貪食厚味熱積胃中從乳傳兒俱令食入即吐口渴飲冷嘔吐酸涎身熱唇紅小便短赤治宜清熱主以加味溫膽湯竹茹茯苓陳皮甘草去心麥冬薑製半夏姜炒川連麵炒枳實車前子淡竹葉燈心引嘔吐附法治一切嘔吐兼痰飲食滯氣積者主以二陳湯隨症加味見三卷痰飲門感寒腹痛及犯瘴氣黃沙濕瘧作吐者用不換金正氣散見三卷感冒若胃虛久病見飲食即欲嘔吐者用前香砂六君湯加補養消導之味又方治見食欲吐取淨黃土和鹽少許搓三丸煅紅白湯淬服隨進食又方研灶心土水糊丸塞兒鼻孔旋服藥餌不致吐出水調服治熱吐古人謂嘔屬陽明有聲有物氣血俱病也吐屬太陽有物無聲血病也噦屬少陽有聲無物氣病也李杲謂嘔吐噦皆屬脾胃虛弱張潔古又從三焦以分氣積寒之三因然皆不外乎諸逆上衝也泄瀉門總括小兒泄瀉多因脾被濕侵土不勝水而成然致病之原不一或乳食停滯或感受寒暑或外觸驚邪或臟受寒冷或脾虛作瀉更有飧瀉水瀉等症或宜分消或宜溫補分別症治於下傷乳食瀉因乳食過飽損傷脾胃停滯不化頻瀉酸膿噫臭腹熱脹滿疼痛口渴惡食小便赤澀先服保安丸以消滯次用平胃散和脾保安丸醋煮香附炒砂仁各一兩青皮三稜莪朮俱醋炒炮姜陳皮炙草各一錢曬研極細煮神麯二兩絞汁糊為小丸白湯每下一錢平胃散製蒼朮炒厚朴陳皮甘草生薑引加味法見三卷感冒中寒瀉因小兒過食生冷致寒邪凝結腸鳴腹脹時常疼痛所瀉之糞清冷澄澈面色淡白四肢逆冷懶進飲食初服理中湯溫中見三卷傷寒次服訶子散煨訶子取淨肉麵裹肉蔻煨熟土炒白朮煨木香茯苓人參各二錢炙草陳皮各一錢曬研細末薑湯每下一錢火瀉因小兒臟腑積熱或外傷暑氣其瀉暴注下迫肚腹急痛口渴心煩瀉下多黃水小便色赤先服玉露散清其熱次服四苓散利水見前霍亂玉露散寒水石石膏各一兩甘草三錢研極細白湯調下一二錢六一散滑石六錢粉草一錢共研極細燈心湯每下二錢驚瀉因小兒氣弱受驚致夜臥不安晝則驚惕糞稠若膠色如苔不時下瀉宜鎮心抑肝先服鎮驚散定驚次服養脾丸扶脾鎮驚散土炒白朮茯苓勾藤勾各三錢炙草硃砂人參各一錢曬研極細薄荷湯每調一錢日三服養脾丸土炒白朮人參當歸川芎各三錢醋炒青皮酒炒川連炒神麯炒麥芽炒砂仁山楂肉陳皮木香各二錢曬䘌研極細末米粥糊丸綠豆大白湯每下一錢日三服臍寒瀉此因初生斷臍失護風冷乘入傳於大腸致令寒瀉糞色青白腹痛腸鳴先宜散寒服和氣飲次服調中湯溫補之余按一卷胎寒門和氣飲法制蒼朮姜炒厚朴赤茯苓蘇莖葉藿香防風陳皮炙草豆豉生薑蔥白引或加木香調中湯土炒白朮酒炒香附炒研砂仁蜜蒸萎蕤茯苓炙草藿香木香煨姜引煎湯頻頻溫服脾虛瀉因小兒脾不健運每逢食後作瀉腹滿不渴面黃懶食精神短少肌肉消瘦宜補脾胃其瀉自止主以參苓白朮散人參茯苓土炒白朮炒山藥炒苡仁炒蓮肉炒研砂仁炒研扁豆炙草陳皮桔梗生薑紅棗引常服自愈此方等分研末薑棗煎湯每下二錢每日三服飧瀉因小兒春傷風邪清氣下陷脾失健運致令食入即瀉完穀不化治宜補養脾土先用補中益氣湯升其中氣見前瘧疾附方若飧瀉日久腸滑不禁者常服四神丸酒浸故脂曬䘌二兩麵裹肉蔻煨熟五味子曬䘌各一兩湯泡吳萸曬䘌五錢共研極細搗生薑汁煮熟紅棗取肉糊藥為小丸米湯每下一錢水瀉因小兒脾胃濕盛致清濁不分變成水瀉糞溏色黃身重懶食小水短澀先用胃苓湯以除濕若瀉久不止則服升陽除濕湯胃苓湯蒼朮白朮厚朴俱法制茯苓豬苓澤泄陳皮甘草桂心姜棗引升陽除濕湯羌活防風升麻柴胡陳皮炙草豬苓澤泄製蒼朮炒神麯炒麥芽生薑引諸瀉附法濕瀉濕盛也濡瀉水瀉瀉下多水也三症皆腸鳴而腹不痛宜燥濕滲利寒瀉寒盛也洞瀉直傾下也皆如鴨屎之溏澄澈清冷腸似雷鳴而腹痛飧瀉完穀不化土衰木盛清氣不升也脾瀉脾虛滿悶食後即作瀉也食瀉胃瀉糞臭稠黏噫氣腹痛屬滯熱腎瀉腎氣虛寒每晨行瀉數次飲瀉口渴多飲飲後即瀉反復如是也痰瀉時瀉時不瀉或多或少也火瀉腹痛一陣下瀉一陣糞熱暴下也暑瀉口渴自汗心煩面垢也口糜瀉上發口瘡下瀉即止口糜愈又作瀉上下相移皆屬心經實熱一卷鵝口附法已載數方其餘治法詳見彤園醫書婦科三卷妊娠泄瀉門吐瀉門吐瀉交作經曰胃虛則吐脾虛作瀉脾胃俱虛吐瀉兼作按此言亦不可執泥當詳審所見之症分別治之如先瀉後吐面白神疲不熱不渴額冷微汗脾胃虛寒也服香砂六君子湯見痰飲吐寒甚服理中湯加味見乾霍亂如先吐後瀉面赤唇燥煩渴尿秘脾胃有熱也服四苓散加石膏末竹茹見濕霍亂若吐瀉交作因脾胃積滯不能健化水穀而成者服消導二陳湯見三卷夾食傷寒至長夏夾暑腹痛喘嗽吐瀉交作者服藿香正氣散見濕霍亂輕者服六和湯見三卷傷暑附法七味白朮散治脾虛肌熱泄瀉虛熱作渴者土炒白朮茯苓各二錢葛根炙草藿香各一錢人參木香各五分薑棗引煎湯頻服烏梅丸治寒厥吐蛔及臟府發咳嘔出長蟲又治久痢陰陽不相順接之症川連乾薑各三錢炒川椒焙當歸各錢半人參桂枝炒黃柏炮附子北細辛各二錢曬研極細取烏梅十餘個米醋浸一宿去核蒸爛搗膏糊藥再加煉蜜為丸梧子大米湯先下十丸日三服漸加至二十丸禁一切生冷油膩脈略吐脈宜浮滑忌澀數若沉數細澀肢冷麵青爪甲黑內痛甚者凶瀉脈宜沉小滑弱若實大浮數則身必發熱變生惡候至若吐瀉交作難憑脈理以唇色深紅者為內熱色久不退面黑氣喘遺尿者凶大法糞色老黃屬心脾實熱宜清利淡黃屬虛熱宜清解青屬寒宜溫散淡白屬脾虛宜溫補醬黃屬濕宜燥濕和脾酸臭色汙屬滯宜消導色青如苔屬驚宜緩肝理脾清濁不一膿水交雜屬痰飲宜化痰理氣痢疾門總括痢之為病裡急者腹痛積滯也後重者下墜氣滯也小便赤澀者濕熱鬱滯也白痢自大腸來大腸與肺為表裡屬傷氣也赤痢自小腸來小腸與心為表裡屬傷血也赤白兼下者氣血俱傷也皆由外受風寒暑濕內傷飲食生冷而成也又曰初起多屬濕熱日久多屬虛寒當從脈症辨之脈宜沉小滑弱忌浮洪弦數分別症治於下寒痢因小兒寒冷傷胃久痢不已或臟氣本虛復為風冷所乘傷於腸胃故下痢時腸鳴腹痛面青唇白口中雖渴喜飲熱湯此裡虛寒痢也初起服理中湯見前乾霍亂寒甚加炮附子煨訶子炒研砂仁日久不止當服真人養臟湯蜜拌炒御米殼錢半煨訶子肉酒炒白芍土炒白朮當歸炙草各一錢麵裹煨肉蔻煨木香肉桂人參各五分烏梅一個熱痢因濕熱結於腸胃致腹中窘痛頻頻下利尿短色赤舌赤唇焦喜飲涼水重者服當歸芍藥湯輕者服白頭翁湯香連丸當歸芍藥湯白芍歸尾川連條芩各一錢大黃檳榔炙草木香桂心各五分痢甚墜痛倍大黃小水赤澀加滑石末白頭翁湯白頭翁一錢秦皮黃柏川連各錢半香連丸川連二兩吳萸一兩水拌濕同炒去萸取連木香五錢共切碎曬研煮醋糊為小丸米湯每下一二錢噤口痢乃因火毒沖胃而成其症脈大身熱不能飲食舌赤唇紅惟喜飲冷作嘔下痢急服參連開噤散若裡熱衝心噤口嘔逆關上脈浮者宜服大黃黃連湯下之俱用王瓜藤散貼臍輕者服沆瀣丹見前實吐參連開噤散姜炒川連捶碎石蓮肉人參沙參代等分研末米湯每調二錢頻頻咽服又方白蓮子不去心研末米湯每調二錢常服效大黃黃連湯大黃三錢黃連二錢酒水煎溫服形氣實者方可用王瓜藤散經霜王瓜藤連葉燒灰存性麻油調作餅貼臍心中以布縛定良久吐痢自減又方搗爛田螺入麝少許照前法貼臍亦效亦有胃虛逆氣上衝口噤不能食其症手心冷面㿠白痢純白色當服參苓白朮散人參炙術茯苓炙草山藥苡仁蓮肉扁豆砂仁俱炒研陳皮桔梗木香姜棗或加石菖蒲石蓮肉夾表服後倉廩湯時疫痢因患痢之時復感疫癘之氣其症身熱無汗遍身疼痛熱為邪束頻作嘔逆初起脈浮主以倉廩湯服前方已經解表但覺燥渴脹痛脈實熱盛者服香連化滯湯以清裡若表裡俱清痢仍不止者宜服和中等湯倉廩湯羌活獨活柴胡前胡枳殼桔梗川芎茯苓各一錢甘草五分人參薄荷各三分姜三片陳粳米一合煎湯熱服取汗香連化滯湯木香川連川柏枳殼檳榔甘草各五分酒浸大黃滑石末各錢半歸尾白芍條芩各一錢煎服或服沆瀣丹見前實吐白朮和中湯治白痢炙術茯苓陳皮炙草當歸炒芍炒連炒芩木香當歸和中湯治赤痢當歸川芎炒芍丹參炒連炒芩升麻制桃仁若赤白兼者加炙朮茯苓陳皮香附白多紅少者加炮吳萸黑姜風濕痢風痢似腸風下清血而墜痛由風傷陰絡血不循經妄下大腸脈浮而數主以胃風湯濕痢腹脹身重足冷痠疼脈浮緩而形氣實者先服香連平胃散虛者服胃風湯加味胃風湯土炒白朮酒炒白芍當歸川芎茯苓各錢半人參桂心各五分粟米薑棗引治濕痢加製蒼朮炒苡仁血痢加酒炒地榆香連平胃散姜炒川連木香各五分製蒼朮二錢炒厚朴陳皮炙草各一錢姜引水穀痢其症糟粕與膿血雜下由脾胃虛腐化不及也初服調中益氣湯數劑後常服加味六君湯調中益氣湯沙參蜜耆各二錢製蒼朮炙草陳皮各錢半升麻柴胡木香各八分薑棗引氣虛自汗加炒芍五味子加味六君湯人參炙術茯苓炙草法半夏陳皮蜜耆炒山藥炒研砂仁木香姜棗引休息五色痢休息痢時痢時不痢也五色痢五色膿血相雜而下也二症皆因用止澀藥太早或內停滯熱下之未盡蘊於腸胃傷臟氣也但診其脈若有力雖日久仍當下之用香連化滯等湯方見前時痢若積滯未盡脾虛不任攻下者只服保和丸見三卷積滯門二症日久不愈方服和中丸歸身川芎茯苓炙草澤瀉車前子炒神麯炒麥芽炒蓮肉土炒白朮各三錢豬苓陳皮酒炒白芍各二錢人參木香炮姜麵煨肉蔻各一錢曬研極細米湯糊為小丸白湯每下二錢諸痢附法香連和胃湯痢疾攻下後病勢大減用此調養氣血木香川連炒研砂仁各五分土炒白朮酒炒白芍黃芩當歸陳皮炙草各一錢姜棗引赤多加酒炒地榆血多再加椿根皮白痢久虛加人參炮薑茯苓芍藥地榆湯治痢下膿血日久脫肛蒲黃炒阿膠二錢酒炒地榆法制蒼朮白芍卷柏各一錢煎湯溫服補中益氣湯見諸瘧附法加煨訶子炒白芍五味子治痢久虛怯身涼自汗及肛門滑脫清氣下陷者清暑益氣湯見三卷暑厥治夾暑熱痢下赤白脈弱自汗者烏梅丸見前吐瀉交作後治痢兼赤白寒熱不分日久滑脫雲林四制丸治新久諸痢錦紋大黃一斤切片分作四分一分煎川連一兩取湯拌大黃炒焦一分用乳汁浸透炒焦一分煎吳萸一兩取湯拌大黃炒焦一分用童便浸透炒焦共研極細酒煮灰面糊丸梧子大每服一二錢白痢煎吳萸湯送下赤痢煎川連湯送下赤白痢米湯送下鐵鏡薑茶飲治赤白痢初起用此代茶飲生薑陳茶各五錢車前草一兩黃蠟二錢食鹽三錢共入大罐水煎湯頻服可以代茶又方炒黃陳米入鹽同煮成稀粥腹飢時任服可代諸般飯食凡痢後足腫脾氣下陷也或轉成鶴膝又當審症施治痢後胸膈脹悶脾虛作痞也身重氣喘土因濕困不能生金也凡痢初起五色腥臭或如屋漏煙塵肛如竹筒至久痢唇紅不退舌苔如粉氣促心煩皆不治淋症門總括小兒淋症或因寒冷侵襲或因濕熱下移乘入膀胱致水道澀滯欲出不出淋瀝不斷甚至窒塞莖中便時痛甚宜辨其為寒為熱為石為血治之寒淋乃因風寒乘入膀胱下焦受冷小便閉塞脹痛不堪時或淋漓少腹悶痛初服加味五苓散若寒淋誤服涼藥致脹滿厥逆轉成癃閉脈沉微者當服加味理中湯加味五苓散炙白朮炒茴茯苓豬苓桂心炮姜各一錢澤瀉錢半加味理中湯人參炙術茯苓炙草乾薑附片煎熟調琥珀末三分服熱淋乃因膀胱蓄熱致小便不通淋漓澀痛初起服十味導赤散若少腹脹滿引臍作痛口渴引飲大便燥結者服八正散若濕熱淋閉心煩燥渴脹滿重墜者服導赤散十味導赤散生地梔子木通條芩茵陳瞿麥甘草豬苓去心麥冬滑石末淡竹葉引八正散酒浸大黃滑石末車前子赤茯苓生梔子木通瞿麥扁蓄燈心氣滯加木香淋血加生地鬱金大便燥結加牛膝鬱金治膏淋加法制蒼朮氣淋加木香烏藥石葦冬葵子導赤散炒川連滑石末石蓮肉車前子赤茯苓甘草梢當歸瞿麥澤瀉豬苓梔子木通燈心引石淋乃因膀胱蘊熱日久而成砂石正如湯瓶久經火煉底結白垢也其症每逢便溺則莖中作痛常帶砂石之狀重者服前八正散輕者服後方冬葵子散冬葵子炒桑皮車前子滑石末赤茯苓甘草梢瞿麥木通梔子燈草琥珀散琥珀木香海金砂各一錢炒葵子扁蓄木通歸尾鬱金各二錢滑石四錢共研極細酒調每下一二錢通治氣淋血淋膏淋血淋乃因心熱傷於血分熱氣傳入胞脬日久則尿血同出遂成血淋莖中時常作痛主治小薊飲子莖中痛甚須服五淋飲小薊飲子小薊木通生地梔子當歸藕節滑石甘草淡竹葉炒黑蒲黃等分煎空心服五淋飲炒葵子葶藶子車前子炒梔子滑石末甘草梢淡竹葉赤茯苓當歸赤芍條芩木通等分蔥白引戴氏曰血鮮者心與小腸實熱也血瘀者腎與膀胱虛冷也然多有熱極而血凝色黑未可概以為冷要之痛者為血淋不痛者為尿血尿血淋血已載二卷失血門淋症附法萆解分清飲治陽虛白濁小便頻數漩白如油名曰膏淋川萆薢石菖蒲鹽水炒研益智仁烏藥茯苓各二錢甘草梢一錢後服琥珀散蓮子清心飲治心虛移熱小便出時色白渾濁倦怠心煩炒蓮肉蜜黃耆北沙參柴胡茯苓各錢半地骨皮車前子炒條芩制麥冬炙草各一錢或加薄荷空心煎服鐵鏡方治便濁白如米泔蜜蒸萎蕤一錢鹽水炒萆當歸赤芍木通赤苓各錢半炒青皮甘草梢各一錢或加海金砂集成方治淋症初起作痛海金砂炒香附川芎赤苓各三錢滑石五錢炒枳殼焙石韋澤瀉檳榔各錢半曬研極細鹽湯每下一錢八味地黃湯治膀胱冷氣與正氣交爭先寒戰而後便溺多服此湯熟地四錢炒山藥棗皮茯苓各二錢澤瀉丹皮各錢半肉桂附片各五分若系腎熱成淋用六味地黃湯加萆薢石菖蒲腎寒加炒研益智仁氣淋日久清氣下陷用補中益氣湯見前瘧疾加鹽炒萆薢益智仁尿白一症謂小便黃赤落地良久凝如白膏此因傷脾所致久而失治則成脾疳初服胃苓湯數劑見前水瀉後常服六君子湯小兒遺尿小便自出不禁謂之遺尿睡中尿出不自知者名曰尿床皆屬腎與膀胱虛寒宜服加味益智散若小便頻數時時遺出尺脈虛微者腎氣衰也宜服縮泉丸如遺尿日久服豬脬湯遺尿夾熱者服加味四物湯加味益智散益智仁故紙俱鹽水炒黃茯苓各五錢煅龍骨三錢炮附子桂心各二錢共研極細鹽湯每調一錢日三服縮泉丸炒益智炒山藥酒炒烏藥等分研末麵糊小丸鹽湯下一錢豬脬湯豬尿胞洗淨納入糯米一合小茴二錢以線縫定入砂罐內水煮極爛入鹽少許任意服食又方研紅雞冠花滾酒每調服一錢加味四物湯治遺尿短赤虛而夾熱者當歸川芎熟地生地炒芍炒芩北五味去心麥冬鹽水炒黃柏知母余法見彤園醫書婦科四卷便閉門總括經曰膀胱者州都之官津液藏焉氣化則能出矣又曰膀胱不約為遺尿膀胱不利為癃閉大抵遺尿屬虛寒是火不足水有餘故用上諸方尿閉多屬熱是火有餘水不足治宜瀉心火滋腎水分別症治於下小便不通有因臟氣虛受熱壅滯宣化不行非塞非痛腹中脹滿尿閉難通者主以五苓散若小便色赤脹滿點滴而出者主以加味導赤散熱甚當用八正散見前淋症並用外治方法余見一卷初生門有因小兒患大病之後氣虛津液不足致尿閉者若再利水則中氣愈虛津液愈竭當服葳蕤湯六君子湯腎虛不化服地黃湯加牛膝車前子五苓散澤瀉一錢土炒白朮茯苓豬苓各錢半桂心五分燈心引加車前子滑石末導赤散生地木通甘草梢淡竹葉等分燈心引加車前子梔仁澤瀉片芩柴胡赤茯苓萎蕤湯酒蒸萎蕤四錢去心麥冬三錢甘草梢鹽炒川柏各錢半外治方大田螺肉九枚豆豉一合生蔥一把搗爛貼臍外以布包裹又方搗爛薑蔥炒熱分作二起布二塊輪流包裹推熨臍腹鹽熨亦可又方炒鹽淬童便令兒頓服旋以指探喉取吐治尿閉脹滿神方外蒸法紫蘇連葉一斤封口煎湯傾小桶內抱兒赤著下身安坐桶上齊胸用裙周圍遮蓋熏蒸下體氣透便利利後急用棉衣包裹若外傷風冷尿仍不通也又咂五心法見一卷初生不大小便大便不通飲食之物有入必有出苟大便不通出入之機緘息矣急宜通之俾舊谷得出而新谷得入然須辨其實閉虛閉治之如胃強能食形氣實脈實者用承氣諸湯下之見三卷陽明傷寒或服前八正散加芒硝木香氣實夾滯脹閉痛滿者服木香檳榔丸攻之如胃弱食少形氣虛脈虛者服保和丸加覈實微利之若小兒血液不足平素便燥難出者常服潤燥丸兼用蜜煎豬膽二導法見三卷陽明傷寒余法見初生門木香檳榔丸吳萸湯炒川連麵炒枳殼酒炒黃柏青皮三稜莪朮俱醋炒木香檳榔陳皮各二錢酒浸大黃四錢黑醜香附各八錢曬研極細泡芒硝二兩去滓取汁糊為小丸白湯每下一錢或五分保和丸炒神麯製半夏陳皮茯苓各一兩山楂肉三兩連翹八錢炒蘿蔔子五錢加麵炒枳實四錢曬研極細蜜為小丸薑湯每下一錢潤燥丸大黃歸尾羌活防風秦艽各五錢去皮尖桃仁去殼火麻仁各一兩皂角子燒存性三錢曬研極細蜜為小丸白湯每下一二錢潤燥湯大黃歸尾防風秦艽生地熟地升麻紅花制桃仁火麻仁等分煎服治風秘血秘神效一方無大黃升麻有天冬麥冬赤芍栝蔞陳皮秘結附法仲景曰脈浮而數能食不大便者名曰陽結脈沉而遲不能食身體重大便反硬者名曰陰結東垣曰實秘熱秘即陽結也宜清解之虛秘冷秘即陰結也宜溫散之丹溪曰古方通大便皆用降氣之品蓋肺氣不降則難傳送故用枳殼木香杏仁檳榔之類若老人虛人風人津液少而秘結者宜用麻仁阿膠當歸桃仁之類以取滑利如妄用降氣攻下之品則津液走散氣血耗夫雖暫通而即秘必變生他症矣備急丸治寒氣冷食停滯腸胃冷熱不調大便秘結腹脹氣急痛滿不堪並治中惡客忤卒死暴病脈症俱實者巴豆肉紙包捶去油取霜大黃乾薑等分曬研極細蜜糊為丸綠豆大白湯每下二三丸便閉腹脹痛如錐刺或卒然昏死用熱湯化開三四丸含在醫師口中以竹管插兒鼻孔含藥從管中吹入下咽立蘇不效再吹入三丸良久腹中必響動或吐或利自愈中惡口噤或折齒灌入溫脾湯治食滯腸胃秘結脹痛冷熱不調大黃乾薑桂心甘草炒厚朴炮附子等分煎服順氣湯治陰陽壅滯氣不宣通便秘脹滿草蔻益智仁俱煨研炒厚朴製半夏製蒼朮炒青皮泡吳萸當歸木香陳皮茯苓柴胡升麻澤瀉乾薑隨症加減煎服半硫丸治寒虛燥結久不大便命門真火虧飲食悉化為痰流散肢體便閉雖久仍不脹痛凡老人虛秘冷秘常服自通石硫黃一斤打成細塊用豬大腸二尺裝定線扎兩頭入砂鍋內水煮極爛撿黃洗淨再換大腸照前法裝煮如此三次方取黃洗淨曬研極細取淨末十兩薑汁煮透半夏一斤曬䘌另研極細取淨末八兩合研篩勻搗生薑絞汁糊為丸梧子大蜜為丸亦妙薑湯每下一二錢日三服久自利二便秘結初生便閉統載一卷但小兒稍大有因乳食停滯生熱結於腸胃致二便秘結舌乾口渴面赤唇焦小腹滿急此為熱結服八正散見前熱淋若屬食積必腹脹痛硬不思乳食噯氣吐酸大便燥結小便赤澀當服神芎丸若蘊熱太甚大小便閉關格不利者服木通散紫霜丸見初生門若氣滯血澀秘結脹滿者服桃仁散熱毒壅結脹痛滿硬者服黑白散見一卷肛門內合余按後方神芎丸大黃滑石各二錢薄荷葉黑醜條芩川連川芎各一錢共研極細水糊小丸蜜湯每下一錢或五分桃仁散去皮尖桃仁炒冬葵子檳榔各二錢滑石末四錢蔥白五寸引掩臍法生薑蔥白豆豉等分搗爛入鹽少許焙熱掩貼臍腹用布包裹通氣散治秘結脹滿鹽水洗陳皮煨枳殼蘇莖葉木通等分煎頻服金鑰匙治秘結脹痛滑石蒲黃等分研極細酒水每調下一二錢按清陽出上竅呼吸是也濁陰出下竅二便是也蓋前陰主氣後陰主血倘一息不運則氣血壅蔽機緘息矣故二便不通加以腹脹喘急嘔噦煩躁者不可治也消渴門總括經曰心移熱於肺傳為膈消又曰三陽結謂之消脈宜數大忌細微短澀上消屬肺飲水多而小便如常中消屬胃飲水多而小便短赤多食善飢下消屬腎飲水多而小便數多渾濁三消雖燥熱為病然亦有寒熱之分如飲水多而小便少色渾赤者屬熱為火盛耗水而渾也若飲水少而小便多色清白者屬寒是火虛不能耗水也試觀年老人好飲茶水而夜必多溺則三消亦有屬寒者矣三消症治調胃承氣湯治消渴脈洪大氣實便燥能食此屬胃腑濕熱法宜下之酒浸大黃芒硝各三錢炙草錢半熱服取下梔子金花湯治消渴裡熱極深脈症俱實者黃連黃芩黃柏梔子大黃等分俱用生的切片煎服竹葉石膏湯治消渴不思食不作瀉脈雖虛胃熱猶盛者淡竹葉二錢石膏末四錢去心麥冬製半夏炙草各錢半人參五分粳米一合生薑三片引無人參沙參三錢代或用蜜蒸萎蕤竹葉黃耆湯治消渴脈虛燥熱渴極思飲形氣弱者淡竹葉生地黃各二錢去心麥冬酒炒黃芩蜜炙黃耆製半夏煅石膏當歸川芎白芍甘草人參各一錢粳米一撮生薑三片人參白虎湯治消渴氣虛胃熱渴飲者石膏末八錢知母三錢甘草一錢人參五分粳米一合引並治消飢七味白朮湯治消渴兼瀉不能食胃虛脈弱無熱者人參炙白朮茯苓炙草藿香葛根木香姜棗煎湯常服金匱腎氣湯治下焦虛寒脈微而遲飲一溲二熟地四錢炒山藥茯苓棗皮各二錢丹皮澤瀉各錢半酒洗牛膝車前子各一錢炮附子肉桂各五分去附桂牛膝加知母麥冬蓮肉芡實生地五味治消濁蓮花飲治消渴初起蓮鬚蓮肉知母甘草花粉葛根赤茯生地五味子淡竹葉若消渴燥甚服後生津湯炒連炒柏五味麥冬當歸生地白芍知母花粉萎蕤炙草烏梅一方蠶繭煎湯代茶飲治消渴豬血煮清湯不用鹽常服可治消飢一方洗淨豬肚子納豆豉二合縫口煮爛少加鹽花任意服食治消濁消渴因心火動而消上上消乎心移熱於肺故渴而多飲飲而又渴矣消飢因脾火動而消中中消乎脾移熱於胃故多食善飢飲多尿黃赤消濁因火動消腎移熱膀胱故小便渾濁色如膏脂名曰下消日久則腸胃合消五臟乾燥治宜養脾生肺降火滋陰
