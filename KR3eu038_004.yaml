body:
  text: 卷之三傷寒門總括乳哺之兒氣血未充筋骨柔脆肌膚薄腠理疏最易患傷寒最不耐傷寒且榮血虧內熱易生治或不當即變痙症若誤作驚風經論治緩之劑立危矣集成謂初起即當解肌忌發汗太過其辨症不繁用藥亦簡若遷延時日邪傳陰經無力耐之矣此與八歲以後小兒之傳經論治緩急不同分別三陽三陰次第症治於下太陽初患傷寒表症傷寒者寒邪傷表榮分受病也其脈浮緊惡寒無汗發熱氣喘頭疼身痛若兼嘔逆煩渴此為邪盛欲傳經也初起服九味羌活湯以解其表如系乳子但服桂枝防風湯以解肌九味羌活湯羌活防風製蒼朮各一錢川芎白芷生地黃芩甘草各八分北細辛三分薑蔥引喘甚加去皮尖炒研杏仁十粒胸滿去生地加桔梗炒枳殼桂枝防風湯桂枝防風生薑酒洗白芍各錢半炙草一錢紅棗三枚喘加炒枳殼制杏仁嘔加陳皮製半夏各一錢太陽傷寒表裡同病乳子純陽易生內熱傷寒初起脈若浮數壯熱無汗身偎母懷惡寒身強舌赤唇紅煩渴便秘表裡俱實者宜汗下兼行服雙解通聖散芥穗防風麻黃薄荷連翹桔梗當歸川芎赤芍甘草黃芩芒硝酒煨大黃炒梔子制白朮各五分滑石末石膏末各一錢生薑三片蔥白二莖引溫服取汗或下以解表通里傷寒初傳陽明肌表太陽傷寒已經汗下而邪不解傳入陽明肌肉經絡中其脈微洪惡寒發熱無汗頭目眼眶牽痛面赤鼻乾或嘔或利主以柴葛解肌湯柴胡葛根羌活黃芩白芷白芍甘草桔梗石膏末姜棗引煩渴倍石膏加花粉寒盛無汗去黃芩加麻黃陽明經中裡熱兼症陽明經脈中受邪尚未深入胃腑者其脈長洪不惡寒反惡熱自汗燥渴耳痛鼻乾者服白虎湯若陽明經病兼少陽脈症脈洪而弦往來寒熱口苦作嘔自汗煩渴者服柴胡白虎湯白虎湯石膏末四錢知母錢半甘草八分粳米二錢柴胡白虎湯柴胡知母各錢半人參法半夏黃芩甘草各一錢石膏末一錢粳米一撮姜棗引陽明胃府受病熱症邪從陽明經中深入胃腑從陽化熱脈實大有力不惡寒反惡熱潮熱自汗大便燥結腹滿脹痛煩渴譫語表症未除里症又急者用大柴胡湯表裡交治若胃實不大便當服大承氣湯便難燥硬不出當服小承氣湯脾約症糞出如彈丸當服調胃承氣湯或俱服六一順氣湯倘便硬未定脈微澀者不可攻下只用豬膽蜜煎二導法大柴胡湯柴胡二錢黃芩白芍法半夏生薑各一錢煨枳實酒浸大黃各五分紅棗一枚熱服取汗下大承氣湯酒洗大黃二錢姜炒厚朴三錢芒硝錢半麵炒枳實五分小承氣湯生大黃四錢炒厚朴二錢炒枳實一錢調胃承氣湯酒浸大黃二錢芒硝四錢炙草一錢大柴胡下劑之緩者也欲急下用大承通治三焦不欲急下用小承不犯下焦緩下用調胃承氣不犯上焦六一順氣湯節庵合前數方為一方治胃府諸症功效尤速酒洗大黃炒厚朴柴胡黃芩芒硝各一錢炒枳實炙草各五分臨服兌鐵鏽水三錢豬膽導法治胃腑熱病自汗尿利大便秘者豬膽一枚取汁和醋少許調勻用小竹筒二寸余一頭平口刮光套入肛內約寸許上削斜口將膽汁灌入抱兒俯臥良久大便通時取出蜜煎導法治同前症上白蜜四兩入銅杓煉成如飴糖狀勿令枯焦捻作挺子預研皂角末每摻少許量肛門大小法制一挺乘熱輕輕套入俟欲大便時取出醬姜導法治小兒冷秘取肥實大醬姜削作挺子插入肛門待欲便時取出少陽膽腑傷寒脈證邪從陽明傳入少陽此為半表半裡之症仲景只有和解一法忌汗忌下其脈弦口苦脅痛心煩喜嘔不思乳食往來寒熱均服小柴胡湯柴胡二錢人參黃芩生薑炙草製半夏各一錢棗一枚嘔逆加陳皮胸煩不嘔去人參加栝蔞仁渴甚去法半夏加花粉腹痛去黃芩加炒芍脅痛加炒青皮白芍咳嗽去參棗加五味子虛煩加粳米淡竹葉多痰加貝母栝蔞仁心悸尿秘加茯苓傷寒三日太陽陽明少陽已次第傳經其邪不退則太陰少陽厥陰當次第相傳如在三陽已經汗下和三法其兒能食不嘔脈靜小小便清瘧邪未入於陰不傳而自愈若身熱雖微而煩躁不食脈不安靜者此邪將去陽而入二陰也太陰脾臟傷寒主治傷寒傳至少陽三陽傳盡服藥和解而仍不愈者則邪從少陽膽腑入太陰脾臟其脈沉遲寒多而嘔自利不渴腹痛便溏主治理中湯若太陰變症救逆另詳大方脈書但小兒患變症治亦無益理中湯土炒白朮炮姜炙草人參等分加減法自利腹痛加木香不痛利多者倍白朮渴者亦倍白朮嘔吐去白朮加生薑製半夏臍下動氣去白朮加肉桂桂心亦可腹滿去炙草心悸加茯苓寒實結胸加炒枳實附子理中湯前湯加炮附子治中寒腹痛身痛四肢拘急沉重下利不止若中寒無汗加麻黃細辛陰毒加生川烏嘔甚加泡吳萸丁香生薑脈微欲絕倍人參少陰腎臟傷寒主治太陰傷寒服藥不解循序傳入少陰腎臟脈細而沉背惡寒腹冷痛肢節疼下利清穀主治四逆湯其餘變症救逆詳見大方脈四逆湯生附子三錢切作三片炙草二錢乾薑錢半煎湯頻頻冷服加減法面赤加蔥白三寸腹痛加白芍二錢咽痛加桔梗一錢利止而脈不出者加入人參嘔吐加生薑二錢厥陰肝臟傷寒主治少陰傷寒服藥不解次第傳入厥陰肝臟脈微細欲絕手足厥冷舌短色黑苔滑無津主治當歸四逆湯囊縮吐蛔諸變症詳見大方脈書但乳哺小兒患三陰逆症治亦無益故不備載當歸四逆湯當歸桂枝酒洗白芍各三錢北細辛炙草木通各一錢紅棗三枚內有久寒加泡吳萸生薑三陰三陽傷寒附法陳飛霞曰亦有寒邪直中陰經者因三陽經主氣衰無熱拒寒也初起脈即沉遲不發熱而惡寒面如刀割手足逆冷口吐涎沫戰慄蜷臥不渴腹痛嘔吐滑瀉爪甲唇色淡白脈或沉遲無脈皆直中陰經症主以回陽救急湯炮附子乾薑五味子炙草人參肉桂各五分炙白朮茯苓製半夏陳皮各一錢姜棗引煎服時調入麝香末少許更效如無脈加豬膽汁一匙調服如瀉甚加升麻黃耆嘔加生薑汁如吐涎沫加鹽水炒吳茱萸此治三陰中寒之總劑夏禹鑄曰乳子十指俱冷以吾三指按其額俱熱惡寒無汗面赤色慘不動抽搐者此太陽初患傷寒也當按一卷推拿圖說開天門分推額角逐掐以代針又按手圖推三關揉外勞運八卦從艮入坎重者用元宵燈火開提之內服芎蘇飲川芎蘇葉柴胡葛根法夏茯苓各一錢炒枳殼陳皮甘草桔梗木香各五分姜蔥引亦有寒極似熱者面色如水紅桃花口渴而唇不幹舌不甚赤大便青色小水清利此寒鬱於內陽浮於外也內外治法俱同上條亦有內熱外寒者口渴唇乾大小便秘壯熱無汗鼻焦氣喘先服前芎蘇飲以散邪次服大柴胡湯以解表通里見前陽明門亦有夾食傷寒者十指俱熱按其額則冷惡寒無汗發熱身強吐食惡食腹痛浮脹拍如鼓鳴曲腰啼叫照一卷圖說開天門分陰陽男揉日角女揉月角以發汗又按手圖推上三關三十下退下六腑十下旋推大指面以補脾曲兒小指重揉外勞宮瀉者將次指側面從尖推到虎口以止瀉吐者掐揉中指第一節以止吐內服消積二陳湯製蒼朮白朮炒厚朴神麯炒研砂仁酒炒香附法夏陳皮茯苓甘草蘇葉柴胡藿香木香表盛惡寒加羌活獨活薑蔥慈幼筏曰小兒已滿八歲經脈完固凡患傷寒治法與大人同一曰發表脈浮緊無汗用升陽發表湯甚者用麻黃湯大青龍湯一曰解肌脈浮長無汗用葛根湯發之脈微洪用柴葛解肌湯一曰兩解脈浮數有力用雙解通聖散脈洪弦數用大柴胡湯一曰攻裡脈沉實有力用大小承氣湯硬未定用豬膽等導法一曰和解脈弦半表半裡用小柴胡湯洪兼弦用柴胡白虎湯一曰救里脈沉遲用理中湯回陽救急湯沉細用四逆附子吳萸湯此治傷寒之大法也其餘症治方藥詳見大方脈書辨陰陽表裡陽症之表發熱惡寒頭項痛背脊強便清不渴手足溫和陰症之表無熱惡寒息氣涼手足冷面色慘淡舌滑便利陽症之裡舌燥唇焦煩渴掀衣揚手躑足大小便秘身輕易轉脈浮洪數惟腹痛與嘔逆陰陽里症皆有之但看爪甲紅活者屬陽青白者屬陰辨三陽表裡太陽膀胱經以熱在皮膚頭疼項強在經為表故用麻黃湯桂枝湯九味羌活湯以口渴尿赤熱入膀胱在腑為里故用五苓等湯陽明胃經以熱在肌肉目痛不眠在經為表故用葛根解肌湯以口渴自汗身惡熱背惡寒為熱漸入里故用白虎等湯若自汗譫妄熱已入胃腑為全入里故用調胃承氣等湯少陽膽經以邪在胸脅之間為半表半裡症表多者法只和解故用小柴胡湯里多熱盛者則當用黃芩湯以上三陽症皆發熱而太陽惡寒陽明自汗少陽多嘔皆三陽主症大抵陽症多者得之風寒暑濕邪生於太陽也陰症多得之飲食起居七情邪生於少陰也故曰傷寒內傷者十居八九也辨傷寒傷風傷寒始鬱而後能發熱故有已未熱之經文傷風初起即發熱也傷寒無汗脈浮緊傷風有汗脈浮緩傷寒鼻塞無涕傷風鼻流清涕傷寒初起手足微冷面紅傷風手足背皆溫面或青白初起即頭痛也漢賢張仲景傷寒論一書引而伸之雜病治法皆出於此予編次諸科每於陰陽表裡寒熱虛實衍其奧旨反覆申明俾學者匯觀而統會之毋致目迷五色云感冒門小兒傷風傷風者風邪傷衛也衛主皮毛內合於肺其脈浮緩自汗發熱惡寒畏風頭痛項強鼻鳴乾嘔噴嚏流涕不時咳嗽乳子患此初服杏蘇飲解散風邪次服金沸草散開通氣逆稍大之兒初起服參蘇飲次服川芎茶調散或服人參敗毒散杏蘇飲去皮尖炒研杏仁十粒蘇葉前胡陳皮桔梗蜜炒桑皮麵炒枳殼去心麥冬去心貝母酒炒條芩甘草生薑等分煎服川芎茶調散薄荷葉錢半川芎芥穗各一錢羌活防風白芷炙草各五分北辛三分茶葉一撮引參蘇飲人參蘇葉前胡葛根法夏茯苓各一錢麵炒枳殼甘草桔梗陳皮木香各五分姜棗引表重去棗加蔥白引肺中有火去人參加制杏仁炒桑皮瀉甚加土炒白朮炒研扁豆炒白蓮肉金沸草散旋覆花赤茯苓前胡各一錢芥穗錢半北細辛製半夏炙草各五分姜棗引頭痛甚加川芎胸滿加桔梗炒枳殼有熱加柴胡黃芩人參敗毒散人參甘草薄荷各五錢羌活獨活柴胡前胡枳殼桔梗川芎茯苓各一錢生薑引去人參加芥穗防風各一錢名荊防敗毒散治感冒瘟疫麻疹外科之主方傷風附法集成曰小兒患傷寒始終用敗毒散隨症加味每日一劑以愈為度面白眼胞浮腫咳嗽多痰肺經本病也炒白芥子製半夏泡南星自利腹脹不思乳食手足逆冷者脾經怯弱也倍茯苓加炒扁豆山藥潮熱昏睡咳嗽嘔吐大便黃白脾肺兼寒也加炙朮藿香乾薑目腫流淚咳嗽脅痛者兼肝症也倍柴胡加醋炒青皮炒白芍面赤舌腫自汗尿短者兼心症也倍獨活加連翹木通淡竹葉面黃唇腫少食噁心者脾經滯也加炒神麯炒麥芽山楂砂仁面黑氣冷咳則腰痛者腎經寒也倍獨活加北細辛或加桂心感冒夾食小兒平日乳食無節內傷停滯外復為風寒所傷其脈浮滑發熱惡寒頭疼惡食噯腐吐酸便秘尿澀腹熱膨脹如熱甚便硬脈浮數者服雙解通聖散汗下之方見陽明傷寒若內熱不甚服藿香正氣散和解之次服平胃散以調脾藿香正氣散藿香紫蘇白芷茯苓各錢半陳皮桔梗大腹皮炒白朮炒厚朴製半夏各一錢甘草五分姜棗引或加木瓜傷食加消食藥平胃散法制蒼朮二錢姜炒厚朴陳皮炙草各一錢薑末引加味法食滯加炒神麯麥芽山楂或加煨枳實痰盛加製半夏脾虛不思食加人參黃耆痞滿加炒枳殼木香便秘加大黃芒硝小水赤澀加赤茯苓澤瀉表甚頭痛加蔥白豆豉感冒夾熱小兒臟腑多熱復感風寒風熱相搏火邪內熾其脈浮數壯熱憎寒面赤唇焦口乾鼻燥心煩渴飲狂言譫語二便秘結初起服雙解通聖散汗下之服前湯已經汗下病雖少減熱仍不退者服涼膈天水散大黃黃芩芒硝梔子連翹薄荷滑石甘草淡竹葉燈心引感冒夾驚小兒先患感冒邪尚未解復為驚異所觸致面色青赤心驚膽怯睡臥不安身熱煩躁脈來浮數者先服疏解散以散表再服涼驚丸以鎮驚服前藥後病雖退常覺心驚不寐者服柴胡溫膽湯和解之疏解散前胡蘇葉羌活防風枳殼桔梗赤芍甘草炒殭蠶各一錢去皮尖炒研杏仁十粒酒炒川連五分生薑引涼驚丸川連五錢黑醜膽草防風青黛鉤藤鉤各三錢共曬研極細煮麵糊丸綠豆大白湯每下十丸乳子化下五丸柴胡溫膽湯柴胡陳皮法夏茯苓竹茹甘草麵炒枳實生薑引感冒附方不換金正氣散治小兒隨父母遊宦四方不伏水土及感冒山嵐瘴氣俱隨症加味法制蒼朮薑製厚朴法夏陳皮藿香甘草生薑紅棗加味法濕盛加茯苓炙白朮頭痛加白芷川芎潮熱加柴胡黃芩川芎冷瀉加煨肉蔻訶子口燥心煩加花粉柴胡葛根足腫加木瓜脅脹痛加青皮柴胡胸腹脹痛加炒枳殼炒白蔻炒香附實熱便秘加大黃芒硝腹中氣塊加煨三稜炒枳殼炒小茴檳榔咳嗽加桔梗杏仁桑皮喘急加麻黃炒蘇子炒桑皮制杏仁嘔逆噦噫加丁香砂仁柿蒂身肢痠痛加桂枝威靈仙瘧疾加煨研草果醋炒常山青皮檳榔痢初起去藿香加炒川連枳殼寒白痢及感寒腹痛加乾薑桂心凡風入四體痿弱疼痛加當歸川芎桂枝瘟疫門總括瘟疫之傳變與傷寒無異有冬感於寒而即病者名曰傷寒有冬傷於寒即藏肌膚之內伏於營衛之間至春復感春風發為溫病至夏復感暑熱發為熱病若沿門合戶老幼相傳乃天行瘟疫或春應暖而反涼秋冬應涼而反熱乃四時不正之氣各曰時氣瘟病其間有瘟痧斑疹諸症又當分別施治春溫病小兒溫病乃因冬受寒邪不即為病至春復感春風而發也其症與傷寒相同但脈浮而數表裡俱實宜汗下兼行服雙解通聖散見陽明傷寒至若嘔吐不食加法夏生薑風溫病亦因冬受寒邪潛藏榮衛復感春風而發其症身重喜睡鼻息鼾鳴發熱自汗汗少者服人參敗毒散疏解之見前傷風汗出多者宜清解服桂枝白虎湯桂枝知母酒洗白芍各錢半石膏末四錢甘草一錢粳米一撮生薑三片紅棗二枚夏熱病夏熱病乃冬受寒邪不即為病至夏復感暑熱寒熱相搏而成現症與上春溫相同但不惡寒只發熱煩躁口乾作渴為少異耳治宜解表通里服雙解通聖散見陽明傷寒四時瘟疫時疫一症乃天地之厲氣流行沿門合戶無論老少強弱觸之即病蓋因邪氣自口鼻而入故傳染之速迅如風火但毒有在表在裡在陰在陽之分其或發或清或攻當因春風夏熱秋涼冬寒之四時氣運隨人虛實治之古法以攻毒為急者以邪自口鼻而入在裡之病多也治法有三一曰發毒用荊防敗毒散見前傷風二曰清毒用普濟消毒飲三曰攻毒用二聖救苦丹毒輕者用雙解通聖散見陽明傷寒兩解之亦可普濟消毒飲酒炒川連條芩各二錢陳皮柴胡玄參桔梗甘草各一錢炒研牛蒡炒殭蠶板藍根薄荷葉升麻連翹馬勃各五分便秘加大黃二聖救苦丹川大黃二兩淨皂角肉一兩切碎曬乾研極細末水糊為丸綠豆大白湯每下一錢以便利為度小兒化服五分吳又可曰乳子染時疫患傷寒醫人每多忽略一見兒發熱惡寒不審其有汗無汗輒指為傷風見兒不思乳食胸腹脹悶又自為傷食安知其疫邪傳胃也見兒噁心嘔逆煩渴下利以為食滯常事又安知其協熱下利入里日深也挨延失治致兩目上吊不時抽搐肢體發痙甚則角弓反張又認作慢驚風妄用鎮驚墜痰之藥錮蔽毒邪轉治轉劇迨至小兒神昏不啼不語又將神門眉心頭頂胸腹妄用燈火艾火亂灸此火雖微內攻甚急兩陽相搏如火添油熱悶而死者多矣今後遇時疫流行須留心防察倘小兒患此其發毒清毒攻毒治法與大人同一例但藥味分量減半為劑耳瘟斑痧疹凡先患傷寒後發痧疹者由汗下失宜外邪怫鬱內熱泛出而成也惟時氣傳染感而即發亦由疫之為病性烈而速故曰瘟斑瘟痧瘟疹發於衛分者為痧衛主氣故痧色白如膚粟發於營分者為斑為疹營主血故斑疹色紅深赤也又曰膚淺者為疹深重者為斑斑形如豆或成片相連二症色紅者輕赤者重黑者死若其色淡紅稀暗者皆因邪在三陽已成斑疹由外入里或因過服寒涼致變為陰斑陰痧陰疹法當從陰寒治之不與陽分斑疹同其治法也三症治法升葛消毒飲治斑疹初起其色淡紅尚未出透表熱輕者服此升發之升麻葛根芥穗防風白芍甘草炒研牛蒡羚羊角末等分蔥白引三黃石膏湯治斑疹初起其色紫赤出不透澈表熱重者服此宜發之石膏末三錢黃連黃芩黃柏麻黃各一錢梔子二枚豆豉廿粒蔥白三寸有汗用麻黃五分消斑青黛飲治斑痧疹先已出透不宜再發表當清熱解毒熟石膏末羚羊角末各錢半川連梔子玄參知母柴胡生地甘草沙參大黃青黛各一錢姜棗引臨服兌醋一匙雙解通聖散見前陽明傷寒治斑痧疹初起表裡不清先服此方以解表通里俟或汗或下後再審脈症照前法施治外附法斑疹之脈必見沉伏因血散於肌膚也又曰陽浮血數陰實而大火盛於表則陽脈浮數下焦實熱則陰脈實大也雲林方治陽毒發斑狂言吐血毒蘊胸中用此宣發之升麻二錢川連射干沙參甘草各錢半又方治氣分鬱熱發為斑疹柴胡錢半黃芩法半沙參各一錢川連甘草紫草陳皮各五分治瘟痧加防風芥穗連翹薄荷又方治血分熱盛發斑疹者當歸生地赤芍紅花炒連石膏末凡斑痧疹出不透澈主以荊防敗毒散加當歸生地赤芍沙參方見上又方治內熱發斑肌膚如蚊蟲之咬不宜汗下只宜清熱降火涼血石膏末四錢沙參知母當歸紫草赤茯甘草各錢半暑症門總括中暑為陽邪單中暑熱也身熱有汗傷暑為陰邪中暑復感寒也身熱無汗中暑熱極攻肝則抽搐攻心則厥冒不省人事分別於下中暑時當夏令暑熱重蒸小兒中之故身熱有汗頭痛口渴足冷惡寒煩躁不寧神倦氣乏主以後二方加味白虎湯沙參石膏末三錢知母錢半甘草製蒼朮各一錢粳米引加味香薷飲治中暑症似傷寒強痛無汗及外寒內暑者香薷二錢酒炒川連炒厚朴炒研扁豆川芎炒芍羌活防風各一錢姜引勿熱服熱服香薷令人作嘔傷暑小兒先已受暑復感風寒相合為病名曰傷暑其證發熱無汗口渴飲水面色紅赤乾嘔噁心腹或絞痛懶食嗜臥初起法宜外散內消先服二香飲若正氣虛弱當扶正去邪用六和湯若傷暑夾食大吐大瀉用加減香薷飲循序治之二香飲藿香香薷蘇葉茯苓白芷陳皮甘草桔梗土炒白朮炒研扁豆薑製半夏姜炒厚朴姜炒黃連大伏毛生薑燈心引六和湯去皮尖研碎杏仁十粒炒研扁豆炒研砂仁土炒白朮製半夏炒厚朴赤茯苓藿香木瓜甘草人參各一錢姜棗引加香薷錢半加減香薷飲香薷二錢炒研扁豆姜炒厚朴陳皮山楂豬苓甘草各一錢麵炒枳實五分乳食滯加炒神麯麥芽暑風暑風者手足抽搐狀似驚風由暑熱攻肝內生風病其症身熱有汗煩躁口渴二便黃赤先用香薷飲加羌活以疏風次服玉露散以清暑熱暑熱一解抽搐自止切勿誤作驚癇施治慎之香薷飲香薷二錢薑汁炒厚朴炒研白扁豆各一錢薑汁炒黃連五分加羌活錢半煎湯待微溫方服之玉露散寒水石石膏各五錢粉甘草二錢共研極細白湯每調下二錢日三服或服六一散飛淨滑石末六錢甘草細粉一錢燈心湯每下二錢暑厥暑厥之症因小兒元氣素虛暑熱衝心或挾痰上衝以致精神憒散卒然昏昧不省人事脈症虛甚者用清暑益氣湯脈症尚實者用辰砂益元散合抱龍丸治之清暑益氣湯蜜炙黃耆製蒼朮炒白朮去心麥冬當歸炙草各八分酒炒黃柏醋炒青皮炒神麯五味子陳皮澤瀉升麻葛根人參各五分生薑三片紅棗二枚辰砂益元散即前六一散內加辰砂五分共研極勻每用一錢合後抱龍丸九轉膽星四兩真天竺黃一兩明塊雄黃水飛硃砂各五錢四味先研細篩末又另兌麝香一錢再同研極勻先槌碎粉甘草盡煮成膏布濾去渣和勻前藥糊為丸每重一錢曬乾收入磁瓶內每用一丸合前益元散一錢用薑湯化開調勻頻頻與服凡治驚癇風痰搐者只用薑湯薄荷湯化服一丸暑熱附法神彀曰靜而得之為中暑其舌淡紅唇無血色口氣微弱煩渴譫語但不甚響亮只低低平聲脈沉無力者服清暑益氣湯見上脈洪滑者用白虎湯見陽明傷寒內加人參動而得之為中熱其症唇舌紅紫氣出蒸手小水赤澀煩渴譫語聲必雄壯甚則狂妄而大叫此係心經中熱宜服川連木通滑石甘草薄荷麥冬羚羊角末淡竹葉燈草引按小兒中暑中熱有因常在烈日之中或坐臥濕熱之處直犯暑熱致令發熱自汗等症審其脈洪便秘先服白虎湯若洪滑而兼吐瀉當服薷苓湯香薷茯苓各二錢炒研扁豆姜炒厚朴土炒白朮豬苓澤瀉各一錢姜炒川連桂心各五分或夾食積去川連加消導藥傷濕門總括經曰諸濕腫滿皆屬於脾又曰風雨則傷上冷濕則傷下是知濕之為病有出於天氣者雨露是也有出於地氣者泥水是也有出於飲食者酒漿是也有出於人事者如小兒坐臥濕處或常著汗衣或衣褓不幹或不時澡浴或貪食生冷之類是也然所因雖異悉由乎脾氣先虛濕邪得以乘之其辨症之法一曰濕熱二曰寒濕足以盡之矣濕熱症治初起身重壯熱口渴心煩小水赤澀大便秘結脈來洪滑初服柴苓湯清利之若濕熱浮腫宜服茵陳飲滲利之如便閉脈實服沆瀣丹柴苓湯柴胡澤瀉各錢半土炒白朮茯苓豬苓炙草黃芩法夏各一錢人參肉桂各五分或用沙參桂心茵陳飲茵陳梔子甘草赤茯苓煨枳實炒葶藶子燈心引沆瀣丹大黃黃柏黃芩俱酒炒川芎各九錢黑醜枳殼赤芍俱炒香薄荷葉滑石連翹檳榔甘草各六錢共切片曬研極細蜜為丸重一錢白湯茶酒聽其化服寒濕症治初起身重頭痛寒熱往來肢冷腹脹瀉清吐涎甚則浮腫發黃治宜燥濕溫中主以胃苓湯若中濕浮腫前湯合五皮飲煎服若腫甚發黃另按腫脹黃疸門施治見四卷寒濕兼食滯服消導二陳湯見傷寒門胃苓湯製蒼朮白朮茯苓豬苓澤瀉陳皮甘草厚朴桂心生薑五皮飲五加皮地骨皮茯苓皮大腹皮生薑皮合前湯等分煎服發熱門總括小兒發熱有表裡虛實之分治有汗下補泄之別須觀形察色審症切脈以意消息之庶不致誤也分別症治於下表熱小兒外感寒邪太陽受病脈浮發熱惡寒無汗頭身強痛氣喘鼻乾宜服十神湯若表邪不解裡熱又急脈浮數大寒熱煩渴便秘脹滿者宜汗下兼行服雙解通聖散見太陽傷寒余法再按傷寒門十神湯麻黃蘇葉升麻葛根白芷川芎陳皮甘草赤芍香附米等分生薑蔥白引發熱有汗為表虛治法同前傷風門小兒肥甘過度必生內熱故發熱蒸蒸小便赤澀面赤唇焦舌燥口渴脈實有力者先服調胃承氣湯下之見陽明傷寒若下後熱仍不退次服白虎湯見陽明傷寒裡熱不解再服黃連解毒湯川連川柏條芩梔子等分熱服虛熱或因大病後氣血虛弱營衛尚未調勻致發虛熱其熱微緩氣乏神疲主以補中益氣湯或因血虛下午至夜燒熱加重面唇淡白大便滯澀出則溏瀉主以四物湯二症若兼口渴引飲而嘔者服竹葉石膏湯又有陰盛格陽外浮發熱面色雖赤然四肢逆冷小便清白脈必微細用白通湯收斂陽氣其熱自退補中益氣湯蜜炙黃耆二錢土炒白朮炙草當歸各錢半留白陳皮一錢柴胡升麻人參各五分生薑三片紅棗二枚四物湯熟地三錢血熱改用生地白芍二錢血瘀改用赤芍酒洗當歸二錢川芎錢半頭痛