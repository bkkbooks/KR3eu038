脅扇動陷下作坑鼻竅掀張神氣悶亂初起急服五虎湯次用一捻金下之倘得氣開其喘自止若小兒百日內見此難救五虎湯蜜炒麻黃生石膏末各二錢去皮尖研杏仁甘草細茶葉各一錢生薑三片煎服數次後服一捻金川大黃黑牽牛白牽牛檳榔人參等分研極細蜜水調服五分取下利為度吼喘附法喘以氣息言肺氣膹郁上促連屬不能以息是也吼哮以聲響言聲如拽鋸脹滿暴喘是也凡喉中如水雞聲者為實吼如鼾聲者為虛吼分別症治於下九寶湯治吼哮初起或久吼遇寒即發者麻黃蘇葉陳皮薄荷桂心甘草大腹皮制杏仁炒桑皮生薑蔥白引千緡湯治痰閉肺竅吼喘不得臥者薑製半夏赤茯苓膽星桔梗各錢半皂角炙焦麵炒枳殼炙草各一錢氣喘加蘇子白芥子蘿蔔子奪命散治心經積火刑肺灼脾暴哮者酒炒大黃麵炒枳殼各五錢黑醜三錢半生半夏炒共研極細薑湯每下一錢取下為度集成方治因宿食發吼痰壅腹脹惡食吐酸炒研蘿蔔子炒神麯炒麥芽山楂肉炒厚朴香附子甘草木香定喘湯治肺虛感寒氣逆膈熱發吼者制杏仁炒蘇子炒桑皮款冬花白果肉法半夏麻黃枯芩甘草生薑引貞元飲景岳治氣短喘促提不能升咽不能降人但知為氣急其病在上焦而不知其元海無根肝腎已敗此子午不交氣脫症也服此救之法制熟地五錢當歸三錢炙草一錢如兼嘔吐惡食或惡寒者加煨姜五片若氣乏脈微加人參手足逆冷加肉桂或加附片理陰煎景岳治肝腎虛敗不能納氣浮散而作喘者熟地四錢當歸三錢炮姜炙草各錢半照前方加味凡張口氣喘出多入少者宜之吼喘之脈浮滑者易治微細而澀者難痊治小兒奶吼遇風寒即發者制去油栝蔞仁熟石膏製半夏麻黃陳皮各一錢麵炒枳實去皮尖炒研杏仁甘草各五分姜引頻頻與服治醋嗆成吼大粉草四兩切大片用豬膽汁浸透慢火炙乾研極細末蜜為小丸臨臥白湯每下一錢治鹽嗆成吼小薊草二兩豬精肉四兩同煮極爛食肉飲湯痰飲門總括痰者水穀所化之津液不能四布留於胸膈而成也或因飲食無節乳汁過傷或貪餌厚味甘肥脾胃不能運化而生若陰氣素盛則化為飲陽氣素盛則化而為痰痰飲為病多端另詳大方脈書但小兒所患只有燥痰濕痰二症分別於下燥痰燥痰者痰因火動也火盛則痰色黃稠黏澀滯難出氣逆喘咳夜臥不寧面赤口乾小便短赤輕者服清氣化痰湯重者服蘇葶滾痰丸下之見前食積咳嗽燥久不愈服燥痰湯清氣化痰湯製半夏膽星各錢半去皮尖研杏仁去油栝蔞仁麵炒枳實酒炒黃芩陳皮茯苓各一錢生薑引燥痰湯去油栝蔞仁去心天冬去心貝母麵炒枳殼旋覆花枯芩海石朴硝桔梗陳皮煎服濕痰因小兒過食生冷油膩之物有傷脾胃致脾土虛濕不運化而成濕痰清稀色白滑而易出脾虛不運故惡食懶食脾主四肢故體倦嗜臥脾屬土故面色多黃如痰多者宜除濕化痰服枳桔二陳湯加二術如飲多者宜扶陽散飲服桂苓甘術湯餘症用二陳湯照法加味治之枳桔二陳湯炒枳殼製半夏陳皮茯苓桔梗甘草加製蒼朮土炒白朮以除濕生薑引桂苓甘術湯茯苓四錢土炒白朮桂枝各三錢甘草一錢煎服二陳湯治一切痰飲惟治燥痰不相宜因半夏性燥茯苓性滲利也薑汁煮半夏茯苓各二錢去白陳皮一錢甘草五分生薑三片加味法治風痰抽搐加膽星白附子煨天麻炒殭蠶甚者加全蠍薄荷寒痰壅甚加乾薑桂心麻黃北細辛炮附子濕盛加製蒼朮白朮熱痰色黃稠黏口渴便秘加炒連炒芩石膏竹瀝火盛加梔子青黛氣痰喘促胸滿加蘇莖枳殼香附郁痰氣滯再加川芎桔梗食痰加楂肉炒神麯麥芽蘿蔔子老痰加枳實海石栝蔞仁朴硝脅痰在皮裡膜外加炒白芥草果行痰利氣加炒研砂仁藿香枳桔膈間風痰氣實加荊瀝虛加竹瀝四肢痰飲加竹瀝薑汁韭菜汁痰在膈上重者用後吐法輕者加川芎桔梗豆豉防風茶葉宣發之膈上熱痰或兼嘈雜者去生薑加梔子川連條芩豆豉痰結胸膈喘咳氣逆及頑痰膠固加木香香附枳實膽星痰嗽眼胞浮腫酒痰手臂木痛加蒼朮枳殼薑黃桂枝威靈仙炒神麯寒痰貫膈加乾薑白附子若脈浮表實加麻黃枳殼桔梗北細辛痰迷心悸怔忡不寐加膽星枳實石菖蒲心懸如飢加酒炒川連痰在腸胃氣實脈實者加芒硝大黃枳實甘遂攻下之虛者禁下血虛有痰加天冬知母栝蔞竹瀝炒香附氣虛有痰加炒白朮人參痰中帶血加蜜炒桑皮酒炒黃芩白芍瓜蒂散治痰壅上膈火氣上衝食停上脘欲吐不出及胸中寒結痞滿炒黃甜瓜蒂赤小豆等分研極細量兒大小白湯每調三五分溫服良久以指探吐吐時令兒閉目束緊腰帶如吐不止煎蔥湯服數次三聖散治風痰壅盛驚風癇症上實者炒瓜蒂藜蘆防風等分研末照前法調服探吐通關散治痰搐昏死生南星半夏北細辛薄荷葉牙皂肉等分研極細男左女右每用五釐竹管吹入鼻也得嚏自效或加白礬開關散治風痰驚搐開關不開生南星烏梅肉各二錢冰片五釐共搗如泥每用捺牙口噤立開熏鼻法治痰壅氣閉口噤昏死剝巴豆肉用綿紙包裹捶碎待油黏透紙上去巴豆渣再卷皂角末燒煙燻鼻或用此油紙塞鼻亦效紫金丹雲林治痰實結胸哮吼喘促用此劫之白砒霜一塊用濕麵包裹燃灰中煨熟去面取霜一錢枯礬三錢共研極細先用水浸透豆豉一兩搗取汁去渣和勻前末為丸綠豆大茶湯每下三五丸脈略風痰浮滑風飲浮弦食痰沉滑懸飲沉弦肺飲不弦但短而喘又曰脈滑主痰關弦主飲寒飲兩弦肺飲短氣又曰兩關脈浮弦大而實膈上有稠痰也凡關上脈伏而大兩胞如煤煙熏者皆痰為病也頭痛門總括大人頭痛症治繁多詳見初集大方脈但小兒頭痛大要有二在表者外感風寒法當疏散在裡者內熱熏蒸法當清解余詳後附法風寒頭痛乃因太陽膀胱經感受風寒其脈浮緩惡寒發熱上及巔頂下連額角不時疼痛法宜取汗主以羌活沖和湯隨症加減若風寒濕熱上攻頭目及腦痛不止者主以清空膏羌活沖和湯羌活防風川芎白芷白菊花製蒼朮各錢半黃芩生地甘草各一錢北細辛五分姜蔥引加味法痛由頂後起者屬膀胱經倍羌活加藁本便秘加酒炒大黃痛由太陽起牽引眉目腦額者屬胃經倍白芷加葛根石膏末痛由耳後起屬膽經重加柴胡頭痛兼足冷氣逆屬腎經倍用細辛痛兼腹痛身重屬脾經加蒼朮痛兼肢冷嘔吐涎沫屬肝加炒吳萸火痛煩渴肌熱倍炒黃芩加石膏痛吐痰飲手足溫者加茯苓製半夏清空膏酒炒川連條芩羌活防風炙草柴胡川芎等分研極細每用二錢茶調成膏白湯沖化嚥下主治太陽少陽頭痛脈浮數者宜之加減法如少陰頭痛必足寒氣逆脈沉而遲加北細辛一半如太陰頭痛必兼吐痰涎只用酒炒芩連柴胡加薑製半夏如偏頭痛服之不愈減羌活防風川芎一半倍加酒炒柴胡如自汗發熱惡熱煩渴此陽明頭痛不可服此用白虎湯加白芷丹溪曰東垣制清空膏治諸般頭痛惟血虛頭痛從眼角相連痛者不宜服此又云顛頂痛屬厥陰腦項痛屬太陽亦不宜服內熱頭痛此病在陽明胃經因小兒肥甘無節胃火上炎故鼻乾目痛上至頭腦下連齒頰痛無定時主以加味茶調散川芎白芷芥穗薄荷各錢半石膏末三錢酒炒條芩陳茶葉各一錢生薑引便秘加酒炒大黃芎芷石膏湯川芎白芷羌活藁本白菊花熟石膏隨症加味熱甚加炒芩薄荷連翹梔子風盛眩暈加芥穗防風頭痛煩渴脈實便秘加酒炒大黃芒硝肢冷苦痛加北細辛頭痛附法人參敗毒散見前傷風加川芎藁本炒芩川柏治腦頂苦痛蘇子降氣湯見前寒喘加白芷川芎治氣逆頭痛補中益氣湯見前虛熱加川芎白芷芥穗治氣虛頭痛四物湯見前虛熱治血虛頭痛加炒芥穗有風加羌活天麻逍遙散見前咳嗽治肝鬱火旺目眩頭痛有熱加丹皮梔仁六味地黃湯見前咳嗽治肝腎虧損目眩頭暈隨症加味人參芎附湯人參川芎炮附子治虛寒頭痛四肢逆冷脈微細無神清暈化痰湯通治頭痛暈眩者羌活防風川芎白芷茯苓陳皮法半夏甘草炒枳殼炒條芩北細辛陳膽星姜蔥引半夏白朮天麻湯治脾胃內傷眩暈頭痛身重心煩四肢逆冷等症製半夏炒麥芽各錢半炒白朮炒神麯各一錢製蒼朮蜜黃耆天麻陳皮澤瀉茯苓人參炙草各五分酒洗川柏乾薑各三分棗引此湯亦治食滯頭痛隨症加減酒痰頭痛加葛根枳椇子凡乳兒起居坐臥戒勿以鼻息對兒囟門吹噓免日後患頭風腹痛門總括小兒腹痛當分別施治如系食痛宜消導蟲痛宜安蟲停食感寒宜消散寒痛宜溫中熱痛宜清解分別於下食痛因兒乳食不節積滯不化其症食入即痛喜飲涼水惡食吐酸腹滿便秘先服六一順氣湯下之見陽明傷寒若下後仍痛法當和解服消導二陳湯見傷寒夾食或服香砂平胃散法制蒼朮二錢薑汁炒厚朴去白陳皮炙甘草藿香葉炒研砂仁各一錢姜棗引或加炒曲麥芽山楂法半夏蟲痛因小兒腹中蟲動不安故時常絞痛面色乍紅乍青乍白時吐清水其痛時作時止忌用攻下法宜安蟲新痛服錢氏安蟲散久痛服加減理中湯至若蟲攻胃痛服雄檳丸集效丸蠱脹腹痛服使君子丸錢氏安蟲散水粉鶴蝨草川楝肉俱炒黃色煅枯明礬各二錢共研極細米湯每調五分臨痛時頓服加減理中湯人參以沙參代土炒白朮炮姜川椒等分烏梅一個引雄檳丸治蟲攻腸胃不吐不瀉時常干痛或食厚味蟲得飽而痛減食若淡泊蟲苦飢而痛甚每痛服此自愈明雄黃白礬檳榔片等分研極細煮麵糊丸綠豆大白湯每下五分集效丸治蟲齧腹痛作止有時或氣痛硬起往來無定酒炒大黃五錢炒鶴蝨炒蕪荑炒乾姜炮附子訶子皮檳榔木香各三錢共曬䘌研細篩末蜜為小丸烏梅湯下一錢或五分使君子丸治蠱脹腹痛及食勞黃疸喜食茶米炭土等物使君子淨肉二兩姜煮南星雞心檳榔各一兩共切成片如喜食米則用麥芽半斤拌藥炒香取藥研末喜茶用茶葉拌炒喜炭土用炭土拌炒撿出藥片研極細末蜜為小丸每日清晨泡白糖湯送下二錢寒痛因小兒中氣虛弱復為風冷所乘脾經受寒緩緩腹痛小便㿠白爪甲色白面色青白飲則喜熱或腹痛溏瀉肢冷下利主以理中湯見前三陰傷寒四肢逆冷症兼少陰加炮附子若脾氣虛寒夾食腹痛宜服燒脾湯如寒痛嘔逆則用當歸散燒脾散土炒白朮姜炒厚朴炒研砂仁煨研草果炒神麯炒麥芽炮姜良薑陳皮炙草煎湯頻服當歸散當歸人參藿香炙草法半夏桂心土炒白朮炒研砂仁姜引內食外寒因小兒內傷乳食外感寒邪食寒凝結腹中作痛發熱惡寒嘔吐惡食腹痛多啼主以藿香和中湯若外感風寒內傷生冷身熱無汗頭背強痛或往來寒熱嘔吐冷秘胸滿腹痛凡寒濕為病主以五積散藿香和中湯藿香葉炒研砂仁姜炒厚朴法制蒼朮酒炒香附白芷川芎陳皮羌活山楂甘草蘇葉生薑五積散白芷陳皮製蒼朮炒厚朴炒枳殼各八分當歸川芎白芍茯苓桔梗各一錢製半夏麻黃乾薑桂心甘草各五分蔥白引有汗去麻黃蒼朮寒盛氣滯加吳萸逆冷虛汗加附片熱痛夾熱腹痛其痛迅速時痛時止腹不脹滿彈之不響熱手按摩其痛愈甚面紅唇赤渴飲便閉脈實或大熱在中焦主以加味清涼飲若兼食積煩渴燥結惡食膨脹者服木香檳榔丸下之下後用異功散調補加味清涼飲柴胡白芍生地當歸甘草條芩醋炒青皮麵炒枳殼石膏末滑石末若熱盛秘結常服六一順氣湯見陽明傷寒木香檳榔丸酒炒大黃炒黑醜檳榔各三錢炒神麯六錢木香一錢共研極細麵糊小丸白湯每下五分異功散土炒白朮二錢茯苓陳皮炙草人參各一錢姜棗引急痧症小兒忽然腹痛大叫數聲而即昏死脈無定形此名急痧用溫水一盆抱兒在旁以手蘸水僅拍膝凹委中穴俟有粗筋腫起將銀針伴筋旁刺令出血其兒自蘇旋取滾湯冷水各半杯兌勻灌之再服六和湯若暑月患此先服二香飲俱見傷暑門鐵鏡要法寒痛痛在臍下其痛迂緩連綿不止喜以熱手按摩口氣清涼糞青尿白脈沉而遲緩初起用推法曲左小指先揉勞宮執兒左手推上三關三十下及揉臍心五十下法見一卷圖說內服炮薑桂心土炒白朮炙草煎湯磨木香兌服熱痛痛在臍上其痛迅厲時痛時止拒人熱手按摩口氣蒸手燥渴便秘脈實或洪大初起用推法執兒左手退下六腑三十下掌中用水底撈月法見一卷推拿圖說煎車前子灶心土木通磨木香汁兌服小兒初生有因包臍太緊兒腹漸長被布勒住上氣不通下氣以致曲腰蹬腳腹痛多啼宜向溫暖處如法放鬆煎服陳皮鬱金白芍甘草湯小兒數歲有因氣滯不和腹常悶痛其症飲食如常眼胞不浮面色不黃但臍腹光亮腫痛擊之如鼓鳴搖其頭而噯氣服六和湯見前傷暑去人參白朮加炒香附大腹皮若夾食氣痛服消導二陳湯見前傷寒去人參白朮加炒香附大腹皮陳飛霞曰凡心腹諸痛痛在胸膈屬上焦即胃脘病也痛在中脘屬中焦脾胃病也痛在臍心上下左右屬下焦肝腎病也馮楚瞻曰小兒傷食由脾胃虛弱醫者始終用平胃散不知平胃者如胃中有阜則使平之一平即止過服則平地反成坑坎矣惟張潔古所制枳朮丸土炒焦白朮二兩麵炒焦枳實一兩共研極細荷葉包陳米飯煨乾搗膏糊為小丸酒水每下一二錢此丸補多於消猶為得法但此丸原為傷食而設若以為專補脾胃又誤矣積滯門總括東垣云飲者無形之氣食者有形之血也從可知乳為血液飲之類也谷有糟粕食之類也夫乳與食小兒資以養生胃主納受脾主運化乳貴有時食貴有節倘或過度則宿滯不消而病成矣分別症治於下乳滯小兒飲乳過度致令睡臥不寧口氣蒸手頻吐乳片肚脹腹熱大便酸臭不時啼叫但臟腑嬌嫩不可過攻當調和脾胃服後二方消乳丸醋煮香附炒神麯炒麥芽各五錢陳皮四錢炒砂仁炙甘草各二錢曬研極細薑汁糊丸量兒大小白湯化下雲林方麵炒枳殼姜炒厚朴炒神麯麥芽等分煎湯磨木香汁兌服食滯小兒恣肥甘生冷運化不及則腸胃積滯致令頭溫腹熱大便酸臭噯氣惡食煩躁不眠口乾渴飲輕者服木香大安丸痞悶脹痛服保和丸面黃肚大服前枳朮丸重者氣實便秘服小承氣湯見陽明傷寒木香大安丸酒炒川連炒蘿蔔子炒砂仁連翹各二錢木香陳皮山楂肉土炒白朮麵炒枳實炒神麯麥芽各三錢曬研末水糊丸白湯化下一錢保和丸炒神麯製半夏陳皮茯苓各一兩山楂肉二兩連翹炒蘿蔔子各五錢曬研極細蜜為小丸薑湯每下一錢日三服食滯附法蘇餅湯治感冒夾食寒熱腹痛紫蘇莖葉二兩入罐封口水煎濃湯另用小鍋炒焦稻穀二合以蘇湯淬濕再炒再淬炒至谷黑成餅方將蘇湯泡浸擂碎布濾去渣溫服數次熨臍法治內傷生冷臍腹脹痛等症生薑一兩蘇葉豆豉各五錢共搗極爛入鍋炒熱用絹包定乘熱推運臍腹後服前湯蔥熨法治虛冷厥逆臍腹刺痛二便不通連根葉生蔥半斤搗如泥加鹽兩半麥麩半升再共搗極勻入鍋內炒熱用絹二塊作二起包裹輪流熨兒臍腹良久氣通寒散自愈治豬羊肉滯搗山楂煎服牛肉滯加切碎稻草等分犬肉滯加去皮杏仁治魚肉等滯取魚刺肉骨燒灰存性滾湯泡服橄欖煎湯能解魚滯治糖餅園果等滯將致傷之物燒存性湯泡服瓜果滯痛桂心煎湯服治麵食豆腐等滯煎蘿蔔子湯頻服或飲熱醋治蛋滯煎豆豉和鹽服治油膩滯氣燒紅鹽塊淬陳燒酒中蕩熱頻飲燒穀米淬湯能解食滯癖積門總括因小兒飲食過度腸胃填滿濁汁外溢復感寒氣凝結成癖每生於左脅之下始如雞卵堅硬成塊漸如覆盆之形越過臍心則難治矣癖疾症治初起身體潮熱脅痛口渴喜飲涼水面色青黃肌膚削瘦肚大青筋漸至堅硬成塊不時作痛內服千金消癖丸外貼紅花膏內外交治可消若不發熱口渴者只服木香丸外亦貼膏余按後方施治千金消癖丸蘆薈青黛木香檳榔陳皮甘草炒厚朴各一錢焙使君肉三稜莪朮香附俱醋炒胡連山楂肉各二錢水紅花子土炒白朮炒神麯炒麥芽赤茯苓各四錢曬䘌研末篩盡細切阿魏薄片一錢和灰面一兩煮稀糊拌前藥末打成團為丸綠豆大米湯每下一錢木香丸莪朮青皮俱醋炒炒砂仁硃砂木香等分研極細煮麵糊丸麻子大每用五分或一錢煎致傷之物送下乳子用滾湯和乳化服紅花膏外貼癖疾阿魏血竭沒藥當歸赤芍各三錢麝香一錢共研極細聽用先取水紅花料一捆䘌細入鍋用水煎出汁布濾去渣又入鍋內慢火熬成膏一碗稍冷和濕藥末盡攪成膏常用青布攤貼集成消癖丸治小兒癖疾形氣虛者青皮三稜莪朮香附俱用醋炒木香各一錢厚朴川連薑汁炒麵炒枳實神麯麥芽砂仁建姜俱炒黃桂心檳榔陳皮茯苓法制半夏各二錢醋炙鱉甲三錢曬研極細煮麵糊丸綠豆大白湯每下一錢日三服赭石挨癖丸治癖疾脈症俱實者赭石火煅醋淬三次青皮莪朮俱醋炒桂心木香各三錢研巴豆肉紙包壓去油取霜一錢大黃二錢共曬研極細煮麵糊丸綠豆大薑湯每下三五七丸量兒大小服簡便方治癖疾結塊如拳從左脅漸攻臍悶痛甚者酒蒸大黃一兩醋炙鱉甲八錢炮姜五錢炮附子三錢曬研極細陳米醋一斤熬至半斤和濕藥末為丸綠豆大白湯每下十餘丸俟瀉下惡物後服調補脾胃藥此方功效甚速老幼皆宜治小兒好食茶葉因而成癖用新鮮榧子一斤每於早晨中午空心嚼榧十四粒旋以白湯嚥下治因果積食滯結癖成塊紅棗一斤水二升皮硝二兩同煮至水乾取棗曬乾每日空心嚼棗數枚白湯呷下治癖疾日久變成鱉瘕大者如杯小者如錢按之動搖如鱉形狀西地石硫黃生用數兩研極細末酒水每調一錢日二服常服自化痞悶症治小兒胸膈痞悶由乳食不節脾胃虛損邪正相傳阻隔氣道遇冷則發亦有因肝經濕熱而成者治法因脾胃虛弱痞悶氣乏者用六君子湯加當歸川芎見咳嗽附法肝火鬱滯用逍遙散加丹皮梔仁見咳嗽肝經濕熱下注小腹痞脹尿必淋用龍膽瀉肝湯見發熱辨症如系肝脾兩虛用歸脾湯三焦痞悶脈症俱實脹滿不通服助氣丸如系食積痞悶服勝紅丸歸脾湯蜜炙黃耆土炒白朮炒研棗仁龍眼肉茯神各錢半酒洗當歸去心遠志各一錢人參炙草木香各五分姜棗引助氣丸三稜莪朮俱醋炒各兩半土炒白朮醋炒青皮陳皮各一兩麵炒枳殼檳榔木香各五錢曬研極細煮麵糊丸綠豆大薑湯每下一錢日二服小兒化服五分勝紅丸三稜莪朮青皮俱醋炒神麯麥芽良薑乾薑俱炒黃陳皮各一兩酒炒香附二兩曬䘌研末煮醋糊為小丸薑湯每下一二錢痃癖疝症臍之兩旁有筋突起脹痛大者如臂小者如指狀似弓弦者其名曰痃若在脅肋者乃名曰癖如少腹牽引腰脅疼脹高起刺痛則名疝症名雖有三其實皆由風冷客入胞中而成故每發時必因外受風冷發則痛痛則見不痛則平復如常也又曰痃者外結募原肌肉之間癖者內結隱僻膂脊腸胃之後比痃較深疝則屬肝脈必弦急見二卷疝門蔥白散總治痃癖三稜莪朮青皮俱醋炒神麯麥芽俱炒麵炒枳殼鹽水炒小苗姜炒厚朴川楝肉當歸赤芍生地川芎茯苓沙參木香桂心炮姜等分研末煎蔥白湯每調一二錢日三服積聚癥瘕五積者痞氣肥氣伏梁氣息賁氣奔豚氣五名也屬五臟之陰所生是為血病其發有根痛有常處其脈伏結若脈緊小而沉結脾胃中積滯也六聚者積之著於孫絡緩筋募原膂筋腸後輸脈六處也成於六腑之陽是為氣病其發無根忽聚忽散痛無常處其脈浮結若沉細真氣敗矣七癥者蚊蛇鱉蝨肉發米七名也成塊不移而可見故類積類痃而癥則屬氣病八瘕者青黃燥血脂狐蛇鱉八名也其塊移動無常故類聚類癖而瘕則屬血病按難經載有心肝脾肺腎五臟之積而無六聚病形諸家亦鮮道及故只有李東垣五積方行於世方載彤園醫書婦科一卷後人憚其峻厲多不敢用巢元方書載有八瘕症治方見彤園醫書婦科一卷不言七癥病形從可知醫理精微每遇疑難前賢亦不敢率行私臆以滋來世惑也大抵積聚癥瘕在婦女大人恆有之症小兒患此絕少況四症皆起於氣氣聚而後血凝不必執泥五積六聚七癥八瘕名目但以牢固不移有定處者為積為癥推之活動忽聚忽散者為聚為瘕斯得之矣四癥總方余法詳見彤園醫書婦科奔豚附二卷疝氣後開鬱正元散總治積聚土炒白朮炒研砂仁青皮香附俱醋炒神麯麥芽俱炒香元胡楂肉陳皮桔梗炙草茯苓海粉生薑等分日二服大七氣湯總治癥瘕並治積聚三稜莪朮青皮俱醋炒炒研益智仁陳皮藿香桔梗甘草各一錢木香肉桂各五分空心日二服
